<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>涨停概念图谱</title>
<style>
  /* 字节跳动风格蓝绿主题：--accent 蓝=品牌/交互，--teal 青绿=辅助，--up 红=涨停语义（A股红涨） */
  :root {
    --bg: #f5f7fa; --surface: #ffffff; --surface2: #eef1f6;
    --ink: #1f2329; --ink2: #646a73; --ink3: #9aa0a8;
    --line: #dfe3ea; --accent: #2e6be6; --accent-ink: #ffffff;
    --accent-soft: #e9f0ff; --accent-line: #c9d9ff;
    --teal: #00b6a1; --teal-soft: #e0f7f3; --teal-line: #b3e8df;
    --up: #e03e2d; --up-soft: #fdecea; --up-line: #f5c6bf;
    --gold: #8a6d1c; --gold-soft: #f6efd9;
    --shadow: 0 1px 3px rgba(30,50,90,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141821; --surface: #1c212b; --surface2: #232936;
      --ink: #e6e9ee; --ink2: #9aa3b2; --ink3: #67707f;
      --line: #303747; --accent: #5b8cff; --accent-ink: #fff;
      --accent-soft: #1d2a47; --accent-line: #31456f;
      --teal: #2bc4b2; --teal-soft: #143430; --teal-line: #1f4f48;
      --up: #f0544a; --up-soft: #3a221f; --up-line: #5c332d;
      --gold: #d4b355; --gold-soft: #322b18;
      --shadow: 0 1px 3px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 14px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  a { color: inherit; text-decoration: none; }

  header { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 14px;
           padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--line); }
  .brand { font-size: 16px; font-weight: 700; white-space: nowrap; cursor: pointer; }
  .brand b { background: linear-gradient(90deg, var(--accent), var(--teal));
             -webkit-background-clip: text; background-clip: text; color: transparent; }
  nav { display: flex; gap: 4px; }
  nav button { border: none; background: none; color: var(--ink2); font-size: 13px;
               padding: 5px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  nav button:hover { background: var(--surface2); color: var(--ink); }
  nav button.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .searchbox { position: relative; margin-left: auto; }
  .searchbox input { width: 230px; padding: 6px 10px; border: 1px solid var(--line);
                     border-radius: 8px; background: var(--bg); color: var(--ink); font-size: 13px; }
  .searchbox input:focus { outline: none; border-color: var(--accent); }
  #q-drop { position: absolute; right: 0; top: 34px; min-width: 260px; max-height: 320px; overflow: auto;
            background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0,0,0,.14); display: none; }
  #q-drop .item { padding: 7px 12px; cursor: pointer; display: flex; gap: 8px; align-items: baseline; }
  #q-drop .item:hover, #q-drop .item.sel { background: var(--surface2); }
  #q-drop .kind { font-size: 11px; color: var(--ink3); }
  #gen-at { font-size: 11px; color: var(--ink3); white-space: nowrap; }

  main { max-width: 1060px; margin: 0 auto; padding: 18px 20px 80px; }
  h2 { font-size: 18px; margin: 6px 0 12px; }
  .muted { color: var(--ink2); } .small { font-size: 12px; }

  /* 日期工具条 */
  .datebar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .datebar input[type=date] { padding: 5px 8px; border: 1px solid var(--line); border-radius: 8px;
                              background: var(--surface); color: var(--ink); font-size: 14px; }
  .navbtn { border: 1px solid var(--line); background: var(--surface); color: var(--ink);
            border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; }
  .navbtn:hover { border-color: var(--accent); color: var(--accent); }
  .navbtn:disabled { opacity: .4; cursor: default; }
  .navbtn:disabled:hover { border-color: var(--line); color: var(--ink); }

  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
          padding: 8px 16px; box-shadow: var(--shadow); }
  .stat .v { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .k { font-size: 11px; color: var(--ink2); }

  /* 概念卡片 */
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
          padding: 12px 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .card-h { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .card-h .cname { font-size: 15px; font-weight: 700; cursor: pointer; }
  .card-h .cname:hover { color: var(--accent); }
  .card-h .cnt { font-size: 12px; color: var(--accent); font-weight: 600; }
  .card-h .hist { font-size: 11px; color: var(--ink3); margin-left: auto; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px;
          background: var(--surface2); border: 1px solid var(--line); border-radius: 999px;
          cursor: pointer; font-size: 13px; }
  .chip:hover { border-color: var(--accent); }
  .chip.yizi { border-style: dashed; border-color: var(--gold); }
  .chip.touch { border-style: dashed; opacity: .78; }
  .chip .code { font-size: 11px; color: var(--ink3); font-variant-numeric: tabular-nums; }
  .lb { font-size: 11px; font-weight: 700; border-radius: 5px; padding: 0 5px; line-height: 17px; }
  .lb1 { background: var(--surface2); color: var(--ink3); border: 1px solid var(--line); }
  .lb2 { background: var(--up-soft); color: var(--up); border: 1px solid var(--up-line); }
  .lb3 { background: var(--up); color: #fff; }
  .lbt { background: var(--surface2); color: var(--ink2); border: 1px dashed var(--ink3); }
  .board { font-size: 10px; color: var(--ink3); }

  /* 表格 */
  table { width: 100%; border-collapse: collapse; background: var(--surface);
          border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .tablewrap { overflow-x: auto; border-radius: 12px; box-shadow: var(--shadow); }
  th, td { text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--line);
           font-size: 13px; white-space: nowrap; }
  th { background: var(--surface2); color: var(--ink2); font-size: 12px; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--surface2); }
  td.num { font-variant-numeric: tabular-nums; }

  /* 概念/个股详情头 */
  .detail-h { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
              padding: 14px 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .detail-h h2 { margin: 0 0 4px; }
  .concept-chip { display: inline-flex; gap: 6px; align-items: baseline; padding: 4px 11px;
                  border-radius: 999px; background: var(--accent-soft); color: var(--accent);
                  border: 1px solid var(--accent-line); cursor: pointer; font-size: 13px; margin: 3px 4px 3px 0; }
  .concept-chip:hover { background: var(--accent); color: var(--accent-ink); }
  .concept-chip .x { opacity: .75; font-size: 11px; }

  /* 时间线图 */
  .chart-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
                padding: 12px 14px 6px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .chart-card .ch-h { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .seg button { border: none; background: var(--surface); color: var(--ink2); font-size: 12px;
                padding: 3px 10px; cursor: pointer; }
  .seg button.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  svg .bar { fill: var(--accent); opacity: .82; cursor: pointer; }
  svg .bar:hover { opacity: 1; }
  svg .bar.on { opacity: 1; stroke: var(--gold); stroke-width: 2; }
  #tl svg, #tagtl svg { height: 130px; }
  @media (max-width: 640px) { #tl svg, #tagtl svg { height: 100px; } }
  svg text { fill: var(--ink3); font-size: 10px; }
  svg line.grid { stroke: var(--line); stroke-width: 1; }

  #tooltip { position: fixed; z-index: 99; pointer-events: none; display: none;
             background: var(--ink); color: var(--bg); padding: 5px 10px; border-radius: 8px;
             font-size: 12px; box-shadow: 0 4px 14px rgba(0,0,0,.25); }

  /* 板块热力 */
  .startups { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
              gap: 10px; margin-bottom: 16px; }
  .su-card { background: var(--surface); border: 1px solid var(--accent-line); border-radius: 12px;
             padding: 10px 12px; box-shadow: var(--shadow); cursor: pointer; }
  .su-card:hover { border-color: var(--accent); }
  .su-card .nm { font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .su-card .tagnew { font-size: 10px; background: var(--teal); color: #fff;
                     border-radius: 5px; padding: 0 5px; }
  .su-card .meta { font-size: 11px; color: var(--ink2); margin: 2px 0 4px; }
  .heatwrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--line);
              border-radius: 12px; box-shadow: var(--shadow); }
  .heatmap { border-collapse: collapse; table-layout: fixed; }
  .heatmap th, .heatmap td { border: none; padding: 0; }
  .heatmap thead th { position: sticky; top: 0; background: var(--surface2); font-size: 10px;
                      color: var(--ink3); padding: 4px 0 4px 2px; font-weight: 500;
                      text-align: left; white-space: nowrap; overflow: visible; }
  .heatmap thead th:not(.rowlab) { width: 26px; }
  .heatmap thead th.dlab { z-index: 1; }   /* 日期文字压过相邻空表头的背景 */
  .heatmap td.rowlab, .heatmap th.rowlab { position: sticky; left: 0; background: var(--surface);
      z-index: 2; padding: 3px 10px 3px 6px; font-size: 13px; white-space: nowrap;
      border-right: 1px solid var(--line); width: 190px; overflow: hidden;
      text-overflow: ellipsis; }
  .heatmap tbody tr { cursor: default; }
  .heatmap tbody tr:hover td.rowlab { color: var(--accent); }
  .heatmap td.cell { width: 26px; height: 24px; text-align: center; font-size: 10px;
                     font-variant-numeric: tabular-nums; cursor: pointer;
                     border: 1px solid var(--bg); border-radius: 4px; }
  .exp { display: inline-block; width: 14px; cursor: pointer; color: var(--ink3);
         user-select: none; font-size: 10px; }
  .exp:hover { color: var(--accent); }
  .rowlab .lvl1 { font-weight: 700; } .rowlab .lname { cursor: pointer; }
  .rowlab .lname:hover { color: var(--accent); }
  .rowlab .rsum { font-size: 10px; color: var(--ink3); margin-left: 5px; }
  .hierarchy { margin-top: 6px; font-size: 12px; color: var(--ink2); }

  /* 关联新闻 */
  .newsbtn { border: 1px solid var(--accent-line); background: var(--accent-soft);
             color: var(--accent); border-radius: 6px; padding: 1px 8px; font-size: 12px;
             cursor: pointer; }
  .newsbtn:hover { background: var(--accent); color: var(--accent-ink); }
  tr.newsrow td { background: var(--surface2); white-space: normal; padding: 8px 14px; }
  .newsitem { margin: 3px 0; font-size: 13px; }
  .newsitem a { color: var(--ink); }
  .newsitem a:hover { color: var(--accent); text-decoration: underline; }
  .newsitem .nmeta { color: var(--ink3); font-size: 11px; margin-left: 8px; }
  .brief { color: var(--accent); font-size: 13px; margin-bottom: 5px; }
  .brief::before { content: '✨ '; }
  td .briefcell { color: var(--ink2); font-size: 12px; white-space: normal; }

  /* 情绪趋势 */
  .trend-grid { display: grid;
                grid-template-columns: repeat(auto-fit, minmax(min(100%, 420px), 1fr));
                gap: 12px; }
  .tcard { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
           padding: 10px 14px 4px; box-shadow: var(--shadow); }
  .tcard .th { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
  .tcard .th b { font-size: 13px; }
  .tcard .lv { margin-left: auto; font-size: 17px; font-weight: 700;
               font-variant-numeric: tabular-nums; }
  .tcard .delta { font-size: 11px; font-weight: 400; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px;
         margin-right: 4px; vertical-align: baseline; }
  svg .hovcol { fill: transparent; cursor: pointer; }
  svg .hovcol:hover { fill: rgba(46,107,230,.08); }
  @media (max-width: 640px) { .trend-grid { grid-template-columns: 1fr; } }

  /* 批量归类 */
  textarea { width: 100%; min-height: 90px; padding: 10px 12px; border: 1px solid var(--line);
             border-radius: 10px; background: var(--surface); color: var(--ink);
             font: 13px/1.5 ui-monospace, Menlo, monospace; resize: vertical; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .btn-primary { background: linear-gradient(90deg, var(--accent), var(--teal)); color: #fff;
                 border: none; border-radius: 8px;
                 padding: 8px 20px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { filter: brightness(1.08); }
  .hot { color: var(--up); font-weight: 600; }
  .empty { text-align: center; color: var(--ink3); padding: 40px 0; }
  .reason { color: var(--ink2); font-size: 12px; white-space: normal; }
  tr.touchrow td { opacity: .72; }
  tr.touchrow td:first-child { border-left: 3px dashed var(--ink3); }

  /* 标签类型分区（个股页/批量归类）：左侧类型色标 + 右侧内容 */
  .trow { display: flex; gap: 10px; margin-top: 8px; align-items: flex-start; }
  .tlabel { flex: 0 0 72px; text-align: center; font-size: 11px; font-weight: 600;
            padding: 3px 0; border-radius: 6px; margin-top: 3px; }
  .tl-theme { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-line); }
  .tl-cat   { background: var(--teal-soft);   color: var(--teal);   border: 1px solid var(--teal-line); }
  .tl-attr  { background: var(--gold-soft);   color: var(--gold);   border: 1px solid var(--gold); }
  .tl-evt   { background: var(--surface2);    color: var(--ink2);   border: 1px dashed var(--ink3); }
  .trow .tbody { flex: 1; min-width: 0; }
  .concept-chip.c-cat { background: var(--teal-soft); color: var(--teal); border-color: var(--teal-line); }
  .concept-chip.c-cat:hover { background: var(--teal); color: #fff; }
  .concept-chip.c-attr { background: var(--gold-soft); color: var(--gold); border-color: var(--gold); }
  .concept-chip.c-attr:hover { background: var(--gold); color: #fff; }
  .concept-chip.c-evt { background: var(--surface2); color: var(--ink2);
                        border-style: dashed; border-color: var(--ink3); }
  .concept-chip.c-evt:hover { background: var(--ink3); color: var(--bg); }

  /* 全局筛选：选中态 = 实心填充 */
  .concept-chip.sel { background: var(--accent); color: #fff; border-color: var(--accent); }
  .concept-chip.c-cat.sel { background: var(--teal); color: #fff; border-color: var(--teal); }
  .concept-chip.c-attr.sel { background: var(--gold); color: #fff; border-color: var(--gold); }
  .concept-chip.c-evt.sel { background: var(--ink3); color: var(--bg); border-color: var(--ink3); border-style: solid; }
  .concept-chip.sel .x, .concept-chip.c-cat.sel .x, .concept-chip.c-attr.sel .x { color: #fff; opacity: .8; }
  /* 标签中心 */
  .subtabs { display: inline-flex; border: 1px solid var(--line); border-radius: 10px;
             overflow: hidden; margin-bottom: 14px; }
  .subtabs button { border: none; background: var(--surface); color: var(--ink2);
                    padding: 7px 18px; font-size: 13px; cursor: pointer; }
  .subtabs button.on { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
  .tree2col { display: grid; grid-template-columns: minmax(300px, 380px) minmax(0, 1fr); gap: 14px; }
  @media (max-width: 900px) { .tree2col { grid-template-columns: 1fr; } }
  .panor { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
           padding: 8px 6px; box-shadow: var(--shadow); max-height: 76vh; overflow: auto; }
  .pnode { display: flex; align-items: center; gap: 5px; padding: 2px 6px; border-radius: 7px;
           cursor: pointer; font-size: 13px; white-space: nowrap; }
  .pnode:hover { background: var(--surface2); }
  .pnode.sel { background: var(--accent-soft); }
  .pnode .dot { width: 7px; height: 7px; border-radius: 2px; flex: none; margin: 0; }
  .pnode .pn { overflow: hidden; text-overflow: ellipsis; }
  .pnode .hb { flex: none; height: 8px; border-radius: 2px; background: var(--accent); opacity: .75; }
  .pnode .hn { font-size: 10px; color: var(--ink3); flex: none; }
  .lc { font-size: 9px; border-radius: 4px; padding: 0 4px; flex: none; line-height: 15px; }
  .lc-start { background: var(--teal); color: #fff; }
  .lc-hot { background: var(--up); color: #fff; }
  .lc-ebb { background: var(--gold-soft); color: var(--gold); border: 1px solid var(--gold); }
  .lc-live { background: var(--accent-soft); color: var(--accent); }
  .lc-idle { background: var(--surface2); color: var(--ink3); }
  .npanel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
            padding: 12px 14px; box-shadow: var(--shadow); }
  .echelon td { vertical-align: top; }
  .govrow { display: flex; align-items: center; gap: 8px; padding: 6px 8px;
            border-bottom: 1px solid var(--line); font-size: 13px; flex-wrap: wrap; }
  .govrow:last-child { border-bottom: none; }
  .govrow .gname { font-weight: 600; cursor: pointer; }
  .govrow .gname:hover { color: var(--accent); }
  .govrow .gmeta { color: var(--ink3); font-size: 11px; }
  .sugg { font-size: 11px; border-radius: 5px; padding: 1px 6px;
          background: var(--teal-soft); color: var(--teal); border: 1px solid var(--teal-line); }
  .govrow input[type=checkbox] { accent-color: var(--accent); }
  .batchbar { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--line);
              padding: 8px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .fltbar { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
            padding: 10px 14px 12px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .fltrow { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
  .fltrow .flabel { font-size: 12px; color: var(--ink2); }
  #f-q { padding: 5px 10px; border: 1px solid var(--line); border-radius: 8px;
         background: var(--bg); color: var(--ink); font-size: 13px; width: 170px; }
  #f-q:focus { outline: none; border-color: var(--accent); }

  /* 题材树（个股页） */
  .tagtree { margin-top: 4px; }
  .tagtree .tnode { display: flex; align-items: center; gap: 6px; padding: 1px 0; }
  .tagtree .tanc { color: var(--ink2); font-size: 12px; cursor: pointer; }
  .tagtree .tanc:hover { color: var(--accent); }
  .tagtree .tbranch { color: var(--ink3); font-size: 11px; font-family: ui-monospace, monospace; }

  /* 手动分类弹层 */
  .clsbtn { border: 1px solid var(--line); background: var(--surface); color: var(--ink3);
            border-radius: 6px; padding: 0 6px; font-size: 11px; cursor: pointer; line-height: 18px; }
  .clsbtn:hover { border-color: var(--accent); color: var(--accent); }
  .clsbtn.done { border-color: var(--teal-line); background: var(--teal-soft); color: var(--teal); }
  #modal-mask { position: fixed; inset: 0; z-index: 90; background: rgba(15,20,30,.45); display: none; }
  #modal { position: fixed; z-index: 91; left: 50%; top: 14%; transform: translateX(-50%);
           width: min(420px, calc(100vw - 24px)); background: var(--surface); color: var(--ink);
           border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px;
           box-shadow: 0 12px 40px rgba(0,0,0,.28); display: none; }
  #modal h3 { margin: 0 0 10px; font-size: 15px; }
  #modal .opts { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 10px; }
  #modal .opt { border: 1px solid var(--line); border-radius: 8px; padding: 4px 12px;
                cursor: pointer; font-size: 13px; background: var(--surface); color: var(--ink2); }
  #modal .opt.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  #modal input[type=text] { width: 100%; padding: 6px 10px; border: 1px solid var(--line);
                            border-radius: 8px; background: var(--bg); color: var(--ink); font-size: 13px; }
  #modal .mrow { margin-bottom: 8px; } #modal .mlabel { font-size: 12px; color: var(--ink2); }
  #modal .mbtns { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  #pendbar { position: fixed; z-index: 60; right: 16px; bottom: 16px; display: none;
             background: linear-gradient(90deg, var(--accent), var(--teal)); color: #fff;
             border: none; border-radius: 999px; padding: 9px 18px; font-size: 13px;
             cursor: pointer; box-shadow: 0 6px 20px rgba(20,60,160,.35); }
  #modal textarea { min-height: 150px; font-size: 12px; }
  @media (max-width: 640px) {
    header { flex-wrap: wrap; position: static; padding: 8px 12px; gap: 8px; }
    .brand { font-size: 15px; }
    nav { order: 3; width: 100%; justify-content: space-between; gap: 0; }
    nav button { padding: 4px 8px; font-size: 13px; }
    .searchbox { margin-left: auto; flex: 1; min-width: 120px; }
    .searchbox input { width: 100%; }
    #gen-at { display: none; }
    main { padding: 12px 10px 60px; }
    .stat { padding: 6px 12px; } .stat .v { font-size: 17px; }
    .tcard .th .small:not(.lv) { display: none; }  /* 小屏隐藏图例/注释，保留最新值 */
    .heatmap td.rowlab, .heatmap th.rowlab { width: 118px; font-size: 12px; padding-left: 2px; }
    .rowlab .rsum { display: block; margin-left: 14px; line-height: 1.1; }
    .heatmap thead th:not(.rowlab) { width: 24px; }
    .heatmap td.cell { height: 26px; }
    th, td { padding: 6px 8px; }
    .startups { grid-template-columns: minmax(0,1fr) minmax(0,1fr); }
    .su-card { min-width: 0; }
    .trow { gap: 6px; }
    .tlabel { flex-basis: 58px; font-size: 10px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand" id="brand">涨停<b>概念图谱</b></div>
  <nav>
    <button id="nav-review">每日复盘</button>
    <button id="nav-heat">板块热力</button>
    <button id="nav-filter">标签中心</button>
    <button id="nav-trend">情绪趋势</button>
    <button id="nav-batch">批量归类</button>
  </nav>
  <div class="searchbox">
    <input id="q" placeholder="搜代码 / 名称 / 概念" autocomplete="off">
    <div id="q-drop"></div>
  </div>
  <span id="gen-at"></span>
</header>
<main id="app"></main>
<div id="tooltip"></div>
<div id="modal-mask"></div>
<div id="modal"></div>
<button id="pendbar"></button>

<script src="data.js"></script>
<script>
'use strict';
const D = ZTKG_DATA;
// 手动分类暂存（localStorage）：{标签名: {type, status, parent}}，导出补丁落盘前先在本地生效
const FIX = JSON.parse(localStorage.getItem('ztkg_tagfix') || '{}');
const saveFix = () => { localStorage.setItem('ztkg_tagfix', JSON.stringify(FIX)); updatePendbar(); };
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- 索引 ---------- */
// event 字段: [0 code, 1 连板数, 2 high_days, 3 类型, 4 炸板次数, 5 封单万, 6 市值亿, 7 首封时间, 8 原因, 9 [概念id]]
const byStock = {};                 // code -> [{d, ev}]
const byConcept = {};               // cid  -> { days: Map(date->events[]), stocks: Map(code->count) }
for (const d of D.dates) {
  for (const ev of D.events[d]) {
    (byStock[ev[0]] ??= []).push({ d, ev });
    for (const cid of ev[9]) {
      const c = (byConcept[cid] ??= { days: new Map(), stocks: new Map() });
      if (!c.days.has(d)) c.days.set(d, []);
      c.days.get(d).push(ev);
      c.stocks.set(ev[0], (c.stocks.get(ev[0]) || 0) + 1);
    }
  }
}
const nameToCid = {};
for (const cid in D.concepts) nameToCid[D.concepts[cid][0]] = +cid;
for (const a in D.aliases) nameToCid[a] ??= D.aliases[a];
const recent5 = D.dates.slice(-5);
const hotOf = cid => {
  const c = byConcept[cid]; if (!c) return 0;
  let n = 0; for (const d of recent5) n += (c.days.get(d) || []).length;
  return n;
};
const boardOf = code =>
  code.startsWith('68') ? '科创板' : code.startsWith('30') ? '创业板' :
  (code.startsWith('60') || code.startsWith('00')) ? '主板' :
  /^(8|4|92)/.test(code) ? '北交所' : '其他';
const fmtWan = w => w == null ? '—' : w >= 10000 ? (w / 10000).toFixed(1) + '亿' : w + '万';
const isTouch = ev => ev[10] === 1;          // 触及涨停但收盘未封住（炸板池）
const lbBadge = ev => {
  if (isTouch(ev)) return '<span class="lb lbt">⚡触及</span>';
  const lb = ev[1] || 1, txt = ev[2] || (lb > 1 ? lb + '板' : '首板');
  const cls = lb >= 3 ? 'lb3' : lb === 2 ? 'lb2' : 'lb1';
  return `<span class="lb ${cls}">${esc(txt)}</span>`;
};

/* ---------- 标签层级（taxonomy） ---------- */
const TAX = D.taxonomy || {};
for (const nm in FIX) {                       // 本地暂存的父子关系先生效
  const f = FIX[nm];
  if (f.parent) {
    if (!(TAX[f.parent] || []).includes(nm)) (TAX[f.parent] ??= []).push(nm);
  } else if (['sector', 'theme', 'catalyst'].includes(f.type)
             && !(nm in TAX) && !Object.values(TAX).flat().includes(nm)) {
    TAX[nm] = [];                             // 无父的热度型标签：自成一级板块
  }
}
const taxChildSet = new Set(Object.values(TAX).flat());
const taxRoots = Object.keys(TAX).filter(p => !taxChildSet.has(p));
const taxParentsOf = name => Object.keys(TAX).filter(p => TAX[p].includes(name));
const _cidsCache = {};
function taxCids(name, stack) {          // 节点及其全部后代对应的概念id集合
  if (_cidsCache[name]) return _cidsCache[name];
  stack = stack || new Set();
  if (stack.has(name)) return new Set(); // 防环
  stack.add(name);
  const s = new Set();
  const own = nameToCid[name];
  if (own != null && byConcept[own]) s.add(own);
  for (const ch of TAX[name] || []) for (const c of taxCids(ch, stack)) s.add(c);
  stack.delete(name);
  return _cidsCache[name] = s;
}
const _seriesCache = {};
function taxSeries(name) {               // 每交易日去重个股数（板块热度）
  if (_seriesCache[name]) return _seriesCache[name];
  const cids = taxCids(name);
  const out = D.dates.map(d => {
    const codes = new Set();
    for (const cid of cids)
      for (const ev of (byConcept[cid].days.get(d) || [])) codes.add(ev[0]);
    return codes.size;
  });
  return _seriesCache[name] = out;
}
function startupOf(series) {             // 近3日 vs 前15日基线
  if (series.length < 6) return null;
  const recent = series.slice(-3).reduce((a, b) => a + b, 0) / 3;
  const baseArr = series.slice(Math.max(0, series.length - 18), -3);
  const base = baseArr.reduce((a, b) => a + b, 0) / Math.max(1, baseArr.length);
  return { recent, base, ratio: (recent + .25) / (base + .25) };
}

/* ---------- 标签类型（tag_meta：六类分型，频道由类型决定） ---------- */
const META = D.tag_meta || {};                       // name -> [type, status]
for (const nm in FIX)                                // 本地暂存的类型/状态先生效
  if (FIX[nm].type) META[nm] = [FIX[nm].type, FIX[nm].status || 'active'];
const typeOf = nm => (META[nm] || ['unknown'])[0];
const isTheme = nm => { const t = typeOf(nm); return t === 'sector' || t === 'theme'; };
const isCatalyst = nm => typeOf(nm) === 'catalyst';
const TYPE_LABEL = { sector: '产业', theme: '题材', catalyst: '催化',
                     attribute: '属性', event: '事件', unknown: '未审核' };

/* ---------- 路由 ---------- */
function go(hash) { location.hash = hash; }
window.addEventListener('hashchange', render);
$('#brand').onclick = () => go('#/date/' + D.dates[D.dates.length - 1]);
$('#nav-review').onclick = $('#brand').onclick;
$('#nav-heat').onclick = () => go('#/heat');
$('#nav-filter').onclick = () => go('#/tags/' + (TAGS.tab || 'tree'));
$('#nav-trend').onclick = () => go('#/trend');
$('#nav-batch').onclick = () => go('#/batch');

function render() {
  const h = location.hash || '#/date/' + D.dates[D.dates.length - 1];
  const [, view, arg] = h.match(/^#\/(\w+)\/?(.*)$/) || [];
  $('#nav-review').classList.toggle('on', view === 'date');
  $('#nav-heat').classList.toggle('on', view === 'heat');
  $('#nav-filter').classList.toggle('on', view === 'filter' || view === 'tags');
  $('#nav-trend').classList.toggle('on', view === 'trend');
  $('#nav-batch').classList.toggle('on', view === 'batch');
  hideTip();
  if (view === 'filter') return renderTags('filter');
  if (view === 'tags') return renderTags(arg || 'tree');
  if (view === 'date') return renderDate(decodeURIComponent(arg));
  if (view === 'concept') return renderConcept(+arg);
  if (view === 'stock') return renderStock(decodeURIComponent(arg));
  if (view === 'batch') return renderBatch();
  if (view === 'heat') return renderHeat();
  if (view === 'trend') return renderTrend();
  if (view === 'tagday') {
    const i = arg.lastIndexOf('/');
    return renderTagDay(decodeURIComponent(arg.slice(0, i)), arg.slice(i + 1));
  }
  renderDate(D.dates[D.dates.length - 1]);
}

/* ---------- 视图1：每日复盘 ---------- */
function renderDate(d) {
  if (!D.dates.includes(d)) d = D.dates[D.dates.length - 1];
  const all = D.events[d] || [];
  const evs = all.filter(e => !isTouch(e));      // 收盘封住
  const touches = all.filter(isTouch);           // 触及未封（炸板池）
  const i = D.dates.indexOf(d);
  const st = D.day_stats[d];
  const maxLb = Math.max(1, ...evs.map(e => e[1] || 1));
  const yizi = evs.filter(e => (e[3] || '').includes('一字')).length;

  // 按概念分组（当日 ≥2 只），再按标签类型分流：题材成卡片、催化进顶部横条
  const groups = new Map();
  for (const ev of evs) for (const cid of ev[9]) {
    if (!groups.has(cid)) groups.set(cid, []);
    groups.get(cid).push(ev);
  }
  const named = [...groups].map(([cid, l]) => ({ cid, nm: D.concepts[cid][0], l }))
    .filter(g => g.l.length >= 2);
  const cards = named.filter(g => isTheme(g.nm)).map(g => [g.cid, g.l])
    .sort((a, b) => b[1].length - a[1].length);
  const catas = named.filter(g => isCatalyst(g.nm))
    .sort((a, b) => b.l.length - a.l.length);
  const carded = new Set(cards.flatMap(([, l]) => l.map(e => e[0])));
  const rest = evs.filter(e => !carded.has(e[0]));

  let html = `
  <div class="datebar">
    <button class="navbtn" id="prev" ${i <= 0 ? 'disabled' : ''}>← 前一日</button>
    <input type="date" id="dpick" value="${d}" min="${D.dates[0]}" max="${D.dates[D.dates.length - 1]}">
    <button class="navbtn" id="next" ${i >= D.dates.length - 1 ? 'disabled' : ''}>后一日 →</button>
    <span class="muted small">${weekday(d)}</span>
  </div>
  <div class="stats">
    <div class="stat"><div class="v">${evs.length}</div><div class="k">涨停家数</div></div>
    ${st ? `<div class="stat"><div class="v">${st[1] ?? '—'}</div><div class="k">盘中触板</div></div>
    <div class="stat"><div class="v">${st[2] != null ? Math.round(st[2] * 100) + '%' : '—'}</div><div class="k">封板率</div></div>
    <div class="stat"><div class="v">${st[3] ?? '—'}</div><div class="k">炸板家数</div></div>` : ''}
    <div class="stat"><div class="v">${maxLb}</div><div class="k">最高连板</div></div>
    <div class="stat"><div class="v">${yizi}</div><div class="k">一字板</div></div>
    ${touches.length ? `<div class="stat"><div class="v" style="color:var(--ink2)">${touches.length}</div><div class="k">触及未封</div></div>` : ''}
  </div>`;

  // 标签库日报（仅最新交易日）：新面孔 / 未入树 / 待审积压
  if (d === D.dates[D.dates.length - 1] && evs.length) {
    const firstZtDay = code => (byStock[code].find(x => !isTouch(x.ev)) || {}).d;
    const faces = evs.filter(e => firstZtDay(e[0]) === d);
    const childSet2 = new Set(Object.values(TAX).flat());
    const inTreeCids = new Set();
    for (const r of Object.keys(TAX).filter(p => !childSet2.has(p)))
      for (const c of taxCids(r)) inTreeCids.add(c);
    const uncov = evs.filter(e => !e[9].some(c => inTreeCids.has(c)));
    const backlog = Object.entries(META).filter(([, v]) => v[1] === 'candidate').length;
    html += `<div class="card" style="padding:8px 14px">
      <span class="tlabel tl-theme" style="padding:3px 10px">标签库日报</span>
      <span class="small muted" style="margin:0 6px">树内覆盖 <b>${Math.round((1 - uncov.length / evs.length) * 100)}%</b>
        · 未入树 <b>${uncov.length}</b> 只 · 待审积压 <b>${backlog}</b> ·</span>
      <span class="small" style="cursor:pointer;color:var(--accent)" id="rp-gov">去治理台 →</span>
      ${faces.length ? `<div style="margin-top:6px"><span class="small muted">🆕 新面孔（库内首次涨停）：</span>
        ${faces.map(ev => chipHtml(ev, d)).join('')}</div>` : ''}
    </div>`;
  }

  if (catas.length) {
    html += `<div class="card" style="padding:8px 14px"><span class="tlabel tl-cat" style="padding:3px 10px">今日催化</span>
      ${catas.map(g => `<span class="concept-chip c-cat" data-cid="${g.cid}" style="padding:2px 10px">
        ${esc(g.nm)} <span class="x">${g.l.length}只</span></span>`).join('')}</div>`;
  }

  for (const [cid, list] of cards) {
    const [cname, total, days] = D.concepts[cid];
    list.sort((a, b) => (b[1] || 1) - (a[1] || 1));
    html += `<div class="card">
      <div class="card-h">
        <span class="cname" data-cid="${cid}">${esc(cname)}</span>
        <span class="cnt">${list.length} 只</span>
        <span class="hist">近1年 ${total} 次 / ${days} 天活跃</span>
      </div>
      <div class="chips">${list.map(ev => chipHtml(ev, d)).join('')}</div>
    </div>`;
  }
  if (rest.length) {
    html += `<div class="card"><div class="card-h">
      <span class="cname muted">其他 / 未入题材卡片</span><span class="cnt">${rest.length} 只</span>
      <span class="hist">仅催化/属性/事件驱动或独立题材，悬浮看原因</span></div>
      <div class="chips">${rest.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  }
  if (touches.length) {
    const tl = [...touches].sort((a, b) => (b[4] || 0) - (a[4] || 0));
    html += `<div class="card" style="border-style:dashed"><div class="card-h">
      <span class="cname muted">⚡ 触及涨停未封住</span><span class="cnt" style="color:var(--ink2)">${tl.length} 只</span>
      <span class="hist">盘中摸板收盘炸板，不计入涨停与热度 · 按炸板次数排序</span></div>
      <div class="chips">${tl.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  }
  if (!all.length) html += `<div class="empty">当日无涨停数据</div>`;
  $('#app').innerHTML = html;

  $('#rp-gov')?.addEventListener('click', () => go('#/tags/gov'));
  $('#prev')?.addEventListener('click', () => go('#/date/' + D.dates[i - 1]));
  $('#next')?.addEventListener('click', () => go('#/date/' + D.dates[i + 1]));
  $('#dpick').addEventListener('change', e => {
    const v = e.target.value;
    // 落到最近的有数据交易日
    let best = D.dates[0];
    for (const dd of D.dates) if (dd <= v) best = dd; else break;
    go('#/date/' + best);
  });
  bindChips();
}
function chipHtml(ev, d) {
  const yizi = (ev[3] || '').includes('一字');
  const brief = d ? (D.briefs || {})[ev[0] + '|' + d] : null;
  const tip = (brief ? '✨' + brief + '\n' : '') +
    (ev[8] || (isTouch(ev) ? `触及涨停未封住 · 炸板${ev[4] ?? 0}次 · 首触${ev[7] || '—'}` : ''));
  return `<span class="chip${yizi ? ' yizi' : ''}${isTouch(ev) ? ' touch' : ''}" data-code="${ev[0]}" title="${esc(tip)}">
    ${lbBadge(ev)} ${esc(D.stocks[ev[0]] || ev[0])}
    <span class="code">${ev[0]}</span><span class="board">${boardOf(ev[0])}</span></span>`;
}
function bindChips() {
  document.querySelectorAll('[data-code]').forEach(el =>
    el.addEventListener('click', () => go('#/stock/' + el.dataset.code)));
  document.querySelectorAll('[data-cid]').forEach(el =>
    el.addEventListener('click', () => go('#/concept/' + el.dataset.cid)));
  document.querySelectorAll('.concept-chip[data-nm], .tanc[data-nm]').forEach(el =>
    el.addEventListener('click', () => gotoTaxNode(el.dataset.nm)));
  document.querySelectorAll('.clsbtn[data-cls]').forEach(el =>
    el.addEventListener('click', e => { e.stopPropagation(); openClassify(el.dataset.cls); }));
}
function weekday(d) {
  return '周' + '日一二三四五六'[new Date(d + 'T00:00:00').getDay()];
}

/* ---------- 视图2：概念详情 ---------- */
let conceptRange = 60;
function renderConcept(cid) {
  const meta = D.concepts[cid], c = byConcept[cid];
  if (!meta || !c) { $('#app').innerHTML = '<div class="empty">概念不存在</div>'; return; }
  const [cname, total, days] = meta;
  const aliases = Object.keys(D.aliases).filter(a => D.aliases[a] === cid);
  const activeDates = [...c.days.keys()].sort();
  const hot = hotOf(cid);

  const stockRows = [...c.stocks].map(([code, cnt]) => {
    const evs = byStock[code].filter(x => x.ev[9].includes(cid));
    const maxLb = Math.max(...evs.map(x => x.ev[1] || 1));
    const lastX = evs[evs.length - 1];
    return { code, cnt, maxLb, last: lastX.d,
             lastFt: lastX.ev[7], lastLt: lastX.ev[3], lastAmt: lastX.ev[5] };
  }).sort((a, b) => b.cnt - a.cnt || (a.last < b.last ? 1 : -1));

  const parents = taxParentsOf(cname);
  const kids = (TAX[cname] || []).filter(ch => taxCids(ch).size);
  const relChip = nm => `<span class="concept-chip" data-nm="${esc(nm)}" style="padding:2px 9px">${esc(nm)}</span>`;
  $('#app').innerHTML = `
  <div class="detail-h">
    <h2>${esc(cname)} ${hot >= 3 ? '<span class="hot small">🔥 近5日 ' + hot + ' 家涨停</span>' : ''}
      <button class="clsbtn${FIX[cname] ? ' done' : ''}" data-cls="${esc(cname)}" style="vertical-align:3px"
        title="手动分类">✎ ${TYPE_LABEL[typeOf(cname)]}${FIX[cname] ? '(本地)' : ''}</button></h2>
    <div class="muted small">
      ${aliases.length ? '别名：' + aliases.map(esc).join('、') + ' · ' : ''}
      累计涨停 <b>${total}</b> 次 · 活跃 <b>${days}</b> 天 ·
      ${activeDates[0]} ~ ${activeDates[activeDates.length - 1]}
    </div>
    ${parents.length || kids.length ? `<div class="hierarchy">
      ${parents.length ? '上级：' + parents.map(relChip).join('') : ''}
      ${kids.length ? '<span style="margin-left:10px">子标签：' + kids.map(relChip).join('') + '</span>' : ''}
    </div>` : ''}
  </div>
  <div class="chart-card">
    <div class="ch-h"><b>活跃度时间线</b><span class="muted small">当日涨停家数，点击柱子跳当日复盘</span>
      <div class="seg">
        <button id="r60" class="${conceptRange === 60 ? 'on' : ''}">近60日</button>
        <button id="rall" class="${conceptRange === 0 ? 'on' : ''}">全期</button>
      </div></div>
    <div id="tl"></div>
  </div>
  <div class="tablewrap"><table>
    <thead><tr><th>股票</th><th>涨停次数</th><th>最高连板</th><th>最近涨停</th><th>首封时间</th><th>类型</th><th>封单</th></tr></thead>
    <tbody>${stockRows.map(r => `
      <tr data-code="${r.code}"><td>${esc(D.stocks[r.code] || '')}<span class="muted small">（${boardOf(r.code)}）</span>
        <span class="code muted small">${r.code}</span></td>
      <td class="num">${r.cnt}</td>
      <td>${r.maxLb >= 2 ? `<span class="lb ${r.maxLb >= 3 ? 'lb3' : 'lb2'}">${r.maxLb}板</span>` : '首板'}</td>
      <td class="num">${r.last}</td><td class="num">${r.lastFt || '—'}</td>
      <td>${esc(r.lastLt || '—')}</td><td class="num">${fmtWan(r.lastAmt)}</td></tr>`).join('')}
    </tbody></table></div>`;

  drawTimeline(cid);
  $('#r60').onclick = () => { conceptRange = 60; renderConcept(cid); };
  $('#rall').onclick = () => { conceptRange = 0; renderConcept(cid); };
  bindChips();
}

function drawTimeline(cid) {
  const c = byConcept[cid];
  const dates = conceptRange ? D.dates.slice(-conceptRange) : D.dates;
  const vals = dates.map(d => (c.days.get(d) || []).length);
  const max = Math.max(1, ...vals);
  const W = 1000, H = 150, padL = 26, padB = 20, padT = 8;
  const bw = (W - padL - 4) / dates.length;
  let bars = '', labels = '';
  vals.forEach((v, i) => {
    const x = padL + i * bw;
    const bh = v ? Math.max(2, (H - padB - padT) * v / max) : 0;
    if (v) bars += `<rect class="bar" x="${(x + bw * 0.15).toFixed(1)}" y="${(H - padB - bh).toFixed(1)}"
      width="${Math.max(1, bw * 0.7).toFixed(1)}" height="${bh.toFixed(1)}" rx="${Math.min(2, bw / 4)}"
      data-i="${i}"></rect>`;
  });
  const step = Math.ceil(dates.length / 8);
  dates.forEach((d, i) => {
    if (i % step === 0) labels += `<text x="${(padL + i * bw).toFixed(1)}" y="${H - 5}">${d.slice(5)}</text>`;
  });
  const gridY = H - padB - (H - padB - padT);
  $('#tl').innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block">
    <line class="grid" x1="${padL}" y1="${H - padB}" x2="${W}" y2="${H - padB}"></line>
    <line class="grid" x1="${padL}" y1="${gridY}" x2="${W}" y2="${gridY}" stroke-dasharray="3,4"></line>
    <text x="2" y="${gridY + 4}">${max}</text>
    ${bars}${labels}</svg>`;
  $('#tl').querySelectorAll('.bar').forEach(b => {
    const i = +b.dataset.i;
    b.addEventListener('mousemove', e => showTip(e, `${dates[i]} · ${vals[i]} 家涨停`));
    b.addEventListener('mouseleave', hideTip);
    b.addEventListener('click', () => go('#/date/' + dates[i]));
  });
}

/* ---------- 标签按类型分区展示（个股页/批量归类共用） ---------- */
function taxPathOf(nm) {          // 沿首个父链爬到根：返回 [root, ..., 直接父]（不含自身）
  const path = [];
  let cur = nm;
  const seen = new Set([nm]);
  while (path.length < 5) {
    const ps = taxParentsOf(cur).filter(p => !seen.has(p));
    if (!ps.length) break;
    cur = ps[0];
    seen.add(cur);
    path.unshift(cur);
  }
  return path;
}
function typedTagRows(hist, opts = {}) {
  const ccount = new Map();
  for (const { ev } of hist) for (const cid of ev[9])
    ccount.set(cid, (ccount.get(cid) || 0) + 1);
  const ent = [...ccount].sort((a, b) => b[1] - a[1])
    .map(([cid, n]) => ({ cid, n, nm: D.concepts[cid][0], t: typeOf(D.concepts[cid][0]) }));
  const pick = ts => ent.filter(e => ts.includes(e.t));
  const chip = (e, hot, cls) => {
    const h = hot ? hotOf(e.cid) : 0;
    return `<span class="concept-chip${cls ? ' ' + cls : ''}" data-cid="${e.cid}">${esc(e.nm)}
      <span class="x">×${e.n}${h >= 3 ? ' 🔥近5日' + h + '家' : ''}</span></span>`;
  };
  const line = (label, lcls, list, hot, cap, ccls) => list.length
    ? `<div class="trow"><span class="tlabel ${lcls}">${label}</span><div class="tbody">${
        list.slice(0, cap || 99).map(e => chip(e, hot, ccls)).join('')}</div></div>` : '';

  // 主线题材：个股页按 taxonomy 树状展示（共享祖先合并），其余场景保持扁平 chips
  const themes = pick(['sector', 'theme']);
  let themeHtml;
  if (opts.tree && themes.length) {
    const root = new Map();                    // name -> {kids: Map, entry}
    for (const e of themes.slice(0, opts.maxTheme || 99)) {
      const path = [...taxPathOf(e.nm), e.nm];
      let level = root;
      path.forEach((seg, i) => {
        if (!level.has(seg)) level.set(seg, { kids: new Map(), entry: null });
        const node = level.get(seg);
        if (i === path.length - 1 && !node.entry) node.entry = e;
        level = node.kids;
      });
    }
    const renderNode = (name, node, depth) => {
      const branch = depth ? '<span class="tbranch">└</span>' : '';
      const body = node.entry
        ? chip(node.entry, true)
        : `<span class="tanc" data-nm="${esc(name)}">${esc(name)}</span>`;
      return `<div class="tnode" style="padding-left:${depth * 18}px">${branch}${body}</div>`
        + [...node.kids].map(([k, v]) => renderNode(k, v, depth + 1)).join('');
    };
    themeHtml = `<div class="trow"><span class="tlabel tl-theme">主线题材</span>
      <div class="tbody"><div class="tagtree" style="margin-top:0">${
        [...root].map(([k, v]) => renderNode(k, v, 0)).join('')}</div></div></div>`;
  } else {
    themeHtml = line('主线题材', 'tl-theme', themes, true, opts.maxTheme);
  }

  const html = themeHtml
             + line('催化', 'tl-cat', pick(['catalyst']), false, 5, 'c-cat')
             + line('属性', 'tl-attr', pick(['attribute']), false, 5, 'c-attr')
             + line('事件·未审核', 'tl-evt', pick(['event', 'unknown']), false, 4, 'c-evt');
  return html || '<div class="muted small" style="margin-top:4px">无概念标签</div>';
}

/* ---------- 视图3：个股详情 ---------- */

  bindChips();

/* ---------- 视图5：板块热力 ---------- */
let heatRange = 30;
const heatExpanded = new Set();
function renderHeat() {
  if (!taxRoots.length) { $('#app').innerHTML = '<div class="empty">未配置 taxonomy.json</div>'; return; }
  const sortBy5 = arr => arr.sort((a, b) =>
    taxSeries(b).slice(-5).reduce((x, y) => x + y, 0) -
    taxSeries(a).slice(-5).reduce((x, y) => x + y, 0));
  const themeRoots = sortBy5(taxRoots.filter(isTheme));
  const catRoots = sortBy5(taxRoots.filter(isCatalyst));

  // 题材启动榜：仅已审核的 sector/theme 树节点参与判定
  const themeNodes = new Set();
  const collect = n => {
    if (themeNodes.has(n)) return;
    if (isTheme(n)) themeNodes.add(n);
    (TAX[n] || []).forEach(collect);
  };
  themeRoots.forEach(collect);
  const startups = [];
  for (const nm of themeNodes) {
    const s = startupOf(taxSeries(nm));
    if (s && s.recent >= 3 && s.ratio >= 2.2)
      startups.push({ nm, ...s, isNew: s.base < 0.8 });
  }
  startups.sort((a, b) => b.ratio - a.ratio || b.recent - a.recent);

  // 热力图共用的日期窗口（最新日期在最左）
  const win = heatRange ? D.dates.slice(-heatRange) : D.dates.slice();
  const off = D.dates.length - win.length;
  const dates = [...win].reverse();
  const step = Math.ceil(dates.length / 15);

  const heatTableHtml = (title, hint, roots, rgb) => {
    const rows = [];
    const childrenSorted = nm => sortBy5((TAX[nm] || []).filter(ch => taxCids(ch).size));
    const addRow = (nm, lvl) => {
      rows.push({ nm, lvl, series: taxSeries(nm).slice(off).reverse(),
                  sum5: taxSeries(nm).slice(-5).reduce((a, b) => a + b, 0) });
      if (heatExpanded.has(nm))
        for (const ch of childrenSorted(nm)) addRow(ch, lvl + 1);
    };
    for (const r of roots) addRow(r, 1);
    if (!rows.length) return '';
    const vmax = Math.max(4, ...rows.filter(r => r.lvl === 1).flatMap(r => r.series));
    return `
    <div class="chart-card" style="padding:0;overflow:hidden;margin-top:14px">
      <div class="ch-h" style="padding:10px 14px 6px"><b>${title}</b>
        <span class="muted small">${hint}</span></div>
      <div class="heatwrap"><table class="heatmap">
        <thead><tr><th class="rowlab"></th>${dates.map((d, i) =>
          `<th${i % step === 0 ? ' class="dlab"' : ''}>${i % step === 0 ? d.slice(5) : ''}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r => heatRowHtml(r, dates, vmax, rgb)).join('')}</tbody>
      </table></div></div>`;
  };

  let html = `
  <div class="datebar"><h2 style="margin:0">板块热力</h2>
    <span class="muted small">热度 = 板块内每日去重涨停家数（含子标签）· ▸ 展开 · 点格子看当日个股</span>
    <div class="seg" style="margin-left:auto">
      <button id="h30" class="${heatRange === 30 ? 'on' : ''}">近30日</button>
      <button id="h60" class="${heatRange === 60 ? 'on' : ''}">近60日</button>
      <button id="hall" class="${heatRange === 0 ? 'on' : ''}">全部</button>
    </div></div>`;

  if (startups.length) {
    html += `<div class="startups">${startups.slice(0, 8).map(s => `
      <div class="su-card" data-nm="${esc(s.nm)}">
        <div class="nm">${esc(s.nm)} ${s.isNew ? '<span class="tagnew">新启动</span>' : '<span class="tagnew" style="background:var(--gold)">加速</span>'}</div>
        <div class="meta">近3日均 ${s.recent.toFixed(1)} 家 / 前15日均 ${s.base.toFixed(1)} 家 · ${s.ratio.toFixed(1)}×</div>
        ${spark(taxSeries(s.nm).slice(-15))}
      </div>`).join('')}</div>`;
  } else {
    html += `<div class="muted small" style="margin-bottom:12px">近3日无明显启动的题材（阈值：日均≥3家且≥2.2×基线）</div>`;
  }

  // 题材轮动：top8 根题材的滚动5日热度排名（bump chart）
  const topRoots = themeRoots.slice(0, 8);
  if (topRoots.length >= 3 && win.length >= 8) {
    const roll = nm => {
      const s = taxSeries(nm);
      return win.map((_, i) => {
        const gi = off + i;
        let t = 0;
        for (let k = Math.max(0, gi - 4); k <= gi; k++) t += s[k] ?? 0;
        return t;
      });
    };
    const series = topRoots.map(nm => ({ nm, v: roll(nm) }));
    const ranks = series.map(() => []);
    for (let i = 0; i < win.length; i++) {
      series.map((s, si) => [s.v[i], si]).sort((a, b) => b[0] - a[0])
        .forEach(([, si], pos) => ranks[si][i] = pos);
    }
    const RC = ['#2e6be6', '#00b6a1', '#e0762d', '#8b5cf6', '#d23f77', '#4f9c1f', '#b8860b', '#607d8b'];
    const W = 1000, RH = 34 + topRoots.length * 22, padL = 8, padR = 130, rpT = 14, rpB = 18;
    const RX = i => padL + i * (W - padL - padR) / Math.max(1, win.length - 1);
    const RY = r => rpT + r * (RH - rpT - rpB) / Math.max(1, topRoots.length - 1);
    let rg = '';
    series.forEach((s, si) => {
      rg += `<polyline points="${ranks[si].map((r, i) => `${RX(i).toFixed(1)},${RY(r).toFixed(1)}`).join(' ')}"
        fill="none" stroke="${RC[si % 8]}" stroke-width="2.5" stroke-linejoin="round" opacity=".85"></polyline>`;
      const lr = ranks[si][win.length - 1];
      rg += `<text x="${W - padR + 8}" y="${(RY(lr) + 3.5).toFixed(1)}"
        style="fill:${RC[si % 8]};font-size:11px">#${lr + 1} ${esc(s.nm)}</text>`;
    });
    const stepR = Math.ceil(win.length / 8);
    win.forEach((dd, i) => {
      if (i % stepR === 0) rg += `<text x="${RX(i).toFixed(1)}" y="${RH - 3}">${dd.slice(5)}</text>`;
    });
    html += `<div class="chart-card" style="margin-top:14px"><div class="ch-h"><b>题材轮动</b>
      <span class="muted small">滚动5日热度排名（Top8 根题材）· 线上翘=资金流入 · 交叉点=轮动发生</span></div>
      <svg viewBox="0 0 ${W} ${RH}" width="100%" style="display:block">${rg}</svg></div>`;
  }

  html += heatTableHtml('题材热力', '仅已审核的产业/题材标签', themeRoots, '46,107,230');
  html += heatTableHtml('催化热力', '业绩/分红/重组等事件型催化，单独统计不与题材混排', catRoots, '0,166,150');

  // 未审核新热点：不进正式榜，但按共振度排序绝不隐身（新题材爆发的第一现场）
  const inTreeCids = new Set(taxRoots.flatMap(r => [...taxCids(r)]));
  const orphan = [];
  for (const cid in D.concepts) {
    if (inTreeCids.has(+cid)) continue;
    const [nm, total] = D.concepts[cid];
    const mt = META[nm];
    // 已人工审核定型且不进热度的（属性/事件），不再算"未审核"
    if (mt && mt[1] === 'active' && (mt[0] === 'attribute' || mt[0] === 'event')) continue;
    const c = byConcept[cid];
    let mx = 0, mxd = '';
    for (const [dd, evs] of c.days) {
      const n = new Set(evs.map(e => e[0])).size;
      if (n > mx) { mx = n; mxd = dd; }
    }
    if (mx < 2 && total < 5) continue;
    const s5 = taxSeries(nm).slice(-5).reduce((a, b) => a + b, 0);
    orphan.push({ cid: +cid, nm, total, s5, mx, mxd, stocks: c.stocks.size });
  }
  orphan.sort((a, b) => b.mx - a.mx || b.s5 - a.s5 || b.total - a.total);
  const burst = orphan.filter(o => o.mx >= 3);      // 只留爆发预警，完整队列在治理台
  if (burst.length || orphan.length) {
    html += `<div class="card" style="margin-top:14px"><div class="card-h">
      <span class="cname muted">未审核爆发预警</span>
      <span class="hist">单日共振≥3家的未入树标签 · <span style="cursor:pointer;color:var(--accent)" id="h-gov">完整待审队列在治理台 →</span></span></div>
      <div>${burst.length ? burst.slice(0, 16).map(o =>
        `<span class="concept-chip" data-cid="${o.cid}" style="border-width:2px;font-weight:600">${esc(o.nm)}
         <span class="x">🔥共振${o.mx}家(${o.mxd.slice(5)})${o.s5 ? ' · 近5日' + o.s5 : ''}</span></span><button
           class="clsbtn${FIX[o.nm] ? ' done' : ''}" data-cls="${esc(o.nm)}" title="手动分类">${FIX[o.nm] ? '✎已标' : '✎'}</button>`).join('')
        : '<span class="muted small">近期无未审核标签出现≥3家共振</span>'}</div></div>`;
  }

  $('#app').innerHTML = html;
  $('#h-gov')?.addEventListener('click', () => go('#/tags/gov'));
  $('#h30').onclick = () => { heatRange = 30; renderHeat(); };
  $('#h60').onclick = () => { heatRange = 60; renderHeat(); };
  $('#hall').onclick = () => { heatRange = 0; renderHeat(); };
  document.querySelectorAll('.su-card').forEach(el =>
    el.addEventListener('click', () => gotoTaxNode(el.dataset.nm)));
  document.querySelectorAll('.exp').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const nm = el.dataset.exp;
      heatExpanded.has(nm) ? heatExpanded.delete(nm) : heatExpanded.add(nm);
      renderHeat();
    }));
  document.querySelectorAll('.lname').forEach(el =>
    el.addEventListener('click', () => gotoTaxNode(el.dataset.nm)));
  document.querySelectorAll('.heatmap .cell[data-d]').forEach(el => {
    el.addEventListener('click', () => {
      if (+el.dataset.v > 0)
        go('#/tagday/' + encodeURIComponent(el.dataset.nm) + '/' + el.dataset.d);
    });
    el.addEventListener('mousemove', e =>
      showTip(e, `${el.dataset.nm} · ${el.dataset.d} · ${el.dataset.v} 家涨停`));
    el.addEventListener('mouseleave', hideTip);
  });
  bindChips();
}
function heatRowHtml(r, dates, vmax, rgb) {
  rgb = rgb || '46,107,230';
  const hasKids = (TAX[r.nm] || []).some(ch => taxCids(ch).size);
  const cells = r.series.map((v, i) => {
    const a = v ? Math.min(1, Math.sqrt(v / vmax)) : 0;
    const fg = a > 0.55 ? '#fff' : 'var(--ink2)';
    return `<td class="cell" data-d="${dates[i]}" data-nm="${esc(r.nm)}" data-v="${v}"
      style="background:rgba(${rgb},${a.toFixed(2)});color:${fg}">${v || ''}</td>`;
  }).join('');
  return `<tr><td class="rowlab" style="padding-left:${6 + (r.lvl - 1) * 16}px">
    <span class="exp" data-exp="${esc(r.nm)}">${hasKids ? (heatExpanded.has(r.nm) ? '▾' : '▸') : ''}</span>
    <span class="lname ${r.lvl === 1 ? 'lvl1' : ''}" data-nm="${esc(r.nm)}">${esc(r.nm)}</span>
    <span class="rsum">近5日${r.sum5}</span></td>${cells}</tr>`;
}
function gotoTaxNode(nm) {
  const cid = nameToCid[nm];
  if (cid != null && byConcept[cid]) go('#/concept/' + cid);
  else { heatExpanded.add(nm); if (location.hash === '#/heat') renderHeat(); else go('#/heat'); }
}
function spark(vals) {
  const W = 210, H = 34, max = Math.max(1, ...vals);
  const bw = W / vals.length;
  return `<svg viewBox="0 0 ${W} ${H}" height="${H}" preserveAspectRatio="xMinYMid meet"
    style="width:100%;max-width:${W}px;display:block">` + vals.map((v, i) =>
    v ? `<rect x="${(i * bw + 1).toFixed(1)}" y="${(H - v / max * (H - 4)).toFixed(1)}"
      width="${(bw - 2).toFixed(1)}" height="${(v / max * (H - 4)).toFixed(1)}" rx="1.5"
      fill="rgba(46,107,230,.75)"/>` : '').join('') + '</svg>';
}

/* ---------- 视图7：情绪趋势 ---------- */
let trendRange = 30;
function trendStats(dates) {
  return dates.map(d => {
    const st = D.day_stats[d] || [];
    const evs = (D.events[d] || []).filter(e => !isTouch(e));
    return {
      d,
      num: evs.length,
      touch: st[1] ?? null,
      rate: st[2] != null ? Math.round(st[2] * 100) : null,
      opens: st[3] ?? null,
      lbCnt: evs.filter(e => (e[1] || 1) >= 2).length,
      maxLb: evs.length ? Math.max(...evs.map(e => e[1] || 1)) : 0,
      yizi: evs.filter(e => (e[3] || '').includes('一字')).length,
    };
  });
}
function svgChart(dates, series, fmt) {
  fmt = fmt || (v => v);
  const W = 520, H = 168, padL = 36, padB = 18, padT = 10;
  const all = series.flatMap(s => s.vals).filter(v => v != null);
  const ymax = Math.max(1, ...all) * 1.08;
  const bw = (W - padL - 6) / dates.length;
  const X = i => padL + i * bw + bw / 2;
  const Y = v => H - padB - (H - padB - padT) * v / ymax;
  let g = '';
  for (const frac of [1, 0.5]) {
    const y = Y(ymax * frac / 1.08);
    g += `<line class="grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W}" y2="${y.toFixed(1)}"
      stroke-dasharray="3,4"></line>
      <text x="2" y="${(y + 3.5).toFixed(1)}">${fmt(Math.round(ymax * frac / 1.08))}</text>`;
  }
  g += `<line class="grid" x1="${padL}" y1="${H - padB}" x2="${W}" y2="${H - padB}"></line>`;
  for (const s of series) {
    if (s.type === 'bar') {
      s.vals.forEach((v, i) => {
        if (v == null || !v) return;
        const h = (H - padB) - Y(v);
        g += `<rect x="${(X(i) - bw * 0.31).toFixed(1)}" y="${Y(v).toFixed(1)}"
          width="${(bw * 0.62).toFixed(1)}" height="${h.toFixed(1)}"
          rx="${Math.min(2.5, bw / 4)}" fill="${s.color}"></rect>`;
      });
    } else {
      let seg = [];
      const flush = () => {
        if (seg.length > 1)
          g += `<polyline points="${seg.join(' ')}" fill="none" stroke="${s.color}"
            stroke-width="2" stroke-linejoin="round"></polyline>`;
        seg = [];
      };
      s.vals.forEach((v, i) => {
        if (v == null) return flush();
        seg.push(`${X(i).toFixed(1)},${Y(v).toFixed(1)}`);
      });
      flush();
      s.vals.forEach((v, i) => {
        if (v != null)
          g += `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.2" fill="${s.color}"></circle>`;
      });
    }
  }
  const step = Math.ceil(dates.length / 8);
  dates.forEach((d, i) => {
    if (i % step === 0)
      g += `<text x="${(X(i) - 12).toFixed(1)}" y="${H - 5}">${d.slice(5)}</text>`;
  });
  // 悬浮命中列（最后画，置顶）
  dates.forEach((d, i) => {
    const tip = `${d} · ` + series.map(s =>
      `${s.name} ${s.vals[i] == null ? '—' : fmt(s.vals[i])}`).join(' · ');
    g += `<rect class="hovcol" x="${(padL + i * bw).toFixed(1)}" y="${padT}"
      width="${bw.toFixed(1)}" height="${H - padB - padT}" data-d="${d}"
      data-tip="${esc(tip)}"></rect>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${g}</svg>`;
}
function renderTrend() {
  const dates = trendRange ? D.dates.slice(-trendRange) : D.dates;
  const S = trendStats(dates);
  const last = S[S.length - 1] || {}, prev = S[S.length - 2] || {};
  const C1 = 'rgba(46,107,230,.85)', C2 = 'rgba(0,166,150,.8)';
  const cards = [
    { key: 'num', title: '涨停家数', type: 'bar',
      extra: { key: 'touch', name: '盘中触板', type: 'line' },
      note: '触板远高于涨停=分歧大' },
    { key: 'rate', title: '封板率', type: 'line', fmt: v => v + '%', note: '≥80%强 / ≤60%弱' },
    { key: 'opens', title: '炸板家数', type: 'bar', note: '越高情绪越差' },
    { key: 'lbCnt', title: '连板家数（≥2板）', type: 'bar', note: '梯队宽度' },
    { key: 'maxLb', title: '最高连板（空间板）', type: 'line', note: '梯队高度' },
    { key: 'yizi', title: '一字板家数', type: 'bar', note: '抢筹烈度' },
  ];
  let html = `
  <div class="datebar"><h2 style="margin:0">情绪趋势</h2>
    <span class="muted small">打板情绪温度计 · 悬浮看数值 · 点击跳当日复盘</span>
    <div class="seg" style="margin-left:auto">
      <button id="t30" class="${trendRange === 30 ? 'on' : ''}">近30日</button>
      <button id="t60" class="${trendRange === 60 ? 'on' : ''}">近60日</button>
      <button id="tall" class="${trendRange === 0 ? 'on' : ''}">全部</button>
    </div></div>
  <div class="trend-grid">`;
  for (const c of cards) {
    const fmt = c.fmt || (v => v);
    const series = [{ name: c.title, vals: S.map(r => r[c.key]), type: c.type, color: C1 }];
    if (c.extra)
      series.push({ name: c.extra.name, vals: S.map(r => r[c.extra.key]),
                    type: c.extra.type, color: C2 });
    const lv = last[c.key], pv = prev[c.key];
    const delta = (lv != null && pv != null)
      ? (lv > pv ? `<span class="delta" style="color:var(--up)">▲${fmt(lv - pv)}</span>`
        : lv < pv ? `<span class="delta muted">▼${fmt(pv - lv)}</span>`
        : '<span class="delta muted">—</span>') : '';
    html += `<div class="tcard">
      <div class="th"><b>${c.title}</b>
        ${c.extra ? `<span class="small muted"><span class="dot" style="background:${C1}"></span>${c.title}
          <span class="dot" style="background:${C2};margin-left:8px"></span>${c.extra.name}</span>` : ''}
        <span class="small" style="color:var(--ink3)">${c.note}</span>
        <span class="lv">${lv == null ? '—' : fmt(lv)} ${delta}</span></div>
      ${svgChart(S.map(r => r.d), series, fmt)}</div>`;
  }
  html += '</div>';
  $('#app').innerHTML = html;
  $('#t30').onclick = () => { trendRange = 30; renderTrend(); };
  $('#t60').onclick = () => { trendRange = 60; renderTrend(); };
  $('#tall').onclick = () => { trendRange = 0; renderTrend(); };
  document.querySelectorAll('.hovcol').forEach(el => {
    el.addEventListener('mousemove', e => showTip(e, el.dataset.tip));
    el.addEventListener('mouseleave', hideTip);
    el.addEventListener('click', () => go('#/date/' + el.dataset.d));
  });
}

/* ---------- 视图6：板块×当日下钻 ---------- */
function renderTagDay(nm, d) {
  const cids = taxCids(nm);
  if (!cids.size || !D.dates.includes(d)) {
    $('#app').innerHTML = '<div class="empty">无此板块或日期</div>'; return;
  }
  const evMap = new Map();                       // code -> ev（去重）
  for (const cid of cids)
    for (const ev of (byConcept[cid].days.get(d) || [])) evMap.set(ev[0], ev);
  const evs = [...evMap.values()].sort((a, b) => (b[1] || 1) - (a[1] || 1));
  const di = D.dates.indexOf(d);
  const series = taxSeries(nm);
  const cid0 = nameToCid[nm];

  // 按子标签分组（子标签当日≥1只即成组）
  const kids = (TAX[nm] || []).filter(ch => taxCids(ch).size);
  const groups = [];
  const covered = new Set();
  for (const ch of kids) {
    const chCids = taxCids(ch);
    const list = evs.filter(ev => ev[9].some(c => chCids.has(c)));
    if (list.length) { groups.push([ch, list]); list.forEach(ev => covered.add(ev[0])); }
  }
  groups.sort((a, b) => b[1].length - a[1].length);
  const rest = evs.filter(ev => !covered.has(ev[0]));

  let html = `
  <div class="datebar">
    <button class="navbtn" id="prev" ${di <= 0 ? 'disabled' : ''}>← 前一日</button>
    <b style="font-size:15px">${d}</b><span class="muted small">${weekday(d)}</span>
    <button class="navbtn" id="next" ${di >= D.dates.length - 1 ? 'disabled' : ''}>后一日 →</button>
    <button class="navbtn" id="fullday">当日全部复盘</button>
    <button class="navbtn" id="backheat">← 返回热力图</button>
  </div>
  <div class="detail-h">
    <h2>${cid0 != null && byConcept[cid0]
        ? `<span class="lname" data-cid="${cid0}" style="cursor:pointer">${esc(nm)}</span>` : esc(nm)}
      <span class="muted" style="font-size:14px">· ${d} 共 ${evs.length} 家涨停</span></h2>
    <div class="muted small" style="margin:4px 0 2px">板块热度时间线 · 金框=当前日 · 点柱子切换日期</div>
    <div id="tagtl"></div>
  </div>`;

  if (groups.length) {
    for (const [ch, list] of groups) {
      const chCid = nameToCid[ch];
      html += `<div class="card"><div class="card-h">
        ${chCid != null && byConcept[chCid]
          ? `<span class="cname" data-cid="${chCid}">${esc(ch)}</span>`
          : `<span class="cname lname" data-nm2="${esc(ch)}">${esc(ch)}</span>`}
        <span class="cnt">${list.length} 只</span></div>
        <div class="chips">${list.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
    }
    if (rest.length)
      html += `<div class="card"><div class="card-h"><span class="cname muted">直接标记「${esc(nm)}」</span>
        <span class="cnt">${rest.length} 只</span></div>
        <div class="chips">${rest.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  } else {
    html += `<div class="card"><div class="chips">${evs.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  }
  $('#app').innerHTML = html;
  drawTagTimeline(nm, di);

  $('#prev')?.addEventListener('click', () =>
    go('#/tagday/' + encodeURIComponent(nm) + '/' + D.dates[di - 1]));
  $('#next')?.addEventListener('click', () =>
    go('#/tagday/' + encodeURIComponent(nm) + '/' + D.dates[di + 1]));
  $('#fullday').addEventListener('click', () => go('#/date/' + d));
  $('#backheat').addEventListener('click', () => go('#/heat'));
  document.querySelectorAll('[data-nm2]').forEach(el =>
    el.addEventListener('click', () =>
      go('#/tagday/' + encodeURIComponent(el.dataset.nm2) + '/' + d)));
  bindChips();
}

// 板块下钻页的热度时间线：窗口=当前日前29日~后10日，金框标当前日，点柱子切换
function drawTagTimeline(nm, di) {
  const lo = Math.max(0, di - 29), hi = Math.min(D.dates.length - 1, di + 10);
  const dates = D.dates.slice(lo, hi + 1);
  const vals = taxSeries(nm).slice(lo, hi + 1);
  const active = di - lo;
  const max = Math.max(1, ...vals);
  const W = 1000, H = 130, padL = 26, padB = 20, padT = 8;
  const bw = (W - padL - 4) / dates.length;
  let bars = '', labels = '';
  vals.forEach((v, i) => {
    if (!v) return;
    const x = padL + i * bw, bh = Math.max(2, (H - padB - padT) * v / max);
    bars += `<rect class="bar${i === active ? ' on' : ''}" x="${(x + bw * 0.15).toFixed(1)}"
      y="${(H - padB - bh).toFixed(1)}" width="${Math.max(1, bw * 0.7).toFixed(1)}"
      height="${bh.toFixed(1)}" rx="${Math.min(2, bw / 4)}" data-i="${i}"></rect>`;
  });
  const step = Math.ceil(dates.length / 8);
  dates.forEach((dd, i) => {
    if (i % step === 0) labels += `<text x="${(padL + i * bw).toFixed(1)}" y="${H - 5}">${dd.slice(5)}</text>`;
  });
  $('#tagtl').innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block">
    <line class="grid" x1="${padL}" y1="${H - padB}" x2="${W}" y2="${H - padB}"></line>
    <line class="grid" x1="${padL}" y1="${padT}" x2="${W}" y2="${padT}" stroke-dasharray="3,4"></line>
    <text x="2" y="${padT + 4}">${max}</text>${bars}${labels}</svg>`;
  $('#tagtl').querySelectorAll('.bar').forEach(b => {
    const i = +b.dataset.i;
    b.addEventListener('mousemove', e => showTip(e, `${dates[i]} · ${vals[i]} 家涨停`));
    b.addEventListener('mouseleave', hideTip);
    b.addEventListener('click', () =>
      go('#/tagday/' + encodeURIComponent(nm) + '/' + dates[i]));
  });
}

/* ---------- 视图4：批量归类 ---------- */
let batchText = '';
function renderBatch() {
  $('#app').innerHTML = `
  <h2>批量归类 <span class="muted small">粘贴任意文本（股票代码/名称混排均可），快速判断属于什么板块、板块热不热</span></h2>
  <textarea id="bt" placeholder="例如：301316 雅克科技 300688 002409&#10;或直接粘贴一段涨停播报文字">${esc(batchText)}</textarea>
  <button class="btn-primary" id="bgo">归类分析</button>
  <div id="bres" style="margin-top:16px"></div>`;
  $('#bgo').onclick = runBatch;
  $('#bt').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') runBatch();
  });
  if (batchText) runBatch();
}
function runBatch() {
  batchText = $('#bt').value;
  const found = new Set(batchText.match(/\d{6}/g) || []);
  // 按名称匹配（长名优先，避免子串误配）
  const names = Object.entries(D.stocks).sort((a, b) => b[1].length - a[1].length);
  let rest = batchText;
  for (const [code, nm] of names) {
    if (nm && rest.includes(nm)) { found.add(code); rest = rest.split(nm).join(' '); }
  }
  if (!found.size) { $('#bres').innerHTML = '<div class="empty">未识别到股票代码或名称</div>'; return; }

  let html = '';
  for (const code of found) {
    const hist = byStock[code];
    if (!hist) {
      html += `<div class="card"><div class="card-h">
        <span class="cname" data-code="${code}">${esc(D.stocks[code] || code)}</span>
        <span class="code muted small">${code} · ${boardOf(code)}</span>
        <span class="hist">近1年无涨停记录</span></div></div>`;
      continue;
    }
    const nZt = hist.filter(x => !isTouch(x.ev)).length;
    const nTc = hist.length - nZt;
    html += `<div class="card">
      <div class="card-h">
        <span class="cname" data-code="${code}">${esc(D.stocks[code])}</span>
        <span class="code muted small">${code} · ${boardOf(code)}</span>
        <span class="hist">涨停 ${nZt} 次${nTc ? ' · 触及 ' + nTc + ' 次' : ''} · 最近 ${hist[hist.length - 1].d}</span>
      </div>${typedTagRows(hist, { maxTheme: 6 })}</div>`;
  }
  $('#bres').innerHTML = html;
  bindChips();
}

/* ---------- 视图8：全局筛选 ---------- */
const FLT = { days: 10, touch: false, lb: 0, boards: new Set(),
              sel: { theme: new Set(), cat: new Set(), attr: new Set(), evt: new Set() },
              more: new Set(), q: '', qFocus: false };
const BUCKET_OF = t => (t === 'sector' || t === 'theme') ? 'theme'
  : t === 'catalyst' ? 'cat' : t === 'attribute' ? 'attr' : 'evt';

function renderFilter() {
  const win = FLT.days ? D.dates.slice(-FLT.days) : D.dates;

  // 窗口内每概念去重家数 → 四个类型行的可选标签
  const cidStocks = new Map();
  for (const d of win) for (const ev of D.events[d])
    for (const cid of ev[9]) (cidStocks.get(cid) ?? cidStocks.set(cid, new Set()).get(cid)).add(ev[0]);
  const buckets = { theme: [], cat: [], attr: [], evt: [] };
  for (const [cid, s] of cidStocks) {
    const nm = D.concepts[cid][0];
    buckets[BUCKET_OF(typeOf(nm))].push({ nm, n: s.size });
  }
  for (const k in buckets) {
    buckets[k].sort((a, b) => b.n - a.n || (a.nm < b.nm ? -1 : 1));
    for (const nm of FLT.sel[k])                       // 已选但窗口内没出现的，保留可退选
      if (!buckets[k].some(t => t.nm === nm)) buckets[k].push({ nm, n: 0 });
  }

  // 条件 → cid 集合（题材树节点自动含全部后代）
  const selCids = key => {
    const out = new Set();
    for (const nm of FLT.sel[key]) {
      if (key === 'theme') for (const c of taxCids(nm)) out.add(c);
      const cid = nameToCid[nm];
      if (cid != null) out.add(cid);
    }
    return out;
  };
  const conds = ['theme', 'cat', 'attr', 'evt'].map(selCids).filter(s => s.size);

  // 逐股聚合（窗口内）
  const agg = new Map();
  for (const d of win) for (const ev of D.events[d]) {
    const touch = isTouch(ev);
    if (touch && !FLT.touch) continue;
    const a = agg.get(ev[0]) ?? agg.set(ev[0], { zt: 0, tc: 0, maxLb: 0, last: '', lastEv: null, cids: new Set() }).get(ev[0]);
    if (touch) a.tc++; else { a.zt++; a.maxLb = Math.max(a.maxLb, ev[1] || 1); }
    if (d >= a.last) { a.last = d; a.lastEv = ev; }
    for (const cid of ev[9]) a.cids.add(cid);
  }
  let rows = [...agg].map(([code, a]) => ({ code, ...a }));
  if (!FLT.touch) rows = rows.filter(r => r.zt > 0);
  if (FLT.boards.size) rows = rows.filter(r => FLT.boards.has(boardOf(r.code)));
  if (FLT.lb) rows = rows.filter(r => r.maxLb >= FLT.lb);
  for (const cs of conds)
    rows = rows.filter(r => { for (const c of cs) if (r.cids.has(c)) return true; return false; });
  rows.sort((a, b) => b.zt - a.zt || b.maxLb - a.maxLb || (a.last < b.last ? 1 : -1));

  // 命中标签展示：有条件显示命中的，无条件显示前3个题材
  const allSel = new Set(conds.flatMap(s => [...s]));
  const hitTags = r => {
    const ids = allSel.size ? [...r.cids].filter(c => allSel.has(c)) : [...r.cids].slice(0, 6);
    const named = ids.map(c => ({ c, nm: D.concepts[c][0] }));
    const show = allSel.size ? named : named.filter(x => isTheme(x.nm)).slice(0, 3);
    return show.map(x => `<span class="concept-chip" data-cid="${x.c}" style="padding:1px 8px;font-size:12px">${esc(x.nm)}</span>`).join('') || '—';
  };

  const seg = (opts, cur, idp) => `<div class="seg">${opts.map(([v, lbl], i) =>
    `<button id="${idp}${i}" data-v="${v}" class="${String(cur) === String(v) ? 'on' : ''}">${lbl}</button>`).join('')}</div>`;
  const tagRow = (key, label, lcls, ccls) => {
    const list = buckets[key].filter(t => !FLT.q || t.nm.includes(FLT.q) || FLT.sel[key].has(t.nm));
    const cap = FLT.more.has(key) ? 999 : 18;
    const shown = list.slice(0, cap);
    const moreBtn = list.length > cap
      ? `<span class="clsbtn" data-more="${key}">更多+${list.length - cap}</span>`
      : (FLT.more.has(key) && list.length > 18 ? `<span class="clsbtn" data-more="${key}">收起</span>` : '');
    return `<div class="trow"><span class="tlabel ${lcls}">${label}</span><div class="tbody">
      ${shown.map(t => `<span class="concept-chip ${ccls}${FLT.sel[key].has(t.nm) ? ' sel' : ''}"
        data-f="${key}" data-nm="${esc(t.nm)}">${esc(t.nm)}<span class="x">${t.n || ''}</span></span>`).join('')}
      ${moreBtn}</div></div>`;
  };
  const BOARDS = ['主板', '创业板', '科创板', '北交所'];
  const nSel = Object.values(FLT.sel).reduce((a, s) => a + s.size, 0);
  const shown = rows.slice(0, 150);

  ($('#tagsub') || $('#app')).innerHTML = `
  <div class="datebar">
    <span class="muted small">行内多选=或，跨行=且 · 题材自动含子标签</span></div>
  <div class="fltbar">
    <div class="fltrow">
      <span class="flabel">时间窗</span>${seg([[5, '近5日'], [10, '近10日'], [30, '近30日'], [0, '全部']], FLT.days, 'fd')}
      <span class="flabel">连板</span>${seg([[0, '不限'], [2, '≥2板'], [3, '≥3板']], FLT.lb, 'fl')}
      <span class="flabel">范围</span>${seg([[0, '仅涨停'], [1, '含触及']], FLT.touch ? 1 : 0, 'ft')}
      ${BOARDS.map(b => `<span class="concept-chip${FLT.boards.has(b) ? ' sel' : ''}" data-b="${b}" style="padding:2px 10px">${b}</span>`).join('')}
      <input id="f-q" placeholder="搜标签名过滤下方行" value="${esc(FLT.q)}">
      ${nSel ? '<button class="navbtn" id="f-clear">清空条件</button>' : ''}
    </div>
    ${tagRow('theme', '题材', 'tl-theme', '')}
    ${tagRow('cat', '催化', 'tl-cat', 'c-cat')}
    ${tagRow('attr', '属性', 'tl-attr', 'c-attr')}
    ${tagRow('evt', '事件·未审核', 'tl-evt', 'c-evt')}
  </div>
  <div class="muted small" style="margin:0 2px 8px">命中 <b>${rows.length}</b> 只${rows.length > 150 ? '（仅显示前150）' : ''}</div>
  <div class="tablewrap"><table>
    <thead><tr><th>股票</th><th>涨停</th>${FLT.touch ? '<th>触及</th>' : ''}<th>最高连板</th><th>最近</th><th>首封时间</th><th>命中标签</th></tr></thead>
    <tbody>${shown.map(r => `
      <tr data-code="${r.code}">
        <td>${esc(D.stocks[r.code] || '')}<span class="muted small">（${boardOf(r.code)}）</span>
          <span class="code muted small">${r.code}</span></td>
        <td class="num">${r.zt}</td>${FLT.touch ? `<td class="num">${r.tc || ''}</td>` : ''}
        <td>${r.maxLb >= 2 ? `<span class="lb ${r.maxLb >= 3 ? 'lb3' : 'lb2'}">${r.maxLb}板</span>` : (r.zt ? '首板' : '<span class="lb lbt">⚡触及</span>')}</td>
        <td class="num">${r.last}</td><td class="num">${r.lastEv?.[7] || '—'}</td>
        <td>${hitTags(r)}</td></tr>`).join('')}
    </tbody></table></div>
  ${!rows.length ? '<div class="empty">无命中，放宽条件试试</div>' : ''}`;

  // 绑定
  const rerender = () => renderFilter();
  [['fd', v => FLT.days = +v], ['fl', v => FLT.lb = +v], ['ft', v => FLT.touch = !!+v]]
    .forEach(([idp, set]) => document.querySelectorAll(`[id^="${idp}"]`).forEach(el =>
      el.addEventListener('click', () => { set(el.dataset.v); rerender(); })));
  document.querySelectorAll('[data-b]').forEach(el =>
    el.addEventListener('click', () => {
      const b = el.dataset.b;
      FLT.boards.has(b) ? FLT.boards.delete(b) : FLT.boards.add(b);
      rerender();
    }));
  document.querySelectorAll('[data-f]').forEach(el =>
    el.addEventListener('click', () => {

const TAGS = { tab: 'tree', sel: null, expanded: new Set(), onlyActive: true, days: 10,
               govSel: new Set(), govQ: '' };

function renderTags(sub) {
