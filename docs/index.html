<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>涨停概念图谱</title>
<style>
  /* 字节跳动风格蓝绿主题：--accent 蓝=品牌/交互，--teal 青绿=辅助，--up 红=涨停语义（A股红涨） */
  :root {
    --bg: #f5f7fa; --surface: #ffffff; --surface2: #eef1f6;
    --ink: #1f2329; --ink2: #646a73; --ink3: #9aa0a8;
    --line: #dfe3ea; --accent: #2e6be6; --accent-ink: #ffffff;
    --accent-soft: #e9f0ff; --accent-line: #c9d9ff;
    --teal: #00b6a1; --teal-soft: #e0f7f3; --teal-line: #b3e8df;
    --product: #008fa8; --product-soft: #e3f6f8;
    --theme: #7755cc; --theme-soft: #f0ebff;
    --up: #e03e2d; --up-soft: #fdecea; --up-line: #f5c6bf;
    --gold: #8a6d1c; --gold-soft: #f6efd9;
    --shadow: 0 1px 3px rgba(30,50,90,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141821; --surface: #1c212b; --surface2: #232936;
      --ink: #e6e9ee; --ink2: #9aa3b2; --ink3: #67707f;
      --line: #303747; --accent: #5b8cff; --accent-ink: #fff;
      --accent-soft: #1d2a47; --accent-line: #31456f;
      --teal: #2bc4b2; --teal-soft: #143430; --teal-line: #1f4f48;
      --product: #48b9ca; --product-soft: #16343a;
      --theme: #a58be8; --theme-soft: #29233d;
      --up: #f0544a; --up-soft: #3a221f; --up-line: #5c332d;
      --gold: #d4b355; --gold-soft: #322b18;
      --shadow: 0 1px 3px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 14px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  a { color: inherit; text-decoration: none; }

  header { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 14px;
           padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--line); }
  .brand { font-size: 16px; font-weight: 700; white-space: nowrap; cursor: pointer; }
  .brand b { background: linear-gradient(90deg, var(--accent), var(--teal));
             -webkit-background-clip: text; background-clip: text; color: transparent; }
  nav { display: flex; gap: 4px; }
  nav button { border: none; background: none; color: var(--ink2); font-size: 13px;
               padding: 5px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  nav button:hover { background: var(--surface2); color: var(--ink); }
  nav button.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .searchbox { position: relative; margin-left: auto; }
  .searchbox input { width: 230px; padding: 6px 10px; border: 1px solid var(--line);
                     border-radius: 8px; background: var(--bg); color: var(--ink); font-size: 13px; }
  .searchbox input:focus { outline: none; border-color: var(--accent); }
  #q-drop { position: absolute; right: 0; top: 34px; min-width: 260px; max-height: 320px; overflow: auto;
            background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0,0,0,.14); display: none; }
  #q-drop .item { padding: 7px 12px; cursor: pointer; display: flex; gap: 8px; align-items: baseline; }
  #q-drop .item:hover, #q-drop .item.sel { background: var(--surface2); }
  #q-drop .kind { font-size: 11px; color: var(--ink3); }
  #gen-at { font-size: 11px; color: var(--ink3); white-space: nowrap; }

  main { max-width: 1060px; margin: 0 auto; padding: 18px 20px 80px; }
  h2 { font-size: 18px; margin: 6px 0 12px; }
  .muted { color: var(--ink2); } .small { font-size: 12px; }

  /* 日期工具条 */
  .datebar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .datebar input[type=date] { padding: 5px 8px; border: 1px solid var(--line); border-radius: 8px;
                              background: var(--surface); color: var(--ink); font-size: 14px; }
  .navbtn { border: 1px solid var(--line); background: var(--surface); color: var(--ink);
            border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; }
  .navbtn:hover { border-color: var(--accent); color: var(--accent); }
  .navbtn:disabled { opacity: .4; cursor: default; }
  .navbtn:disabled:hover { border-color: var(--line); color: var(--ink); }

  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
          padding: 8px 16px; box-shadow: var(--shadow); }
  .stat .v { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .k { font-size: 11px; color: var(--ink2); }

  /* 概念卡片 */
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
          padding: 12px 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .card-h { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .card-h .cname { font-size: 15px; font-weight: 700; cursor: pointer; }
  .card-h .cname:hover { color: var(--accent); }
  .card-h .cnt { font-size: 12px; color: var(--accent); font-weight: 600; }
  .card-h .hist { font-size: 11px; color: var(--ink3); margin-left: auto; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px;
          background: var(--surface2); border: 1px solid var(--line); border-radius: 999px;
          cursor: pointer; font-size: 13px; }
  .chip:hover { border-color: var(--accent); }
  .chip.yizi { border-style: dashed; border-color: var(--gold); }
  .chip.touch { border-style: dashed; opacity: .78; }
  .chip .code { font-size: 11px; color: var(--ink3); font-variant-numeric: tabular-nums; }
  .lb { font-size: 11px; font-weight: 700; border-radius: 5px; padding: 0 5px; line-height: 17px; }
  .lb1 { background: var(--surface2); color: var(--ink3); border: 1px solid var(--line); }
  .lb2 { background: var(--up-soft); color: var(--up); border: 1px solid var(--up-line); }
  .lb3 { background: var(--up); color: #fff; }
  .lbt { background: var(--surface2); color: var(--ink2); border: 1px dashed var(--ink3); }
  .board { font-size: 10px; color: var(--ink3); }

  /* 表格 */
  table { width: 100%; border-collapse: collapse; background: var(--surface);
          border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .tablewrap { overflow-x: auto; border-radius: 12px; box-shadow: var(--shadow); }
  th, td { text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--line);
           font-size: 13px; white-space: nowrap; }
  th { background: var(--surface2); color: var(--ink2); font-size: 12px; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--surface2); }
  td.num { font-variant-numeric: tabular-nums; }

  /* 概念/个股详情头 */
  .detail-h { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
              padding: 14px 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .detail-h h2 { margin: 0 0 4px; }
  .concept-chip { display: inline-flex; gap: 6px; align-items: baseline; padding: 4px 11px;
                  border-radius: 999px; background: var(--accent-soft); color: var(--accent);
                  border: 1px solid var(--accent-line); cursor: pointer; font-size: 13px; margin: 3px 4px 3px 0; }
  .concept-chip:hover { background: var(--accent); color: var(--accent-ink); }
  .concept-chip .x { opacity: .75; font-size: 11px; }

  /* 时间线图 */
  .chart-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
                padding: 12px 14px 6px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .chart-card .ch-h { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .seg button { border: none; background: var(--surface); color: var(--ink2); font-size: 12px;
                padding: 3px 10px; cursor: pointer; }
  .seg button.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  svg .bar { fill: var(--accent); opacity: .82; cursor: pointer; }
  svg .bar:hover { opacity: 1; }
  svg .bar.on { opacity: 1; stroke: var(--gold); stroke-width: 2; }
  #tl svg, #tagtl svg { height: 130px; }
  @media (max-width: 640px) { #tl svg, #tagtl svg { height: 100px; } }
  svg text { fill: var(--ink3); font-size: 10px; }
  svg line.grid { stroke: var(--line); stroke-width: 1; }

  #tooltip { position: fixed; z-index: 99; pointer-events: none; display: none;
             background: var(--ink); color: var(--bg); padding: 5px 10px; border-radius: 8px;
             font-size: 12px; box-shadow: 0 4px 14px rgba(0,0,0,.25); }

  /* 板块热力：产业 / 细分产品 / 题材三层分开展示，再按同日同股做交叉透视 */
  .heat-guide { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
                padding: 12px 14px; margin-bottom: 12px; background: var(--surface);
                border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); }
  .heat-guide .guide-copy { flex: 1; min-width: 260px; }
  .heat-guide .guide-copy b { display: block; font-size: 15px; }
  .focus-picker { display: flex; min-width: 240px; }
  .focus-picker input { width: 190px; min-width: 0; padding: 6px 9px;
                        border: 1px solid var(--line); border-right: 0;
                        border-radius: 8px 0 0 8px; background: var(--surface);
                        color: var(--ink); font-size: 13px; }
  .focus-picker input:focus { outline: none; border-color: var(--accent); }
  .focus-picker button { padding: 5px 11px; border: 1px solid var(--accent);
                         border-radius: 0 8px 8px 0; background: var(--accent-soft);
                         color: var(--accent); cursor: pointer; font-size: 12px; }
  .focus-picker button:hover { background: var(--accent); color: #fff; }
  .metric-guide { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
                  gap: 1px; margin-bottom: 12px; overflow: hidden;
                  border: 1px solid var(--line); border-radius: 10px; background: var(--line); }
  .metric-item { padding: 7px 10px; background: var(--surface); color: var(--ink2);
                 font-size: 10px; line-height: 1.45; }
  .metric-item b { display: block; margin-bottom: 1px; color: var(--ink); font-size: 11px; }
  .metric-item code { color: var(--accent); font: inherit; }
  .tags-metric-guide { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  @media (max-width: 900px) { .tags-metric-guide { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .layer-overview { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
                    gap: 10px; margin-bottom: 14px; }
  .layer-card { --layer:var(--accent); --layer-soft:var(--accent-soft); background: var(--surface);
                border: 1px solid var(--line); border-top: 3px solid var(--layer);
                border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow);
                min-width: 0; }
  .layer-card.product { --layer:var(--product); --layer-soft:var(--product-soft); }
  .layer-card.theme { --layer:var(--theme); --layer-soft:var(--theme-soft); }
  .layer-card .layer-head { display: flex; align-items: baseline; gap: 7px; margin-bottom: 7px; }
  .layer-card .layer-head b { color: var(--layer); font-size: 14px; }
  .layer-card .layer-head span { color: var(--ink3); font-size: 10px; }
  .layer-hot { display: grid; grid-template-columns: minmax(0, 1fr) 64px 28px;
               align-items: center; gap: 6px; width: 100%; border: 0; border-radius: 7px;
               padding: 4px 5px; background: transparent; color: var(--ink);
               text-align: left; cursor: pointer; font: inherit; }
  .layer-hot:hover, .layer-hot.on { background: var(--layer-soft); }
  .layer-hot .hot-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .layer-hot .hot-bar { height: 5px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
  .layer-hot .hot-bar i { display: block; height: 100%; border-radius: inherit; background: var(--layer); }
  .layer-hot strong { color: var(--layer); font-size: 11px; text-align: right;
                      font-variant-numeric: tabular-nums; }
  .start-mark { margin-left: 4px; padding: 0 4px; border-radius: 4px;
                background: var(--teal-soft); color: var(--teal); font-size: 9px; }

  .cross-card { margin-bottom: 14px; padding: 0; overflow: hidden; background: var(--surface);
                border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); }
  .cross-head { display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
                padding: 11px 14px; border-bottom: 1px solid var(--line); }
  .cross-head h3 { margin: 0; font-size: 15px; }
  .cross-head .focus-name { color: var(--accent); }
  .cross-head .cross-summary { margin-left: auto; color: var(--ink2); font-size: 11px; }
  .type-badge { display: inline-flex; align-items: center; justify-content: center;
                min-width: 38px; padding: 1px 6px; border-radius: 5px;
                font-size: 10px; font-weight: 700; }
  .type-badge.sector { color: var(--accent); background: var(--accent-soft); }
  .type-badge.product { color: var(--product); background: var(--product-soft); }
  .type-badge.theme { color: var(--theme); background: var(--theme-soft); }
  .type-badge.catalyst { color: var(--teal); background: var(--teal-soft); }
  .cross-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .cross-col { --layer:var(--accent); --layer-soft:var(--accent-soft); padding: 12px 14px 13px; min-width: 0; }
  .cross-col + .cross-col { border-left: 1px solid var(--line); }
  .cross-col.product { --layer:var(--product); --layer-soft:var(--product-soft); }
  .cross-col.theme { --layer:var(--theme); --layer-soft:var(--theme-soft); }
  .cross-col-h { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px;
                 color: var(--layer); font-size: 12px; font-weight: 700; }
  .cross-col-h span { margin-left: auto; color: var(--ink3); font-size: 10px; font-weight: 400; }
  .cross-node { display: block; width: 100%; margin: 4px 0; padding: 6px 7px;
                border: 1px solid transparent; border-radius: 8px; background: transparent;
                color: var(--ink); text-align: left; cursor: pointer; }
  .cross-node:hover, .cross-node.on { border-color: var(--layer); background: var(--layer-soft); }
  .cross-node-top { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .cross-node-top .cn-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cross-node-top strong { margin-left: auto; color: var(--layer); font-size: 11px;
                           font-variant-numeric: tabular-nums; }
  .cross-meter { height: 3px; margin: 4px 0 2px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .cross-meter i { display: block; height: 100%; background: var(--layer); border-radius: inherit; }
  .cross-node-meta { color: var(--ink3); font-size: 9px; }
  .cross-empty { padding: 18px 0; color: var(--ink3); font-size: 11px; text-align: center; }
  .driver-strip { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap;
                  padding: 9px 14px; border-top: 1px solid var(--line);
                  background: var(--surface2); font-size: 11px; }
  .driver-strip .driver-title { color: var(--teal); font-weight: 700; padding-top: 3px; }
  .driver-chip { padding: 2px 8px; border: 1px solid var(--teal-line); border-radius: 999px;
                 background: var(--teal-soft); color: var(--teal); cursor: pointer; }
  .driver-chip:hover { background: var(--teal); color: #fff; }
  .cross-stocks { padding: 10px 14px 12px; border-top: 1px solid var(--line); }
  .cross-stocks-h { display: flex; align-items: baseline; gap: 8px; margin-bottom: 7px; }
  .cross-stocks-h b { font-size: 12px; }
  .cross-stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 6px; }
  .cross-stock { padding: 7px 9px; border: 1px solid var(--line); border-radius: 8px;
                 background: var(--surface); cursor: pointer; min-width: 0; }
  .cross-stock:hover { border-color: var(--accent); }
  .cross-stock .stock-main { display: flex; align-items: baseline; gap: 5px; font-size: 12px; }
  .cross-stock .stock-main b { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cross-stock .stock-main span { color: var(--ink3); font-size: 10px; }
  .cross-stock .stock-date { margin-left: auto; }
  .cross-stock .stock-tags { margin-top: 2px; color: var(--ink2); font-size: 10px;
                             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .layer-heat-head { display: flex; align-items: baseline; gap: 8px; padding: 10px 14px 6px; }
  .layer-heat-head .type-badge { margin-right: 1px; }
  .layer-heat-head .layer-count { margin-left: auto; color: var(--ink3); font-size: 10px; }
  .heatwrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--line);
              border-radius: 12px; box-shadow: var(--shadow); }
  .heatmap { border-collapse: collapse; table-layout: fixed; }
  .heatmap th, .heatmap td { border: none; padding: 0; }
  .heatmap thead th { position: sticky; top: 0; background: var(--surface2); font-size: 10px;
                      color: var(--ink3); padding: 4px 0 4px 2px; font-weight: 500;
                      text-align: left; white-space: nowrap; overflow: visible; }
  .heatmap thead th:not(.rowlab) { width: 26px; }
  .heatmap thead th.dlab { z-index: 1; }   /* 日期文字压过相邻空表头的背景 */
  .heatmap td.rowlab, .heatmap th.rowlab { position: sticky; left: 0; background: var(--surface);
      z-index: 2; padding: 3px 10px 3px 6px; font-size: 13px; white-space: nowrap;
      border-right: 1px solid var(--line); width: 190px; overflow: hidden;
      text-overflow: ellipsis; }
  .heatmap tbody tr { cursor: default; }
  .heatmap tbody tr:hover td.rowlab { color: var(--accent); }
  .heatmap td.cell { width: 26px; height: 24px; text-align: center; font-size: 10px;
                     font-variant-numeric: tabular-nums; cursor: pointer;
                     border: 1px solid var(--bg); border-radius: 4px; }
  .exp { display: inline-block; width: 14px; color: var(--ink3); user-select: none; font-size: 10px; }
  .rowlab .lvl1 { font-weight: 700; } .rowlab .lname { cursor: pointer; }
  .rowlab .lname:hover { color: var(--accent); }
  .rowlab .rsum { font-size: 10px; color: var(--ink3); margin-left: 5px; }
  .rowlab .row-type { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
                      margin: 0 7px 1px 1px; background: var(--accent); }
  .rowlab .row-type.product { background: var(--product); }
  .rowlab .row-type.theme { background: var(--theme); }
  .rowlab .row-type.catalyst { background: var(--teal); }
  .heat-more { display: block; margin: 8px auto 1px; padding: 4px 14px; border: 1px solid var(--line);
               border-radius: 7px; background: var(--surface); color: var(--ink2);
               cursor: pointer; font-size: 11px; }
  .heat-more:hover { border-color: var(--accent); color: var(--accent); }
  .hierarchy { margin-top: 6px; font-size: 12px; color: var(--ink2); }

  /* 关联新闻 */
  .newsbtn { border: 1px solid var(--accent-line); background: var(--accent-soft);
             color: var(--accent); border-radius: 6px; padding: 1px 8px; font-size: 12px;
             cursor: pointer; }
  .newsbtn:hover { background: var(--accent); color: var(--accent-ink); }
  tr.newsrow td { background: var(--surface2); white-space: normal; padding: 8px 14px; }
  .newsitem { margin: 3px 0; font-size: 13px; }
  .newsitem a { color: var(--ink); }
  .newsitem a:hover { color: var(--accent); text-decoration: underline; }
  .newsitem .nmeta { color: var(--ink3); font-size: 11px; margin-left: 8px; }
  .brief { color: var(--accent); font-size: 13px; margin-bottom: 5px; }
  .brief::before { content: '✨ '; }
  td .briefcell { color: var(--ink2); font-size: 12px; white-space: normal; }

  /* 情绪趋势 */
  .trend-grid { display: grid;
                grid-template-columns: repeat(auto-fit, minmax(min(100%, 420px), 1fr));
                gap: 12px; }
  .tcard { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
           padding: 10px 14px 4px; box-shadow: var(--shadow); }
  .tcard .th { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
  .tcard .th b { font-size: 13px; }
  .tcard .lv { margin-left: auto; font-size: 17px; font-weight: 700;
               font-variant-numeric: tabular-nums; }
  .tcard .delta { font-size: 11px; font-weight: 400; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px;
         margin-right: 4px; vertical-align: baseline; }
  svg .hovcol { fill: transparent; cursor: pointer; }
  svg .hovcol:hover { fill: rgba(46,107,230,.08); }
  @media (max-width: 640px) { .trend-grid { grid-template-columns: 1fr; } }

  /* 批量归类 */
  textarea { width: 100%; min-height: 90px; padding: 10px 12px; border: 1px solid var(--line);
             border-radius: 10px; background: var(--surface); color: var(--ink);
             font: 13px/1.5 ui-monospace, Menlo, monospace; resize: vertical; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .btn-primary { background: linear-gradient(90deg, var(--accent), var(--teal)); color: #fff;
                 border: none; border-radius: 8px;
                 padding: 8px 20px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { filter: brightness(1.08); }
  .hot { color: var(--up); font-weight: 600; }

  /* 标签类型分区（个股页/批量归类）：左侧类型色标 + 右侧内容 */
  .trow { display: flex; gap: 10px; margin-top: 8px; align-items: flex-start; }
  .tlabel { flex: 0 0 72px; text-align: center; font-size: 11px; font-weight: 600;

  .tl-sector { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-line); }

  .tl-theme { background: var(--theme-soft); color: var(--theme); border: 1px solid var(--theme); }
  .tl-mixed { background: var(--surface2); color: var(--ink2); border: 1px solid var(--line); }

  .concept-chip.c-sector { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }

  .concept-chip.c-product { background: var(--product-soft); color: var(--product); border-color: var(--product); }
  .concept-chip.c-product:hover { background: var(--product); color: #fff; }
  .concept-chip.c-theme { background: var(--theme-soft); color: var(--theme); border-color: var(--theme); }
  .concept-chip.c-theme:hover { background: var(--theme); color: #fff; }
  .concept-chip.c-cat { background: var(--teal-soft); color: var(--teal); border-color: var(--teal-line); }
  .concept-chip.c-cat:hover { background: var(--teal); color: #fff; }
  .concept-chip.c-attr { background: var(--gold-soft); color: var(--gold); border-color: var(--gold); }
  .concept-chip.c-attr:hover { background: var(--gold); color: #fff; }
  .concept-chip.c-evt { background: var(--surface2); color: var(--ink2);
                        border-style: dashed; border-color: var(--ink3); }

  /* 全局筛选：选中态 = 实心填充 */
  .concept-chip.sel { background: var(--accent); color: #fff; border-color: var(--accent); }
  .concept-chip.c-sector.sel { background: var(--accent); color: #fff; border-color: var(--accent); }
  .concept-chip.c-product.sel { background: var(--product); color: #fff; border-color: var(--product); }
  .concept-chip.c-theme.sel { background: var(--theme); color: #fff; border-color: var(--theme); }
  .concept-chip.c-cat.sel { background: var(--teal); color: #fff; border-color: var(--teal); }

  /* 标签中心 */

  .tree2col { display: grid; grid-template-columns: minmax(300px, 380px) minmax(0, 1fr); gap: 14px; }

  .panor { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;

  .lc { font-size: 9px; border-radius: 4px; padding: 0 4px; flex: none; line-height: 15px; }

  .govrow { display: flex; align-items: center; gap: 8px; padding: 6px 8px;

         background: var(--bg); color: var(--ink); font-size: 13px; width: 170px; }
  #f-q:focus { outline: none; border-color: var(--accent); }

  /* 题材树（个股页） */

  .tagtree .tanc { color: var(--ink2); font-size: 12px; cursor: pointer; }
  .tagtree .tanc:hover { color: var(--accent); }
  .tagtree .tmini { display: inline-block; margin-left: 5px; padding: 0 4px; border-radius: 4px;
                    font-size: 9px; line-height: 15px; font-weight: 600; }
  .tagtree .tbranch { color: var(--ink3); font-size: 11px; font-family: ui-monospace, monospace; }

  /* 概念详情：上级/下级按真实标签类型分行，不再把产业、产品、题材统称为子标签 */
  .typed-hierarchy { display: grid; gap: 7px; margin-top: 11px; }
  .hier-row { display: flex; align-items: flex-start; gap: 9px; }
  .hier-row .type-badge { flex: 0 0 88px; margin-top: 4px; white-space: nowrap; }
  .hier-tags { flex: 1; min-width: 0; }
  .type-badge.group { color: var(--ink2); background: var(--surface2); border: 1px dashed var(--ink3); }
  .type-badge.other { color: var(--ink3); background: var(--surface2); }

  /* 手动分类弹层 */
  .clsbtn { border: 1px solid var(--line); background: var(--surface); color: var(--ink3);
            border-radius: 6px; padding: 0 6px; font-size: 11px; cursor: pointer; line-height: 18px; }
  .clsbtn:hover { border-color: var(--accent); color: var(--accent); }
  .clsbtn.done { border-color: var(--teal-line); background: var(--teal-soft); color: var(--teal); }
  #modal-mask { position: fixed; inset: 0; z-index: 90; background: rgba(15,20,30,.45); display: none; }
  #modal { position: fixed; z-index: 91; left: 50%; top: 14%; transform: translateX(-50%);
           width: min(420px, calc(100vw - 24px)); background: var(--surface); color: var(--ink);
           border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px;
           box-shadow: 0 12px 40px rgba(0,0,0,.28); display: none; }
  #modal h3 { margin: 0 0 10px; font-size: 15px; }
  #modal .opts { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 10px; }
  #modal .opt { border: 1px solid var(--line); border-radius: 8px; padding: 4px 12px;
                cursor: pointer; font-size: 13px; background: var(--surface); color: var(--ink2); }
  #modal .opt.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  #modal input[type=text] { width: 100%; padding: 6px 10px; border: 1px solid var(--line);
                            border-radius: 8px; background: var(--bg); color: var(--ink); font-size: 13px; }
  #modal .mrow { margin-bottom: 8px; } #modal .mlabel { font-size: 12px; color: var(--ink2); }
  #modal .mbtns { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  #pendbar { position: fixed; z-index: 60; right: 16px; bottom: 16px; display: none;
             background: linear-gradient(90deg, var(--accent), var(--teal)); color: #fff;
             border: none; border-radius: 999px; padding: 9px 18px; font-size: 13px;
             cursor: pointer; box-shadow: 0 6px 20px rgba(20,60,160,.35); }
  #modal textarea { min-height: 150px; font-size: 12px; }
  @media (max-width: 640px) {
    header { flex-wrap: wrap; position: static; padding: 8px 12px; gap: 8px; }
    .brand { font-size: 15px; }
    nav { order: 3; width: 100%; justify-content: space-between; gap: 0; }
    nav button { padding: 4px 8px; font-size: 13px; }
    .searchbox { margin-left: auto; flex: 1; min-width: 120px; }
    .searchbox input { width: 100%; }

    main { padding: 12px 10px 60px; }
    .stat { padding: 6px 12px; } .stat .v { font-size: 17px; }
    .tcard .th .small:not(.lv) { display: none; }  /* 小屏隐藏图例/注释，保留最新值 */
    .heatmap td.rowlab, .heatmap th.rowlab { width: 118px; font-size: 12px; padding-left: 2px; }
    .rowlab .rsum { display: block; margin-left: 14px; line-height: 1.1; }
    .heatmap thead th:not(.rowlab) { width: 24px; }
    .heatmap td.cell { height: 26px; }
    th, td { padding: 6px 8px; }
    .heat-guide { align-items: stretch; }
    .heat-guide .guide-copy { min-width: 100%; }
    .focus-picker { flex: 1; min-width: 0; }
    .focus-picker input { flex: 1; width: auto; }
    .metric-guide, .tags-metric-guide { grid-template-columns: 1fr; }
    .layer-overview { grid-template-columns: 1fr; }
    .cross-grid { grid-template-columns: 1fr; }

    .trow { gap: 6px; }
    .tlabel { flex-basis: 58px; font-size: 10px; }

</style>

<body>
<header>
  <div class="brand" id="brand">涨停<b>概念图谱</b></div>
  <nav>
    <button id="nav-review">每日复盘</button>
    <button id="nav-heat">板块热力</button>
    <button id="nav-filter">标签中心</button>
    <button id="nav-trend">情绪趋势</button>
    <button id="nav-batch">批量归类</button>
  </nav>
  <div class="searchbox">
    <input id="q" placeholder="搜代码 / 名称 / 概念" autocomplete="off">
    <div id="q-drop"></div>
  </div>
  <span id="gen-at"></span>
</header>
<main id="app"></main>
<div id="tooltip"></div>
<div id="modal-mask"></div>
<div id="modal"></div>
<button id="pendbar"></button>

<script src="data.js"></script>
<script>
'use strict';
const D = ZTKG_DATA;
// 手动分类暂存（localStorage）：{标签名: {type, status, parent}}，导出补丁落盘前先在本地生效
const FIX = JSON.parse(localStorage.getItem('ztkg_tagfix') || '{}');
const saveFix = () => { localStorage.setItem('ztkg_tagfix', JSON.stringify(FIX)); updatePendbar(); };
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- 索引 ---------- */
// event 字段: [0 code, 1 连板数, 2 high_days, 3 类型, 4 炸板次数, 5 封单万, 6 市值亿, 7 首封时间, 8 原因, 9 [概念id]]
const byStock = {};                 // code -> [{d, ev}]
const byConcept = {};               // cid  -> { days: Map(date->events[]), stocks: Map(code->count) }
for (const d of D.dates) {
  for (const ev of D.events[d]) {
    (byStock[ev[0]] ??= []).push({ d, ev });
    for (const cid of ev[9]) {
      const c = (byConcept[cid] ??= { days: new Map(), stocks: new Map() });
      if (!c.days.has(d)) c.days.set(d, []);
      c.days.get(d).push(ev);
      c.stocks.set(ev[0], (c.stocks.get(ev[0]) || 0) + 1);
    }
  }
}
const nameToCid = {};
for (const cid in D.concepts) nameToCid[D.concepts[cid][0]] = +cid;
for (const a in D.aliases) nameToCid[a] ??= D.aliases[a];
const recent5 = D.dates.slice(-5);
const hotOf = cid => {
  const c = byConcept[cid]; if (!c) return 0;
  let n = 0; for (const d of recent5) n += (c.days.get(d) || []).length;
  return n;
};
const boardOf = code =>
  code.startsWith('68') ? '科创板' : code.startsWith('30') ? '创业板' :
  (code.startsWith('60') || code.startsWith('00')) ? '主板' :
  /^(8|4|92)/.test(code) ? '北交所' : '其他';
const fmtWan = w => w == null ? '—' : w >= 10000 ? (w / 10000).toFixed(1) + '亿' : w + '万';
const isTouch = ev => ev[10] === 1;          // 触及涨停但收盘未封住（炸板池）
const lbBadge = ev => {
  if (isTouch(ev)) return '<span class="lb lbt">⚡触及</span>';
  const lb = ev[1] || 1, txt = ev[2] || (lb > 1 ? lb + '板' : '首板');
  const cls = lb >= 3 ? 'lb3' : lb === 2 ? 'lb2' : 'lb1';
  return `<span class="lb ${cls}">${esc(txt)}</span>`;
};

/* ---------- 标签层级（taxonomy） ---------- */
const TAX = D.taxonomy || {};
for (const nm in FIX) {                       // 本地暂存的父子关系先生效
  const f = FIX[nm];
  if (f.parent) {
    if (!(TAX[f.parent] || []).includes(nm)) (TAX[f.parent] ??= []).push(nm);
  } else if (['sector', 'product', 'theme', 'catalyst'].includes(f.type)
             && !(nm in TAX) && !Object.values(TAX).flat().includes(nm)) {
    TAX[nm] = [];                             // 无父的热度型标签：自成一级板块
  }
}
const taxChildSet = new Set(Object.values(TAX).flat());
const taxRoots = Object.keys(TAX).filter(p => !taxChildSet.has(p));
const taxParentsOf = name => Object.keys(TAX).filter(p => TAX[p].includes(name));
const _cidsCache = {};
function taxCids(name, stack) {          // 节点及其全部后代对应的概念id集合
  if (_cidsCache[name]) return _cidsCache[name];
  stack = stack || new Set();
  if (stack.has(name)) return new Set(); // 防环
  stack.add(name);
  const s = new Set();
  const own = nameToCid[name];
  if (own != null && byConcept[own]) s.add(own);
  for (const ch of TAX[name] || []) for (const c of taxCids(ch, stack)) s.add(c);
  stack.delete(name);
  return _cidsCache[name] = s;
}
const _seriesCache = {};
function taxSeries(name) {               // 每交易日去重个股数（板块热度）
  if (_seriesCache[name]) return _seriesCache[name];
  const cids = taxCids(name);
  const out = D.dates.map(d => {
    const codes = new Set();
    for (const cid of cids)
      for (const ev of (byConcept[cid].days.get(d) || [])) codes.add(ev[0]);
    return codes.size;
  });
  return _seriesCache[name] = out;
}
function startupOf(series) {             // 近3日 vs 前15日基线
  if (series.length < 6) return null;
  const recent = series.slice(-3).reduce((a, b) => a + b, 0) / 3;
  const baseArr = series.slice(Math.max(0, series.length - 18), -3);
  const base = baseArr.reduce((a, b) => a + b, 0) / Math.max(1, baseArr.length);
  return { recent, base, ratio: (recent + .25) / (base + .25) };
}

/* ---------- 标签类型（tag_meta：七类分型，频道由类型决定） ---------- */
const META = D.tag_meta || {};                       // name -> [type, status, virtual]
for (const nm in FIX)                                // 本地暂存的类型/状态先生效
  if (FIX[nm].type) META[nm] = [FIX[nm].type, FIX[nm].status || 'active', !!FIX[nm].virtual];
const typeOf = nm => (META[nm] || ['unknown'])[0];
const statusOf = nm => (META[nm] || ['unknown', 'candidate'])[1];
const virtualOf = nm => !!(META[nm] || [])[2];
const isTheme = nm => ['sector', 'product', 'theme'].includes(typeOf(nm));
const isCatalyst = nm => typeOf(nm) === 'catalyst';
const heatBucketOf = nm => isTheme(nm) ? 'theme' : isCatalyst(nm) ? 'catalyst' : null;
const isActiveTheme = nm => statusOf(nm) === 'active' && isTheme(nm);
const isActiveCatalyst = nm => statusOf(nm) === 'active' && isCatalyst(nm);
const _heatCidsCache = {};
function heatTaxCids(name, stack) {       // 正式热力：仅 active 且与根节点同频道
  if (_heatCidsCache[name]) return _heatCidsCache[name];
  const bucket = heatBucketOf(name);
  if (!bucket || statusOf(name) !== 'active') return new Set();
  stack = stack || new Set();
  if (stack.has(name)) return new Set();
  stack.add(name);
  const s = new Set();
  const own = nameToCid[name];
  if (own != null && byConcept[own]) s.add(own);
  for (const ch of TAX[name] || []) {
    if (statusOf(ch) !== 'active' || heatBucketOf(ch) !== bucket) continue;
    for (const c of heatTaxCids(ch, stack)) s.add(c);
  }
  stack.delete(name);
  return _heatCidsCache[name] = s;
}
const _heatSeriesCache = {};
function heatTaxSeries(name) {
  if (_heatSeriesCache[name]) return _heatSeriesCache[name];
  const cids = heatTaxCids(name);
  return _heatSeriesCache[name] = D.dates.map(d => {
    const codes = new Set();
    for (const cid of cids)
      for (const ev of (byConcept[cid].days.get(d) || [])) codes.add(ev[0]);
    return codes.size;
  });
}
const heatChildren = name => {
  const bucket = heatBucketOf(name);
  return (TAX[name] || []).filter(ch =>
    statusOf(ch) === 'active' && heatBucketOf(ch) === bucket && heatTaxCids(ch).size);
};
const TYPE_LABEL = { sector: '产业', product: '细分', theme: '题材', catalyst: '催化',
                     attribute: '属性', event: '事件', unknown: '未审核' };
const typeLabelOf = nm => virtualOf(nm) ? '分组' : (TYPE_LABEL[typeOf(nm)] || typeOf(nm));
const TAG_TYPE_VIEW = {
  sector:   { label: '产业', badge: 'sector', chip: 'c-sector', row: 'tl-sector' },
  product:  { label: '细分产品', badge: 'product', chip: 'c-product', row: 'tl-product' },
  theme:    { label: '交易题材', badge: 'theme', chip: 'c-theme', row: 'tl-theme' },
  catalyst: { label: '催化', badge: 'catalyst', chip: 'c-cat', row: 'tl-cat' },
  attribute:{ label: '属性', badge: 'other', chip: 'c-attr', row: 'tl-attr' },
  event:    { label: '事件', badge: 'other', chip: 'c-evt', row: 'tl-evt' },
  unknown:  { label: '未审核', badge: 'other', chip: 'c-evt', row: 'tl-evt' },
  group:    { label: '结构分组', badge: 'group', chip: 'c-evt', row: 'tl-mixed' },
};
const tagTypeViewOf = nm => TAG_TYPE_VIEW[virtualOf(nm) ? 'group' : typeOf(nm)] || TAG_TYPE_VIEW.unknown;

/* ---------- 路由 ---------- */
function go(hash) { location.hash = hash; }
window.addEventListener('hashchange', render);
$('#brand').onclick = () => go('#/date/' + D.dates[D.dates.length - 1]);
$('#nav-review').onclick = $('#brand').onclick;
$('#nav-heat').onclick = () => go('#/heat');
$('#nav-filter').onclick = () => go('#/tags/' + (TAGS.tab || 'tree'));
$('#nav-trend').onclick = () => go('#/trend');
$('#nav-batch').onclick = () => go('#/batch');

function render() {
  const h = location.hash || '#/date/' + D.dates[D.dates.length - 1];
  const [, view, arg] = h.match(/^#\/(\w+)\/?(.*)$/) || [];
  $('#nav-review').classList.toggle('on', view === 'date');
  $('#nav-heat').classList.toggle('on', view === 'heat');
  $('#nav-filter').classList.toggle('on', view === 'filter' || view === 'tags');
  $('#nav-trend').classList.toggle('on', view === 'trend');
  $('#nav-batch').classList.toggle('on', view === 'batch');
  hideTip();
  if (view === 'filter') return renderTags('filter');
  if (view === 'tags') return renderTags(arg || 'tree');
  if (view === 'date') return renderDate(decodeURIComponent(arg));
  if (view === 'concept') return renderConcept(+arg);
  if (view === 'stock') return renderStock(decodeURIComponent(arg));
  if (view === 'batch') return renderBatch();
  if (view === 'heat') return renderHeat();
  if (view === 'trend') return renderTrend();
  if (view === 'tagday') {
    const i = arg.lastIndexOf('/');
    return renderTagDay(decodeURIComponent(arg.slice(0, i)), arg.slice(i + 1));
  }
  renderDate(D.dates[D.dates.length - 1]);
}

/* ---------- 视图1：每日复盘 ---------- */
function renderDate(d) {
  if (!D.dates.includes(d)) d = D.dates[D.dates.length - 1];
  const all = D.events[d] || [];
  const evs = all.filter(e => !isTouch(e));      // 收盘封住
  const touches = all.filter(isTouch);           // 触及未封（炸板池）
  const i = D.dates.indexOf(d);
  const st = D.day_stats[d];
  const maxLb = Math.max(1, ...evs.map(e => e[1] || 1));
  const yizi = evs.filter(e => (e[3] || '').includes('一字')).length;

  // 按概念分组（当日 ≥2 只），再按标签类型分流：题材成卡片、催化进顶部横条
  const groups = new Map();
  for (const ev of evs) for (const cid of ev[9]) {
    if (!groups.has(cid)) groups.set(cid, []);
    groups.get(cid).push(ev);
  }
  const named = [...groups].map(([cid, l]) => ({ cid, nm: D.concepts[cid][0], l }))
    .filter(g => g.l.length >= 2);
  const cards = named.filter(g => isTheme(g.nm)).map(g => [g.cid, g.l])
    .sort((a, b) => b[1].length - a[1].length);
  const catas = named.filter(g => isCatalyst(g.nm))
    .sort((a, b) => b.l.length - a.l.length);
  const carded = new Set(cards.flatMap(([, l]) => l.map(e => e[0])));
  const rest = evs.filter(e => !carded.has(e[0]));

  let html = `
  <div class="datebar">
    <button class="navbtn" id="prev" ${i <= 0 ? 'disabled' : ''}>← 前一日</button>
    <input type="date" id="dpick" value="${d}" min="${D.dates[0]}" max="${D.dates[D.dates.length - 1]}">
    <button class="navbtn" id="next" ${i >= D.dates.length - 1 ? 'disabled' : ''}>后一日 →</button>
    <span class="muted small">${weekday(d)}</span>
  </div>
  <div class="stats">
    <div class="stat"><div class="v">${evs.length}</div><div class="k">涨停家数</div></div>
    ${st ? `<div class="stat"><div class="v">${st[1] ?? '—'}</div><div class="k">盘中触板</div></div>
    <div class="stat"><div class="v">${st[2] != null ? Math.round(st[2] * 100) + '%' : '—'}</div><div class="k">封板率</div></div>
    <div class="stat"><div class="v">${st[3] ?? '—'}</div><div class="k">炸板家数</div></div>` : ''}
    <div class="stat"><div class="v">${maxLb}</div><div class="k">最高连板</div></div>
    <div class="stat"><div class="v">${yizi}</div><div class="k">一字板</div></div>
    ${touches.length ? `<div class="stat"><div class="v" style="color:var(--ink2)">${touches.length}</div><div class="k">触及未封</div></div>` : ''}
  </div>`;

  // 标签库日报（仅最新交易日）：新面孔 / 未入树 / 待审积压
  if (d === D.dates[D.dates.length - 1] && evs.length) {
    const firstZtDay = code => (byStock[code].find(x => !isTouch(x.ev)) || {}).d;
    const faces = evs.filter(e => firstZtDay(e[0]) === d);
    const childSet2 = new Set(Object.values(TAX).flat());
    const inTreeCids = new Set();
    for (const r of Object.keys(TAX).filter(p => !childSet2.has(p)))
      for (const c of taxCids(r)) inTreeCids.add(c);
    const uncov = evs.filter(e => !e[9].some(c => inTreeCids.has(c)));
    const backlog = Object.entries(META).filter(([, v]) => v[1] === 'candidate').length;
    html += `<div class="card" style="padding:8px 14px">
      <span class="tlabel tl-theme" style="padding:3px 10px">标签库日报</span>
      <span class="small muted" style="margin:0 6px">树内覆盖 <b>${Math.round((1 - uncov.length / evs.length) * 100)}%</b>
        · 未入树 <b>${uncov.length}</b> 只 · 待审积压 <b>${backlog}</b> ·</span>
      <span class="small" style="cursor:pointer;color:var(--accent)" id="rp-gov">去治理台 →</span>
      ${faces.length ? `<div style="margin-top:6px"><span class="small muted">🆕 新面孔（库内首次涨停）：</span>
        ${faces.map(ev => chipHtml(ev, d)).join('')}</div>` : ''}
    </div>`;
  }

  if (catas.length) {
    html += `<div class="card" style="padding:8px 14px"><span class="tlabel tl-cat" style="padding:3px 10px">今日催化</span>
      ${catas.map(g => `<span class="concept-chip c-cat" data-cid="${g.cid}" style="padding:2px 10px">
        ${esc(g.nm)} <span class="x">${g.l.length}只</span></span>`).join('')}</div>`;
  }

  for (const [cid, list] of cards) {
    const [cname, total, days] = D.concepts[cid];
    list.sort((a, b) => (b[1] || 1) - (a[1] || 1));
    html += `<div class="card">
      <div class="card-h">
        <span class="cname" data-cid="${cid}">${esc(cname)}</span>
        <span class="cnt">${list.length} 只</span>
        <span class="hist">近1年 ${total} 次 / ${days} 天活跃</span>
      </div>
      <div class="chips">${list.map(ev => chipHtml(ev, d)).join('')}</div>
    </div>`;
  }
  if (rest.length) {
    html += `<div class="card"><div class="card-h">
      <span class="cname muted">其他 / 未入题材卡片</span><span class="cnt">${rest.length} 只</span>
      <span class="hist">仅催化/属性/事件驱动或独立题材，悬浮看原因</span></div>
      <div class="chips">${rest.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  }
  if (touches.length) {
    const tl = [...touches].sort((a, b) => (b[4] || 0) - (a[4] || 0));
    html += `<div class="card" style="border-style:dashed"><div class="card-h">
      <span class="cname muted">⚡ 触及涨停未封住</span><span class="cnt" style="color:var(--ink2)">${tl.length} 只</span>
      <span class="hist">盘中摸板收盘炸板，不计入涨停与热度 · 按炸板次数排序</span></div>
      <div class="chips">${tl.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  }
  if (!all.length) html += `<div class="empty">当日无涨停数据</div>`;
  $('#app').innerHTML = html;

  $('#rp-gov')?.addEventListener('click', () => go('#/tags/gov'));
  $('#prev')?.addEventListener('click', () => go('#/date/' + D.dates[i - 1]));
  $('#next')?.addEventListener('click', () => go('#/date/' + D.dates[i + 1]));
  $('#dpick').addEventListener('change', e => {
    const v = e.target.value;
    // 落到最近的有数据交易日
    let best = D.dates[0];
    for (const dd of D.dates) if (dd <= v) best = dd; else break;
    go('#/date/' + best);
  });
  bindChips();
}
function chipHtml(ev, d) {
  const yizi = (ev[3] || '').includes('一字');
  const brief = d ? (D.briefs || {})[ev[0] + '|' + d] : null;
  const tip = (brief ? '✨' + brief + '\n' : '') +
    (ev[8] || (isTouch(ev) ? `触及涨停未封住 · 炸板${ev[4] ?? 0}次 · 首触${ev[7] || '—'}` : ''));
  return `<span class="chip${yizi ? ' yizi' : ''}${isTouch(ev) ? ' touch' : ''}" data-code="${ev[0]}" title="${esc(tip)}">
    ${lbBadge(ev)} ${esc(D.stocks[ev[0]] || ev[0])}
    <span class="code">${ev[0]}</span><span class="board">${boardOf(ev[0])}</span></span>`;
}
function bindChips() {
  document.querySelectorAll('[data-code]').forEach(el =>
    el.addEventListener('click', () => go('#/stock/' + el.dataset.code)));
  document.querySelectorAll('[data-cid]').forEach(el =>
    el.addEventListener('click', () => go('#/concept/' + el.dataset.cid)));
  document.querySelectorAll('.concept-chip[data-nm], .tanc[data-nm]').forEach(el =>
    el.addEventListener('click', () => gotoTaxNode(el.dataset.nm)));
  document.querySelectorAll('.clsbtn[data-cls]').forEach(el =>
    el.addEventListener('click', e => { e.stopPropagation(); openClassify(el.dataset.cls); }));
}
function weekday(d) {
  return '周' + '日一二三四五六'[new Date(d + 'T00:00:00').getDay()];
}
function eventNewsHtml(code, d, key, colspan) {
  const news = (D.news || {})[code + '|' + d] || [];
  const brief = (D.briefs || {})[code + '|' + d] || '';
  if (!news.length && !brief)
    return { cell: '<span class="muted small">—</span>', row: '' };
  return {
    cell: `<button class="newsbtn" data-news-key="${esc(key)}">📰 ${news.length || '✨'}</button>`,
    row: `<tr class="newsrow" data-for="${esc(key)}" style="display:none"><td colspan="${colspan}">
      ${brief ? `<div class="brief">${esc(brief)}</div>` : ''}
      ${news.map(n => `<div class="newsitem">·
        <a href="${esc(n[1])}" target="_blank" rel="noopener">${esc(n[0])}</a>

function bindNewsRows() {
  document.querySelectorAll('.newsbtn[data-news-key]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const row = document.querySelector(`tr.newsrow[data-for="${el.dataset.newsKey}"]`);
      if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
    }));
}
function typedHierarchyHtml(names, direction) {
  if (!names.length) return '';
  const groups = new Map();
  for (const nm of names) {
    const key = virtualOf(nm) ? 'group' : typeOf(nm);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(nm);
  }
  const order = ['group', 'sector', 'product', 'theme', 'catalyst', 'attribute', 'event', 'unknown'];
  return order.filter(k => groups.has(k)).map(k => {
    const view = TAG_TYPE_VIEW[k] || TAG_TYPE_VIEW.unknown;
    return `<div class="hier-row"><span class="type-badge ${view.badge}">${direction}${view.label}</span>
      <div class="hier-tags">${groups.get(k).map(nm =>
        `<span class="concept-chip ${view.chip}" data-nm="${esc(nm)}" style="padding:2px 9px">${esc(nm)}</span>`
      ).join('')}</div></div>`;
  }).join('');
}

/* ---------- 视图2：概念详情 ---------- */
let conceptRange = 60;
function renderConcept(cid) {
  const meta = D.concepts[cid], c = byConcept[cid];
  if (!meta || !c) { $('#app').innerHTML = '<div class="empty">概念不存在</div>'; return; }
  const [cname, total, days] = meta;
  const aliases = Object.keys(D.aliases).filter(a => D.aliases[a] === cid);
  // 热力页点击进入详情后保持同一统计范围：正式热力节点按“自身+全部下级”聚合；
  // 非热力标签或未入树标签仍只统计标签本身。
  const heatScope = heatTaxCids(cname);
  const scopeCids = heatScope.size ? heatScope : new Set([+cid]);
  const isBranchScope = scopeCids.size > 1;
  const scopeDays = new Map();
  const scopeStockCounts = new Map();
  for (const d of D.dates) {
    const dayStocks = new Map();
    for (const scopedCid of scopeCids) {
      const scoped = byConcept[scopedCid];
      if (!scoped) continue;
      for (const ev of (scoped.days.get(d) || []))
        if (!isTouch(ev)) dayStocks.set(ev[0], ev);
    }
    if (!dayStocks.size) continue;
    const evs = [...dayStocks.values()];
    scopeDays.set(d, evs);
    for (const ev of evs)
      scopeStockCounts.set(ev[0], (scopeStockCounts.get(ev[0]) || 0) + 1);
  }
  const activeDates = [...scopeDays.keys()];
  const scopeTotal = [...scopeDays.values()].reduce((n, evs) => n + evs.length, 0);
  const hot = recent5.reduce((n, d) => n + (scopeDays.get(d) || []).length, 0);

  const stockRows = [...scopeStockCounts].map(([code, cnt]) => {
    const matched = byStock[code].filter(x => !isTouch(x.ev) &&
      x.ev[9].some(scopedCid => scopeCids.has(scopedCid)));
    const maxLb = Math.max(...matched.map(x => x.ev[1] || 1));
    const lastMatched = matched[matched.length - 1];
    // 成分关系/次数按当前板块范围统计；“最近涨停”及行情字段取股票全市场最新封板记录。
    // 否则同一股票次日换了更细标签时，板块表会错误停留在前一日。
    const lastX = [...byStock[code]].reverse().find(x => !isTouch(x.ev)) || lastMatched;
    return { code, cnt, maxLb, last: lastX.d, lastMatched: lastMatched.d,
             lastFt: lastX.ev[7], lastLt: lastX.ev[3], lastOpen: lastX.ev[4],
             lastAmt: lastX.ev[5], lastMcap: lastX.ev[6], lastReason: lastX.ev[8] };
  }).sort((a, b) => b.cnt - a.cnt || (a.last < b.last ? 1 : -1));

  const parents = taxParentsOf(cname);
  const kids = (TAX[cname] || []).filter(ch => taxCids(ch).size);
  const currentView = tagTypeViewOf(cname);
  const hierarchyHtml = typedHierarchyHtml(parents, '上级') + typedHierarchyHtml(kids, '下级');
  const stockTableRows = stockRows.map(r => {
    const newsKey = `concept-${r.code}-${r.last}`;
    const news = eventNewsHtml(r.code, r.last, newsKey, 11);
    return `<tr data-code="${r.code}"><td>${esc(D.stocks[r.code] || '')}<span class="muted small">（${boardOf(r.code)}）</span>
        <span class="code muted small">${r.code}</span></td>
      <td class="num">${r.cnt}</td>
      <td>${r.maxLb >= 2 ? `<span class="lb ${r.maxLb >= 3 ? 'lb3' : 'lb2'}">${r.maxLb}板</span>` : '首板'}</td>
      <td class="num">${r.last}${r.last !== r.lastMatched
        ? `<span class="muted small" style="display:block">板块命中 ${r.lastMatched.slice(5)}</span>` : ''}</td>
      <td>${esc(r.lastLt || '—')}</td>
      <td class="num">${r.lastOpen ?? 0}次</td><td class="num">${fmtWan(r.lastAmt)}</td>
      <td class="num">${r.lastFt || '—'}</td>
      <td class="num">${r.lastMcap != null ? r.lastMcap + '亿' : '—'}</td>
      <td class="reason">${esc(r.lastReason || '—')}</td><td>${news.cell}</td></tr>${news.row}`;
  }).join('');
  $('#app').innerHTML = `
  <div class="detail-h">
    <h2>${esc(cname)} ${hot >= 3 ? '<span class="hot small">🔥 近5日 ' + hot + ' 股次</span>' : ''}
      <span class="type-badge ${currentView.badge}" style="vertical-align:3px">${currentView.label}${
        FIX[cname] ? ' · 本地' : ''}</span>
      <button class="clsbtn${FIX[cname] ? ' done' : ''}" data-cls="${esc(cname)}" style="vertical-align:3px"
        title="修改标签类型">✎</button></h2>
    <div class="muted small">
      ${aliases.length ? '别名：' + aliases.map(esc).join('、') + ' · ' : ''}
      ${isBranchScope ? '板块口径（自身+全部下级）：' : ''}
      累计涨停 <b>${scopeTotal}</b> 股次 · 活跃 <b>${activeDates.length}</b> 天 ·
      ${activeDates[0]} ~ ${activeDates[activeDates.length - 1]}
      ${isBranchScope ? ` · 标签本身 <b>${total}</b> 股次 / <b>${days}</b> 天` : ''}
    </div>
    ${hierarchyHtml ? `<div class="hierarchy typed-hierarchy">${hierarchyHtml}</div>` : ''}
  </div>
  <div class="chart-card">
    <div class="ch-h"><b>活跃度时间线</b><span class="muted small">${
      isBranchScope ? '自身及全部下级标签' : '当前标签'}的当日去重涨停家数，点击柱子跳当日复盘</span>
      <div class="seg">
        <button id="r60" class="${conceptRange === 60 ? 'on' : ''}">近60日</button>
        <button id="rall" class="${conceptRange === 0 ? 'on' : ''}">全期</button>
      </div></div>
    <div id="tl"></div>
  </div>
  <div class="muted small" style="margin:0 2px 6px">成分股、板块命中次数和最高连板按${
    isBranchScope ? '当前节点及全部下级标签' : '当前标签'}统计；股票最近涨停及其类型、炸板、封单、首封时间、流通市值、原因和消息取该股票全市场最新封板记录</div>
  <div class="tablewrap"><table>
    <thead><tr><th>股票</th><th>板块命中次数</th><th>板块内最高连板</th><th>股票最近涨停</th><th>类型</th>
      <th>炸板</th><th>封单</th><th>首封时间</th><th>流通市值</th><th>涨停原因</th><th>消息</th></tr></thead>
    <tbody>${stockTableRows}</tbody></table></div>`;

  drawTimeline(cid, scopeDays);
  $('#r60').onclick = () => { conceptRange = 60; renderConcept(cid); };
  $('#rall').onclick = () => { conceptRange = 0; renderConcept(cid); };
  bindNewsRows();
  bindChips();
}

function drawTimeline(cid, scopedDays) {
  const c = byConcept[cid];
  const dates = conceptRange ? D.dates.slice(-conceptRange) : D.dates;
  const vals = dates.map(d => (scopedDays?.get(d) || c.days.get(d) || []).length);
  const max = Math.max(1, ...vals);
  const W = 1000, H = 150, padL = 26, padB = 20, padT = 8;
  const bw = (W - padL - 4) / dates.length;
  let bars = '', labels = '';
  vals.forEach((v, i) => {
    const x = padL + i * bw;
    const bh = v ? Math.max(2, (H - padB - padT) * v / max) : 0;
    if (v) bars += `<rect class="bar" x="${(x + bw * 0.15).toFixed(1)}" y="${(H - padB - bh).toFixed(1)}"
      width="${Math.max(1, bw * 0.7).toFixed(1)}" height="${bh.toFixed(1)}" rx="${Math.min(2, bw / 4)}"
      data-i="${i}"></rect>`;
  });
  const step = Math.ceil(dates.length / 8);
  dates.forEach((d, i) => {
    if (i % step === 0) labels += `<text x="${(padL + i * bw).toFixed(1)}" y="${H - 5}">${d.slice(5)}</text>`;
  });
  const gridY = H - padB - (H - padB - padT);
  $('#tl').innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block">
    <line class="grid" x1="${padL}" y1="${H - padB}" x2="${W}" y2="${H - padB}"></line>
    <line class="grid" x1="${padL}" y1="${gridY}" x2="${W}" y2="${gridY}" stroke-dasharray="3,4"></line>
    <text x="2" y="${gridY + 4}">${max}</text>
    ${bars}${labels}</svg>`;
  $('#tl').querySelectorAll('.bar').forEach(b => {
    const i = +b.dataset.i;
    b.addEventListener('mousemove', e => showTip(e, `${dates[i]} · ${vals[i]} 家涨停`));
    b.addEventListener('mouseleave', hideTip);
    b.addEventListener('click', () => go('#/date/' + dates[i]));
  });
}

/* ---------- 标签按类型分区展示（个股页/批量归类共用） ---------- */
function taxPathOf(nm) {          // 沿首个父链爬到根：返回 [root, ..., 直接父]（不含自身）
  const path = [];
  let cur = nm;
  const seen = new Set([nm]);
  while (path.length < 5) {
    const ps = taxParentsOf(cur).filter(p => !seen.has(p));
    if (!ps.length) break;
    cur = ps[0];
    seen.add(cur);
    path.unshift(cur);
  }
  return path;
}
function typedTagRows(hist, opts = {}) {
  const ccount = new Map();
  for (const { ev } of hist) for (const cid of ev[9])
    ccount.set(cid, (ccount.get(cid) || 0) + 1);
  const ent = [...ccount].sort((a, b) => b[1] - a[1])
    .map(([cid, n]) => ({ cid, n, nm: D.concepts[cid][0], t: typeOf(D.concepts[cid][0]) }));
  const pick = ts => ent.filter(e => ts.includes(e.t));
  const chip = (e, hot, cls, showType) => {
    const h = hot ? hotOf(e.cid) : 0;
    const view = TAG_TYPE_VIEW[e.t] || TAG_TYPE_VIEW.unknown;
    cls = cls || view.chip;
    return `<span class="concept-chip${cls ? ' ' + cls : ''}" data-cid="${e.cid}">${esc(e.nm)}
      <span class="x">${showType ? view.label + ' · ' : ''}×${e.n}${
        h >= 3 ? ' 🔥近5日' + h + '家' : ''}</span></span>`;
  };
  const line = (label, lcls, list, hot, cap, ccls) => list.length
    ? `<div class="trow"><span class="tlabel ${lcls}">${label}</span><div class="tbody">${
        list.slice(0, cap || 99).map(e => chip(e, hot, ccls)).join('')}</div></div>` : '';

  // 产业/产品/题材：个股页保留 taxonomy 路径，但每个节点显示真实类型；其他场景分三行。
  const semantic = pick(['sector', 'product', 'theme']);
  let semanticHtml;

const _taxAncestorsCache = {};
const _heatDayCodesCache = {};
function taxAncestorsAll(name, stack) {
  if (_taxAncestorsCache[name]) return _taxAncestorsCache[name];
  stack = stack || new Set();
  if (stack.has(name)) return new Set();
  stack.add(name);
  const out = new Set();
  for (const p of taxParentsOf(name)) {
    out.add(p);
    for (const a of taxAncestorsAll(p, stack)) out.add(a);
  }
  stack.delete(name);
  return _taxAncestorsCache[name] = out;
}
function formalHeatNodes(type) {
  const nodes = new Set([...Object.keys(TAX), ...Object.values(TAX).flat()]);
  return [...nodes].filter(n => statusOf(n) === 'active' && typeOf(n) === type &&
    !virtualOf(n) && heatTaxCids(n).size);
}
function primarySectorNodes() {
  return formalHeatNodes('sector').filter(n =>
    ![...taxAncestorsAll(n)].some(a => typeOf(a) === 'sector' && !virtualOf(a)));
}
function heatDayCodes(name, d) {
  const key = name + '\n' + d;
  if (_heatDayCodesCache[key]) return _heatDayCodesCache[key];
  const out = new Set();
  for (const cid of heatTaxCids(name)) {
    const concept = byConcept[cid];
    if (!concept) continue;
    for (const ev of (concept.days.get(d) || [])) out.add(ev[0]);
  }
  return _heatDayCodesCache[key] = out;
}
function heatOverlap(a, b, dates) {
  let score = 0;
  for (const d of dates) {
    const ac = heatDayCodes(a, d), bc = heatDayCodes(b, d);
    const [small, large] = ac.size <= bc.size ? [ac, bc] : [bc, ac];
    for (const code of small) if (large.has(code)) score++;
  }
  return score;
}
function heatRelationRows(focus, targetType, dates, limit) {
  const focusTotal = dates.reduce((n, d) => n + heatDayCodes(focus, d).size, 0);
  const fa = taxAncestorsAll(focus);
  return formalHeatNodes(targetType).map(nm => {
    const score = heatOverlap(focus, nm, dates);
    const kind = nm === focus ? 'self' : fa.has(nm) ? 'ancestor'
      : taxAncestorsAll(nm).has(focus) ? 'descendant' : 'cooccur';
    return { nm, score, kind, structural: kind !== 'cooccur',
             total: focusTotal, ratio: focusTotal ? score / focusTotal : 0 };
  }).filter(r => r.score || r.kind !== 'cooccur')
    .sort((a, b) => (b.nm === focus) - (a.nm === focus) ||
      b.score - a.score || b.structural - a.structural ||
      a.nm.localeCompare(b.nm, 'zh-CN')).slice(0, limit);
}
function heatFocusEvents(focus, dates) {
  const out = new Map();
  for (const cid of heatTaxCids(focus)) {

    if (!concept) continue;
    for (const d of dates) for (const ev of (concept.days.get(d) || []))
      out.set(d + '|' + ev[0], { d, ev });
  }
  return [...out.values()];
}

    const code = ev[0];
    const x = stocks.get(code) || { code, latest: '', hits: 0, products: new Set(),
      themes: new Set(), reason: '' };
    x.hits++;
    if (d >= x.latest) { x.latest = d; x.reason = ev[8] || ''; }
    for (const cid of ev[9] || []) {

}

      series.map((s, si) => [s.v[i], si]).sort((a, b) => b[0] - a[0])
        .forEach(([, si], pos) => ranks[si][i] = pos);
    }
    const RC = ['#2e6be6', '#00b6a1', '#e0762d', '#8b5cf6', '#d23f77', '#4f9c1f', '#b8860b', '#607d8b'];
    const W = 1000, RH = 34 + topSectors.length * 22, padL = 8, padR = 130, rpT = 14, rpB = 18;
    const RX = i => padL + i * (W - padL - padR) / Math.max(1, win.length - 1);
    const RY = r => rpT + r * (RH - rpT - rpB) / Math.max(1, topSectors.length - 1);
    let rg = '';
    series.forEach((s, si) => {
      rg += `<polyline points="${ranks[si].map((r, i) => `${RX(i).toFixed(1)},${RY(r).toFixed(1)}`).join(' ')}"
        fill="none" stroke="${RC[si % 8]}" stroke-width="2.5" stroke-linejoin="round" opacity=".85"></polyline>`;
      const lr = ranks[si][win.length - 1];
      rg += `<text x="${W - padR + 8}" y="${(RY(lr) + 3.5).toFixed(1)}"
        style="fill:${RC[si % 8]};font-size:11px">#${lr + 1} ${esc(s.nm)}</text>`;
    });
    const stepR = Math.ceil(win.length / 8);
    win.forEach((dd, i) => {
      if (i % stepR === 0) rg += `<text x="${RX(i).toFixed(1)}" y="${RH - 3}">${dd.slice(5)}</text>`;
    });
    html += `<div class="chart-card" style="margin-top:14px"><div class="ch-h"><b>产业轮动</b>
      <span class="muted small">每天按最近5个交易日股次和排序Top8大产业 · #1=当日滚动5日股次最高 · 交叉=名次互换</span></div>
      <svg viewBox="0 0 ${W} ${RH}" width="100%" style="display:block">${rg}</svg></div>`;
  }

  html += heatTableHtml('sector', sectorNodes, 14);
  html += heatTableHtml('product', productNodes, 14);
  html += heatTableHtml('theme', themeNodes, 14);
  html += heatTableHtml('catalyst', catalystNodes, 10);

  // 未审核新热点：不进正式榜，但按单日去重涨停家数排序（新题材爆发的第一现场）
  const inTreeCids = new Set();
  const allTaxNodes = new Set([...Object.keys(TAX), ...Object.values(TAX).flat()]);
  for (const nm of allTaxNodes) {
    if (statusOf(nm) !== 'active') continue;
    const cid = nameToCid[nm];
    if (cid != null && byConcept[cid]) inTreeCids.add(cid);
  }
  const orphan = [];
  for (const cid in D.concepts) {
    if (inTreeCids.has(+cid)) continue;
    const [nm, total] = D.concepts[cid];
    const mt = META[nm];
    // 已人工审核定型且不进热度的（属性/事件），不再算"未审核"
    if (mt && mt[1] === 'active' && (mt[0] === 'attribute' || mt[0] === 'event')) continue;
    const c = byConcept[cid];
    let mx = 0, mxd = '';
    for (const [dd, evs] of c.days) {
      const n = new Set(evs.map(e => e[0])).size;
      if (n > mx) { mx = n; mxd = dd; }
    }
    if (mx < 2 && total < 5) continue;
    const s5 = taxSeries(nm).slice(-5).reduce((a, b) => a + b, 0);
    orphan.push({ cid: +cid, nm, total, s5, mx, mxd, stocks: c.stocks.size });
  }
  orphan.sort((a, b) => b.mx - a.mx || b.s5 - a.s5 || b.total - a.total);
  const burst = orphan.filter(o => o.mx >= 3);      // 只留爆发预警，完整队列在治理台
  if (burst.length || orphan.length) {
    html += `<div class="card" style="margin-top:14px"><div class="card-h">
      <span class="cname muted">未审核爆发预警</span>
      <span class="hist">单日同标签涨停≥3家的未入树标签 · <span style="cursor:pointer;color:var(--accent)" id="h-gov">完整待审队列在治理台 →</span></span></div>
      <div>${burst.length ? burst.slice(0, 16).map(o =>
        `<span class="concept-chip" data-cid="${o.cid}" style="border-width:2px;font-weight:600">${esc(o.nm)}
         <span class="x">🔥单日${o.mx}家(${o.mxd.slice(5)})${o.s5 ? ' · 近5日' + o.s5 + '股次' : ''}</span></span><button
           class="clsbtn${FIX[o.nm] ? ' done' : ''}" data-cls="${esc(o.nm)}" title="手动分类">${FIX[o.nm] ? '✎已标' : '✎'}</button>`).join('')
        : '<span class="muted small">近期无未审核标签单日达到3家涨停</span>'}</div></div>`;
  }

  $('#app').innerHTML = html;
  $('#h-gov')?.addEventListener('click', () => go('#/tags/gov'));
  $('#h30').onclick = () => { heatRange = 30; renderHeat(); };
  $('#h60').onclick = () => { heatRange = 60; renderHeat(); };
  $('#hall').onclick = () => { heatRange = 0; renderHeat(); };
  $('#hc1').onclick = () => { heatCrossRange = 1; renderHeat(); };
  $('#hc5').onclick = () => { heatCrossRange = 5; renderHeat(); };
  $('#hc20').onclick = () => { heatCrossRange = 20; renderHeat(); };
  const applyFocusInput = () => {
    const v = $('#heat-focus-input').value.trim();
    if (!focusNodes.includes(v)) { $('#heat-focus-input').value = heatFocus; return; }
    heatFocus = v; renderHeat();
  };
  $('#heat-focus-go').onclick = applyFocusInput;
  $('#heat-focus-input').addEventListener('change', applyFocusInput);
  $('#heat-focus-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); applyFocusInput(); }
  });
  document.querySelectorAll('[data-focus]').forEach(el =>
    el.addEventListener('click', () => { heatFocus = el.dataset.focus; renderHeat(); }));
  document.querySelectorAll('[data-detail]').forEach(el =>
    el.addEventListener('click', () => gotoTaxNode(el.dataset.detail)));
  document.querySelectorAll('[data-stock]').forEach(el =>
    el.addEventListener('click', () => go('#/stock/' + el.dataset.stock)));
  document.querySelectorAll('[data-layer-more]').forEach(el =>
    el.addEventListener('click', () => {
      const t = el.dataset.layerMore;
      heatLayerAll.has(t) ? heatLayerAll.delete(t) : heatLayerAll.add(t);
      renderHeat();
    }));
  document.querySelectorAll('.heatmap .cell[data-d]').forEach(el => {
    el.addEventListener('click', () => {
      if (+el.dataset.v > 0)
        go('#/tagday/' + encodeURIComponent(el.dataset.nm) + '/' + el.dataset.d);
    });
    el.addEventListener('mousemove', e =>
      showTip(e, `${el.dataset.nm} · ${el.dataset.d} · ${el.dataset.v} 家涨停`));

  bindChips();
}
function gotoTaxNode(nm) {

function spark(vals) {
