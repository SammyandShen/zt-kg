  const bw = W / vals.length;
  return `<svg viewBox="0 0 ${W} ${H}" height="${H}" preserveAspectRatio="xMinYMid meet"
    style="width:100%;max-width:${W}px;display:block">` + vals.map((v, i) =>
    v ? `<rect x="${(i * bw + 1).toFixed(1)}" y="${(H - v / max * (H - 4)).toFixed(1)}"
      width="${(bw - 2).toFixed(1)}" height="${(v / max * (H - 4)).toFixed(1)}" rx="1.5"
      fill="rgba(46,107,230,.75)"/>` : '').join('') + '</svg>';
}

/* ---------- 视图7：情绪趋势 ---------- */
let trendRange = 30;
function trendStats(dates) {
  return dates.map(d => {
    const st = D.day_stats[d] || [];
    const evs = (D.events[d] || []).filter(e => !isTouch(e));
    return {
      d,
      num: evs.length,
      touch: st[1] ?? null,
      rate: st[2] != null ? Math.round(st[2] * 100) : null,
      opens: st[3] ?? null,
      lbCnt: evs.filter(e => (e[1] || 1) >= 2).length,
      maxLb: evs.length ? Math.max(...evs.map(e => e[1] || 1)) : 0,
      yizi: evs.filter(e => (e[3] || '').includes('一字')).length,
    };
  });
}
function svgChart(dates, series, fmt) {
  fmt = fmt || (v => v);
  const W = 520, H = 168, padL = 36, padB = 18, padT = 10;
  const all = series.flatMap(s => s.vals).filter(v => v != null);
  const ymax = Math.max(1, ...all) * 1.08;
  const bw = (W - padL - 6) / dates.length;
  const X = i => padL + i * bw + bw / 2;
  const Y = v => H - padB - (H - padB - padT) * v / ymax;
  let g = '';
  for (const frac of [1, 0.5]) {
    const y = Y(ymax * frac / 1.08);
    g += `<line class="grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W}" y2="${y.toFixed(1)}"
      stroke-dasharray="3,4"></line>
      <text x="2" y="${(y + 3.5).toFixed(1)}">${fmt(Math.round(ymax * frac / 1.08))}</text>`;
  }
  g += `<line class="grid" x1="${padL}" y1="${H - padB}" x2="${W}" y2="${H - padB}"></line>`;
  for (const s of series) {
    if (s.type === 'bar') {
      s.vals.forEach((v, i) => {
        if (v == null || !v) return;
        const h = (H - padB) - Y(v);
        g += `<rect x="${(X(i) - bw * 0.31).toFixed(1)}" y="${Y(v).toFixed(1)}"
          width="${(bw * 0.62).toFixed(1)}" height="${h.toFixed(1)}"
          rx="${Math.min(2.5, bw / 4)}" fill="${s.color}"></rect>`;
      });
    } else {
      let seg = [];
      const flush = () => {
        if (seg.length > 1)
          g += `<polyline points="${seg.join(' ')}" fill="none" stroke="${s.color}"
            stroke-width="2" stroke-linejoin="round"></polyline>`;
        seg = [];
      };
      s.vals.forEach((v, i) => {
        if (v == null) return flush();
        seg.push(`${X(i).toFixed(1)},${Y(v).toFixed(1)}`);
      });
      flush();
      s.vals.forEach((v, i) => {
        if (v != null)
          g += `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.2" fill="${s.color}"></circle>`;
      });
    }
  }
  const step = Math.ceil(dates.length / 8);
  dates.forEach((d, i) => {
    if (i % step === 0)
      g += `<text x="${(X(i) - 12).toFixed(1)}" y="${H - 5}">${d.slice(5)}</text>`;
  });
  // 悬浮命中列（最后画，置顶）
  dates.forEach((d, i) => {
    const tip = `${d} · ` + series.map(s =>
      `${s.name} ${s.vals[i] == null ? '—' : fmt(s.vals[i])}`).join(' · ');
    g += `<rect class="hovcol" x="${(padL + i * bw).toFixed(1)}" y="${padT}"
      width="${bw.toFixed(1)}" height="${H - padB - padT}" data-d="${d}"
      data-tip="${esc(tip)}"></rect>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${g}</svg>`;
}
function renderTrend() {
  const dates = trendRange ? D.dates.slice(-trendRange) : D.dates;
  const S = trendStats(dates);
  const last = S[S.length - 1] || {}, prev = S[S.length - 2] || {};
  const C1 = 'rgba(46,107,230,.85)', C2 = 'rgba(0,166,150,.8)';
  const cards = [
    { key: 'num', title: '涨停家数', type: 'bar',
      extra: { key: 'touch', name: '盘中触板', type: 'line' },
      note: '触板远高于涨停=分歧大' },
    { key: 'rate', title: '封板率', type: 'line', fmt: v => v + '%', note: '≥80%强 / ≤60%弱' },
    { key: 'opens', title: '炸板家数', type: 'bar', note: '越高情绪越差' },
    { key: 'lbCnt', title: '连板家数（≥2板）', type: 'bar', note: '梯队宽度' },
    { key: 'maxLb', title: '最高连板（空间板）', type: 'line', note: '梯队高度' },
    { key: 'yizi', title: '一字板家数', type: 'bar', note: '抢筹烈度' },
  ];
  let html = `
  <div class="datebar"><h2 style="margin:0">情绪趋势</h2>
    <span class="muted small">打板情绪温度计 · 悬浮看数值 · 点击跳当日复盘</span>
    <div class="seg" style="margin-left:auto">
      <button id="t30" class="${trendRange === 30 ? 'on' : ''}">近30日</button>
      <button id="t60" class="${trendRange === 60 ? 'on' : ''}">近60日</button>
      <button id="tall" class="${trendRange === 0 ? 'on' : ''}">全部</button>
    </div></div>
  <div class="trend-grid">`;
  for (const c of cards) {
    const fmt = c.fmt || (v => v);
    const series = [{ name: c.title, vals: S.map(r => r[c.key]), type: c.type, color: C1 }];
    if (c.extra)
      series.push({ name: c.extra.name, vals: S.map(r => r[c.extra.key]),
                    type: c.extra.type, color: C2 });
    const lv = last[c.key], pv = prev[c.key];
    const delta = (lv != null && pv != null)
      ? (lv > pv ? `<span class="delta" style="color:var(--up)">▲${fmt(lv - pv)}</span>`
        : lv < pv ? `<span class="delta muted">▼${fmt(pv - lv)}</span>`
        : '<span class="delta muted">—</span>') : '';
    html += `<div class="tcard">
      <div class="th"><b>${c.title}</b>
        ${c.extra ? `<span class="small muted"><span class="dot" style="background:${C1}"></span>${c.title}
          <span class="dot" style="background:${C2};margin-left:8px"></span>${c.extra.name}</span>` : ''}
        <span class="small" style="color:var(--ink3)">${c.note}</span>
        <span class="lv">${lv == null ? '—' : fmt(lv)} ${delta}</span></div>
      ${svgChart(S.map(r => r.d), series, fmt)}</div>`;
  }
  html += '</div>';
  $('#app').innerHTML = html;
  $('#t30').onclick = () => { trendRange = 30; renderTrend(); };
  $('#t60').onclick = () => { trendRange = 60; renderTrend(); };
  $('#tall').onclick = () => { trendRange = 0; renderTrend(); };
  document.querySelectorAll('.hovcol').forEach(el => {
    el.addEventListener('mousemove', e => showTip(e, el.dataset.tip));
    el.addEventListener('mouseleave', hideTip);
    el.addEventListener('click', () => go('#/date/' + el.dataset.d));
  });
}

/* ---------- 视图6：板块×当日下钻 ---------- */
function renderTagDay(nm, d) {
  const cids = heatTaxCids(nm);
  if (!cids.size || !D.dates.includes(d)) {
    $('#app').innerHTML = '<div class="empty">无此板块或日期</div>'; return;
  }
  const evMap = new Map();                       // code -> ev（去重）
  for (const cid of cids)
    for (const ev of (byConcept[cid].days.get(d) || [])) evMap.set(ev[0], ev);
  const evs = [...evMap.values()].sort((a, b) => (b[1] || 1) - (a[1] || 1));
  const di = D.dates.indexOf(d);
  const series = heatTaxSeries(nm);
  const cid0 = nameToCid[nm];

  // 按子标签分组（子标签当日≥1只即成组）
  const kids = heatChildren(nm);
  const groups = [];
  const covered = new Set();
  for (const ch of kids) {
    const chCids = heatTaxCids(ch);
    const list = evs.filter(ev => ev[9].some(c => chCids.has(c)));
    if (list.length) { groups.push([ch, list]); list.forEach(ev => covered.add(ev[0])); }
  }
  groups.sort((a, b) => b[1].length - a[1].length);
  const rest = evs.filter(ev => !covered.has(ev[0]));

  let html = `
  <div class="datebar">
    <button class="navbtn" id="prev" ${di <= 0 ? 'disabled' : ''}>← 前一日</button>
    <b style="font-size:15px">${d}</b><span class="muted small">${weekday(d)}</span>
    <button class="navbtn" id="next" ${di >= D.dates.length - 1 ? 'disabled' : ''}>后一日 →</button>
    <button class="navbtn" id="fullday">当日全部复盘</button>
    <button class="navbtn" id="backheat">← 返回热力图</button>
  </div>
  <div class="detail-h">
    <h2>${cid0 != null && byConcept[cid0]
        ? `<span class="lname" data-cid="${cid0}" style="cursor:pointer">${esc(nm)}</span>` : esc(nm)}
      <span class="muted" style="font-size:14px">· ${d} 共 ${evs.length} 家涨停</span></h2>
    <div class="muted small" style="margin:4px 0 2px">板块热度时间线 · 金框=当前日 · 点柱子切换日期</div>
    <div id="tagtl"></div>
  </div>`;

  if (groups.length) {
    for (const [ch, list] of groups) {
      const chCid = nameToCid[ch];
      html += `<div class="card"><div class="card-h">
        ${chCid != null && byConcept[chCid]
          ? `<span class="cname" data-cid="${chCid}">${esc(ch)}</span>`
          : `<span class="cname lname" data-nm2="${esc(ch)}">${esc(ch)}</span>`}
        <span class="cnt">${list.length} 只</span></div>
        <div class="chips">${list.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
    }
    if (rest.length)
      html += `<div class="card"><div class="card-h"><span class="cname muted">直接标记「${esc(nm)}」</span>
        <span class="cnt">${rest.length} 只</span></div>
        <div class="chips">${rest.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  } else {
    html += `<div class="card"><div class="chips">${evs.map(ev => chipHtml(ev, d)).join('')}</div></div>`;
  }
  $('#app').innerHTML = html;
  drawTagTimeline(nm, di);

  $('#prev')?.addEventListener('click', () =>
    go('#/tagday/' + encodeURIComponent(nm) + '/' + D.dates[di - 1]));
  $('#next')?.addEventListener('click', () =>
    go('#/tagday/' + encodeURIComponent(nm) + '/' + D.dates[di + 1]));
  $('#fullday').addEventListener('click', () => go('#/date/' + d));
  $('#backheat').addEventListener('click', () => go('#/heat'));
  document.querySelectorAll('[data-nm2]').forEach(el =>
    el.addEventListener('click', () =>
      go('#/tagday/' + encodeURIComponent(el.dataset.nm2) + '/' + d)));
  bindChips();
}

// 板块下钻页的热度时间线：窗口=当前日前29日~后10日，金框标当前日，点柱子切换
function drawTagTimeline(nm, di) {
  const lo = Math.max(0, di - 29), hi = Math.min(D.dates.length - 1, di + 10);
  const dates = D.dates.slice(lo, hi + 1);
  const vals = taxSeries(nm).slice(lo, hi + 1);
  const active = di - lo;
  const max = Math.max(1, ...vals);
  const W = 1000, H = 130, padL = 26, padB = 20, padT = 8;
  const bw = (W - padL - 4) / dates.length;
  let bars = '', labels = '';
  vals.forEach((v, i) => {
    if (!v) return;
    const x = padL + i * bw, bh = Math.max(2, (H - padB - padT) * v / max);
    bars += `<rect class="bar${i === active ? ' on' : ''}" x="${(x + bw * 0.15).toFixed(1)}"
      y="${(H - padB - bh).toFixed(1)}" width="${Math.max(1, bw * 0.7).toFixed(1)}"
      height="${bh.toFixed(1)}" rx="${Math.min(2, bw / 4)}" data-i="${i}"></rect>`;
  });
  const step = Math.ceil(dates.length / 8);
  dates.forEach((dd, i) => {
    if (i % step === 0) labels += `<text x="${(padL + i * bw).toFixed(1)}" y="${H - 5}">${dd.slice(5)}</text>`;
  });
  $('#tagtl').innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block">
    <line class="grid" x1="${padL}" y1="${H - padB}" x2="${W}" y2="${H - padB}"></line>
    <line class="grid" x1="${padL}" y1="${padT}" x2="${W}" y2="${padT}" stroke-dasharray="3,4"></line>
    <text x="2" y="${padT + 4}">${max}</text>${bars}${labels}</svg>`;
  $('#tagtl').querySelectorAll('.bar').forEach(b => {
    const i = +b.dataset.i;
    b.addEventListener('mousemove', e => showTip(e, `${dates[i]} · ${vals[i]} 家涨停`));
    b.addEventListener('mouseleave', hideTip);
    b.addEventListener('click', () =>
      go('#/tagday/' + encodeURIComponent(nm) + '/' + dates[i]));
  });
}

/* ---------- 视图4：批量归类 ---------- */
let batchText = '';
function renderBatch() {
  $('#app').innerHTML = `
  <h2>批量归类 <span class="muted small">粘贴任意文本（股票代码/名称混排均可），快速判断属于什么板块、板块热不热</span></h2>
  <textarea id="bt" placeholder="例如：301316 雅克科技 300688 002409&#10;或直接粘贴一段涨停播报文字">${esc(batchText)}</textarea>
  <button class="btn-primary" id="bgo">归类分析</button>
  <div id="bres" style="margin-top:16px"></div>`;
  $('#bgo').onclick = runBatch;
  $('#bt').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') runBatch();
  });
  if (batchText) runBatch();
}
function runBatch() {
  batchText = $('#bt').value;
  const found = new Set(batchText.match(/\d{6}/g) || []);
  // 按名称匹配（长名优先，避免子串误配）
  const names = Object.entries(D.stocks).sort((a, b) => b[1].length - a[1].length);
  let rest = batchText;
  for (const [code, nm] of names) {
    if (nm && rest.includes(nm)) { found.add(code); rest = rest.split(nm).join(' '); }
  }
  if (!found.size) { $('#bres').innerHTML = '<div class="empty">未识别到股票代码或名称</div>'; return; }

  let html = '';
  for (const code of found) {
    const hist = byStock[code];
    if (!hist) {
      html += `<div class="card"><div class="card-h">
        <span class="cname" data-code="${code}">${esc(D.stocks[code] || code)}</span>
        <span class="code muted small">${code} · ${boardOf(code)}</span>
        <span class="hist">近1年无涨停记录</span></div></div>`;
      continue;
    }
    const nZt = hist.filter(x => !isTouch(x.ev)).length;
    const nTc = hist.length - nZt;
    html += `<div class="card">
      <div class="card-h">
        <span class="cname" data-code="${code}">${esc(D.stocks[code])}</span>
        <span class="code muted small">${code} · ${boardOf(code)}</span>
        <span class="hist">涨停 ${nZt} 次${nTc ? ' · 触及 ' + nTc + ' 次' : ''} · 最近 ${hist[hist.length - 1].d}</span>
      </div>${typedTagRows(hist, { maxTheme: 6 })}</div>`;
  }
  $('#bres').innerHTML = html;
  bindChips();
}

/* ---------- 视图8：全局筛选 ---------- */
const FLT = { days: 10, touch: false, lb: 0, boards: new Set(),
              sel: { theme: new Set(), cat: new Set(), attr: new Set(), evt: new Set() },
              more: new Set(), q: '', qFocus: false };
const BUCKET_OF = t => ['sector', 'product', 'theme'].includes(t) ? 'theme'
  : t === 'catalyst' ? 'cat' : t === 'attribute' ? 'attr' : 'evt';

function renderFilter() {
  const win = FLT.days ? D.dates.slice(-FLT.days) : D.dates;

  // 窗口内每概念去重家数 → 四个类型行的可选标签
  const cidStocks = new Map();
  for (const d of win) for (const ev of D.events[d])
    for (const cid of ev[9]) (cidStocks.get(cid) ?? cidStocks.set(cid, new Set()).get(cid)).add(ev[0]);
  const buckets = { theme: [], cat: [], attr: [], evt: [] };
  for (const [cid, s] of cidStocks) {
    const nm = D.concepts[cid][0];
    buckets[BUCKET_OF(typeOf(nm))].push({ nm, n: s.size });
  }
  for (const k in buckets) {
    buckets[k].sort((a, b) => b.n - a.n || (a.nm < b.nm ? -1 : 1));
    for (const nm of FLT.sel[k])                       // 已选但窗口内没出现的，保留可退选
      if (!buckets[k].some(t => t.nm === nm)) buckets[k].push({ nm, n: 0 });
  }

  // 条件 → cid 集合（题材树节点自动含全部后代）
  const selCids = key => {
    const out = new Set();
    for (const nm of FLT.sel[key]) {
      if (key === 'theme') for (const c of taxCids(nm)) out.add(c);
      const cid = nameToCid[nm];
      if (cid != null) out.add(cid);
    }
    return out;
  };
  const conds = ['theme', 'cat', 'attr', 'evt'].map(selCids).filter(s => s.size);

  // 逐股聚合（窗口内）
  const agg = new Map();
  for (const d of win) for (const ev of D.events[d]) {
    const touch = isTouch(ev);
    if (touch && !FLT.touch) continue;
    const a = agg.get(ev[0]) ?? agg.set(ev[0], { zt: 0, tc: 0, maxLb: 0, last: '', lastEv: null, cids: new Set() }).get(ev[0]);
    if (touch) a.tc++; else { a.zt++; a.maxLb = Math.max(a.maxLb, ev[1] || 1); }
    if (d >= a.last) { a.last = d; a.lastEv = ev; }
    for (const cid of ev[9]) a.cids.add(cid);
  }
  let rows = [...agg].map(([code, a]) => ({ code, ...a }));
  if (!FLT.touch) rows = rows.filter(r => r.zt > 0);
  if (FLT.boards.size) rows = rows.filter(r => FLT.boards.has(boardOf(r.code)));
  if (FLT.lb) rows = rows.filter(r => r.maxLb >= FLT.lb);
  for (const cs of conds)
    rows = rows.filter(r => { for (const c of cs) if (r.cids.has(c)) return true; return false; });
  rows.sort((a, b) => b.zt - a.zt || b.maxLb - a.maxLb || (a.last < b.last ? 1 : -1));

  // 命中标签展示：有条件显示命中的，无条件显示前3个题材
  const allSel = new Set(conds.flatMap(s => [...s]));
  const hitTags = r => {
    const ids = allSel.size ? [...r.cids].filter(c => allSel.has(c)) : [...r.cids].slice(0, 6);
    const named = ids.map(c => ({ c, nm: D.concepts[c][0] }));
    const show = allSel.size ? named : named.filter(x => isTheme(x.nm)).slice(0, 3);
    return show.map(x => `<span class="concept-chip" data-cid="${x.c}" style="padding:1px 8px;font-size:12px">${esc(x.nm)}</span>`).join('') || '—';
  };

  const seg = (opts, cur, idp) => `<div class="seg">${opts.map(([v, lbl], i) =>
    `<button id="${idp}${i}" data-v="${v}" class="${String(cur) === String(v) ? 'on' : ''}">${lbl}</button>`).join('')}</div>`;
  const tagRow = (key, label, lcls, ccls) => {
    const list = buckets[key].filter(t => !FLT.q || t.nm.includes(FLT.q) || FLT.sel[key].has(t.nm));
    const cap = FLT.more.has(key) ? 999 : 18;
    const shown = list.slice(0, cap);
    const moreBtn = list.length > cap

    return `<div class="trow"><span class="tlabel ${lcls}">${label}</span><div class="tbody">
      ${shown.map(t => `<span class="concept-chip ${ccls}${FLT.sel[key].has(t.nm) ? ' sel' : ''}"
        data-f="${key}" data-nm="${esc(t.nm)}">${esc(t.nm)}<span class="x">${t.n || ''}</span></span>`).join('')}
      ${moreBtn}</div></div>`;
  };
  const BOARDS = ['主板', '创业板', '科创板', '北交所'];
  const nSel = Object.values(FLT.sel).reduce((a, s) => a + s.size, 0);
  const shown = rows.slice(0, 150);

  ($('#tagsub') || $('#app')).innerHTML = `
  <div class="datebar">
    <span class="muted small">行内多选=或，跨行=且 · 题材自动含子标签</span></div>
  <div class="fltbar">
    <div class="fltrow">
      <span class="flabel">时间窗</span>${seg([[5, '近5日'], [10, '近10日'], [30, '近30日'], [0, '全部']], FLT.days, 'fd')}
      <span class="flabel">连板</span>${seg([[0, '不限'], [2, '≥2板'], [3, '≥3板']], FLT.lb, 'fl')}
      <span class="flabel">范围</span>${seg([[0, '仅涨停'], [1, '含触及']], FLT.touch ? 1 : 0, 'ft')}
      ${BOARDS.map(b => `<span class="concept-chip${FLT.boards.has(b) ? ' sel' : ''}" data-b="${b}" style="padding:2px 10px">${b}</span>`).join('')}
      <input id="f-q" placeholder="搜标签名过滤下方行" value="${esc(FLT.q)}">
      ${nSel ? '<button class="navbtn" id="f-clear">清空条件</button>' : ''}
    </div>
    ${tagRow('theme', '题材', 'tl-theme', '')}
    ${tagRow('cat', '催化', 'tl-cat', 'c-cat')}
    ${tagRow('attr', '属性', 'tl-attr', 'c-attr')}
    ${tagRow('evt', '事件·未审核', 'tl-evt', 'c-evt')}
  </div>
  <div class="muted small" style="margin:0 2px 8px">命中 <b>${rows.length}</b> 只${rows.length > 150 ? '（仅显示前150）' : ''}</div>
  <div class="tablewrap"><table>
    <thead><tr><th>股票</th><th>涨停</th>${FLT.touch ? '<th>触及</th>' : ''}<th>最高连板</th><th>最近</th><th>首封时间</th><th>命中标签</th></tr></thead>
    <tbody>${shown.map(r => `
      <tr data-code="${r.code}">
        <td>${esc(D.stocks[r.code] || '')}<span class="muted small">（${boardOf(r.code)}）</span>
          <span class="code muted small">${r.code}</span></td>
        <td class="num">${r.zt}</td>${FLT.touch ? `<td class="num">${r.tc || ''}</td>` : ''}
        <td>${r.maxLb >= 2 ? `<span class="lb ${r.maxLb >= 3 ? 'lb3' : 'lb2'}">${r.maxLb}板</span>` : (r.zt ? '首板' : '<span class="lb lbt">⚡触及</span>')}</td>
        <td class="num">${r.last}</td><td class="num">${r.lastEv?.[7] || '—'}</td>
        <td>${hitTags(r)}</td></tr>`).join('')}
    </tbody></table></div>
  ${!rows.length ? '<div class="empty">无命中，放宽条件试试</div>' : ''}`;

  // 绑定
  const rerender = () => renderFilter();
  [['fd', v => FLT.days = +v], ['fl', v => FLT.lb = +v], ['ft', v => FLT.touch = !!+v]]
    .forEach(([idp, set]) => document.querySelectorAll(`[id^="${idp}"]`).forEach(el =>
      el.addEventListener('click', () => { set(el.dataset.v); rerender(); })));
  document.querySelectorAll('[data-b]').forEach(el =>
    el.addEventListener('click', () => {
      const b = el.dataset.b;
      FLT.boards.has(b) ? FLT.boards.delete(b) : FLT.boards.add(b);
      rerender();
    }));
  document.querySelectorAll('[data-f]').forEach(el =>
    el.addEventListener('click', () => {
      const s = FLT.sel[el.dataset.f], nm = el.dataset.nm;
      s.has(nm) ? s.delete(nm) : s.add(nm);
      rerender();
    }));
  document.querySelectorAll('[data-more]').forEach(el =>
    el.addEventListener('click', () => {
      const k = el.dataset.more;
      FLT.more.has(k) ? FLT.more.delete(k) : FLT.more.add(k);
      rerender();
    }));
  $('#f-q').addEventListener('input', e => { FLT.q = e.target.value.trim(); FLT.qFocus = true; rerender(); });
  $('#f-clear')?.addEventListener('click', () => {
    for (const k in FLT.sel) FLT.sel[k].clear();

/* --- 生命周期：休眠/活跃/启动/高潮/退潮 --- */
function lifecycleOf(nm) {
  const s = taxSeries(nm);
  const win = s.slice(-30);
  const sum = win.reduce((a, b) => a + b, 0);
  if (!sum) return ['idle', '休眠'];
  const r3 = s.slice(-3).reduce((a, b) => a + b, 0) / 3;
  const peak3 = Math.max(...win.map((_, i) => win.slice(Math.max(0, i - 2), i + 1)
    .reduce((a, b) => a + b, 0) / 3));
  const st = startupOf(s);
  if (st && st.recent >= 3 && st.ratio >= 2.2) return ['start', '启动'];
  if (r3 >= 4 && r3 >= peak3 * 0.8) return ['hot', '高潮'];
  if (peak3 >= 3 && r3 < peak3 * 0.35) return ['ebb', '退潮'];
  return ['live', '活跃'];
}

/* --- 全景树 --- */
function renderTagsTree() {
  const winDates = TAGS.days ? D.dates.slice(-TAGS.days) : D.dates;
  const sum5 = nm => taxSeries(nm).slice(-TAGS.days || undefined).reduce((a, b) => a + b, 0);
  const childSet2 = new Set(Object.values(TAX).flat());
  const roots = Object.keys(TAX).filter(p => !childSet2.has(p));
  const groupRoots = [
    ['产业', roots.filter(n => typeOf(n) === 'sector').sort((a, b) => sum5(b) - sum5(a))],
    ['细分产品', roots.filter(n => typeOf(n) === 'product').sort((a, b) => sum5(b) - sum5(a))],
    ['交易题材', roots.filter(n => typeOf(n) === 'theme').sort((a, b) => sum5(b) - sum5(a))],
    ['催化', roots.filter(isCatalyst).sort((a, b) => sum5(b) - sum5(a))],
    ['属性 / 事件', roots.filter(n => !isTheme(n) && !isCatalyst(n))
      .sort((a, b) => sum5(b) - sum5(a))],
  ];
  const maxSum = Math.max(4, ...roots.map(sum5));

  const nodeHtml = (nm, depth) => {
    const kids = (TAX[nm] || []).filter(ch => !TAGS.onlyActive || sum5(ch) > 0 || TAX[ch]);
    const open = TAGS.expanded.has(nm);
    const s = sum5(nm);
    if (TAGS.onlyActive && !s && !kids.length && depth > 0) return '';
    const [lc, lcTxt] = lifecycleOf(nm);
    const view = tagTypeViewOf(nm);
    const kind = virtualOf(nm) ? 'group' : typeOf(nm);
    const dotc = { sector: 'var(--accent)', product: 'var(--product)', theme: 'var(--theme)',
      catalyst: 'var(--teal)', attribute: 'var(--gold)', event: 'var(--ink3)',
      group: 'var(--ink3)' }[kind] || 'var(--ink3)';
    const bw = Math.max(2, Math.round(46 * Math.sqrt(s / maxSum)));
    let h = `<div class="pnode${TAGS.sel === nm ? ' sel' : ''}" data-pn="${esc(nm)}"
      style="padding-left:${8 + depth * 16}px">
      <span class="exp" data-pexp="${esc(nm)}">${kids.length ? (open ? '▾' : '▸') : ''}</span>
      <span class="dot" style="background:${dotc}"></span>
      <span class="pn${depth === 0 ? '' : ''}" ${depth === 0 ? 'style="font-weight:700"' : ''}>${esc(nm)}</span>
      <span class="node-kind ${view.badge}">${esc(view.label.replace('产品', ''))}</span>
      ${s ? `<span class="lc lc-${lc}">${lcTxt}</span><span class="hb" style="width:${bw}px;background:${dotc}"></span><span class="hn">${s}</span>` : '<span class="lc lc-idle">休眠</span>'}
    </div>`;
    if (open) for (const ch of kids.sort((a, b) => sum5(b) - sum5(a))) h += nodeHtml(ch, depth + 1);
    return h;
  };

  let treeHtml = '';
  for (const [glabel, list] of groupRoots) {
    if (!list.length) continue;
    treeHtml += `<div class="muted small" style="padding:8px 8px 2px;font-weight:700">${glabel}</div>`
      + list.map(r => nodeHtml(r, 0)).join('');
  }

  $('#tagsub').innerHTML = `
  <div class="fltrow" style="margin-bottom:10px">
    <span class="flabel">时间窗</span>
    <div class="seg">${[[5, '近5日'], [10, '近10日'], [30, '近30日'], [0, '全部']].map(([v, l]) =>
      `<button data-td="${v}" class="${TAGS.days === v ? 'on' : ''}">${l}</button>`).join('')}</div>
    <button class="navbtn" id="t-expall">全部展开</button>
    <button class="navbtn" id="t-clpall">全部收起</button>
    <label class="small muted"><input type="checkbox" id="t-act" ${TAGS.onlyActive ? 'checked' : ''}> 只看有热度</label>
    <button class="navbtn" id="t-newgrp">➕ 新建分组</button>
  </div>
  <div class="metric-guide tags-metric-guide" aria-label="标签全景指标口径">
    <div class="metric-item"><b>节点热度</b>所选窗口内逐日去重涨停家数相加（股次）；父节点包含全部下级标签。</div>
    <div class="metric-item"><b>生命周期</b>启动=近3日均≥3且平滑后≥前15日2.2倍；高潮=近3日均≥4且≥30日峰值80%；退潮=峰值≥3且近3日&lt;峰值35%。</div>
    <div class="metric-item"><b>窗口股票 / 梯队</b>股票数按窗口去重；梯队取源数据在窗口内的最高板数，不是今日截面。</div>
    <div class="metric-item"><b>次日连板率</b>最后两个交易日中，昨日枝内封板且今日仍在枝内封板的股票数 ÷ 昨日枝内封板数；触及未封不算。</div>
  </div>
  <div class="tree2col">
    <div class="panor">${treeHtml}</div>
    <div class="npanel" id="npanel">${TAGS.sel ? '' : '<div class="empty">← 点击左侧节点查看该枝全景与梯队</div>'}</div>
  </div>`;

  document.querySelectorAll('[data-td]').forEach(el =>
    el.addEventListener('click', () => { TAGS.days = +el.dataset.td; renderTagsTree(); }));
  $('#t-expall').onclick = () => {
    for (const p in TAX) TAGS.expanded.add(p);
    renderTagsTree();
  };
  $('#t-clpall').onclick = () => { TAGS.expanded.clear(); renderTagsTree(); };
  $('#t-act').onchange = e => { TAGS.onlyActive = e.target.checked; renderTagsTree(); };
  $('#t-newgrp').onclick = openNewGroup;
  document.querySelectorAll('[data-pexp]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const nm = el.dataset.pexp;
      TAGS.expanded.has(nm) ? TAGS.expanded.delete(nm) : TAGS.expanded.add(nm);
      renderTagsTree();
    }));
  document.querySelectorAll('[data-pn]').forEach(el =>
    el.addEventListener('click', () => { TAGS.sel = el.dataset.pn; renderTagsTree(); }));
  if (TAGS.sel) renderNodePanel(TAGS.sel, winDates);
}

/* --- 节点面板：梯队表 + 分枝股票 --- */
function renderNodePanel(nm, winDates) {
  const cids = taxCids(nm);
  // 窗口内该枝的股票聚合
  const agg = new Map();     // code -> {maxLb, n, last, lastEv, touch}
  for (const d of winDates) for (const ev of D.events[d]) {
    if (!ev[9].some(c => cids.has(c))) continue;
    const a = agg.get(ev[0]) ?? agg.set(ev[0], { maxLb: 0, n: 0, tc: 0, last: '', lastEv: ev }).get(ev[0]);
    if (isTouch(ev)) a.tc++; else { a.n++; a.maxLb = Math.max(a.maxLb, ev[1] || 1); }
    if (d >= a.last) { a.last = d; a.lastEv = ev; }
  }
  const stocks = [...agg].map(([code, a]) => ({ code, ...a }))
    .sort((a, b) => b.maxLb - a.maxLb || b.n - a.n);
  // 次日连板率：窗口最后两个交易日均在该枝封板的股票 / 前一日该枝封板股票
  const dN = winDates[winDates.length - 1], dP = winDates[winDates.length - 2];
  let promo = '';
  if (dP) {
    const inBranchZt = d => new Set((D.events[d] || [])
      .filter(ev => !isTouch(ev) && ev[9].some(c => cids.has(c))).map(ev => ev[0]));
    const p = inBranchZt(dP), n = inBranchZt(dN);
    const keptCodes = [...p].filter(c => n.has(c));
    if (p.size) {
      const keptNames = keptCodes.map(c => D.stocks[c] || c).join('、') || '无';
      promo = `<b>次日连板率 ${Math.round(keptCodes.length / p.size * 100)}%</b>
        （${dP.slice(5)}枝内封板 ${p.size}只 → ${dN.slice(5)}仍在枝内封板 ${keptCodes.length}只）
        <span title="继续封板：${esc(keptNames)}">= 两日枝内封板股票交集 ÷ 前一日枝内封板股票</span>`;
    }
  }
  const [lc, lcTxt] = lifecycleOf(nm);
  const tier = (label, list, cls) => list.length ? `
    <div class="trow"><span class="tlabel ${cls}">${label}</span><div class="tbody">${
      list.map(s => `<span class="chip${isTouch(s.lastEv) ? ' touch' : ''}" data-code="${s.code}"
        title="窗口内最高${s.maxLb || 0}板；最近命中 ${s.last}${s.lastEv?.[2] ? '；源标签 ' + esc(s.lastEv[2]) : ''}">
        ${lbBadge(s.lastEv)} ${esc(D.stocks[s.code] || s.code)}
        <span class="code">${s.last.slice(5)}${s.n > 1 ? ' · ×' + s.n : ''}</span></span>`).join('')}</div></div>` : '';
  const t1 = stocks.filter(s => s.maxLb >= 3), t2 = stocks.filter(s => s.maxLb === 2),
        t3 = stocks.filter(s => s.n && s.maxLb <= 1), t4 = stocks.filter(s => !s.n);
  // 分枝分布
  const kids = (TAX[nm] || []).filter(ch => taxCids(ch).size);
  const branchRows = kids.map(ch => {
    const chCids = taxCids(ch);
    const codes = new Set();
    for (const d of winDates) for (const ev of D.events[d])
      if (!isTouch(ev) && ev[9].some(c => chCids.has(c))) codes.add(ev[0]);
    return { ch, n: codes.size };
  }).filter(b => b.n).sort((a, b) => b.n - a.n);

  const cid0 = nameToCid[nm];
  $('#npanel').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

/* --- 治理台 --- */
function renderTagsGov() {
  const win = D.dates.slice(-10);
  // 覆盖率（最新交易日）
  const dN = D.dates[D.dates.length - 1];
  const inTreeCids = new Set();
  const childSet2 = new Set(Object.values(TAX).flat());
  for (const r of Object.keys(TAX).filter(p => !childSet2.has(p)))
    for (const c of taxCids(r)) inTreeCids.add(c);
  const todayZt = (D.events[dN] || []).filter(ev => !isTouch(ev));
  const uncov = todayZt.filter(ev => !ev[9].some(c => inTreeCids.has(c)));
  const backlog = Object.entries(META).filter(([, v]) => v[1] === 'candidate').length;

  // 待审核队列：candidate 且窗口内活跃，按窗口家数排序
  const queue = [];
  for (const cid in D.concepts) {
    const nmc = D.concepts[cid][0];
    const mv = META[nmc];
    if (!mv || mv[1] !== 'candidate') continue;
    if (FIX[nmc]) continue;                       // 本地已标注的不再进队列
    const codes = new Set();
    for (const d of win) for (const ev of (byConcept[cid]?.days.get(d) || [])) codes.add(ev[0]);
    if (!codes.size) continue;
    if (TAGS.govQ && !nmc.includes(TAGS.govQ)) continue;
    const tops = [...(byConcept[cid]?.stocks || new Map())].sort((a, b) => b[1] - a[1]).slice(0, 3);
    queue.push({ cid: +cid, nm: nmc, n: codes.size, total: D.concepts[cid][1],
                 tops: tops.map(([c]) => D.stocks[c] || c), sugg: (D.llm_sugg || {})[nmc] });
  }
  queue.sort((a, b) => b.n - a.n || b.total - a.total);

  // 疑似重复（互为子串）
  const activeNames = Object.keys(META).filter(n => nameToCid[n] != null && byConcept[nameToCid[n]]);
  const dup = [];
  const hotNames = activeNames.filter(n => hotOf(nameToCid[n]) >= 1);
  for (const a of hotNames) for (const b of activeNames) {
    if (a !== b && b.includes(a) && a.length >= 2 && !(D.aliases[b] != null))
      dup.push(a + ' ⊂ ' + b);
    if (dup.length >= 15) break;
  }

  // 共现观测：窗口内题材/催化标签对
  const pairCnt = new Map(), prevCnt = new Map();
  const countPairs = (dates, map) => {
    for (const d of dates) for (const ev of (D.events[d] || [])) {
      if (isTouch(ev)) continue;
      const ns = ev[9].map(c => D.concepts[c][0]).filter(n => isTheme(n) || isCatalyst(n));
      for (let i = 0; i < ns.length; i++) for (let j = i + 1; j < ns.length; j++) {
        const k = [ns[i], ns[j]].sort().join('×');
        map.set(k, (map.get(k) || 0) + 1);
      }
    }
  };
  countPairs(win, pairCnt);
  countPairs(D.dates.slice(-20, -10), prevCnt);
  const pairs = [...pairCnt].sort((a, b) => b[1] - a[1]).slice(0, 20)
    .map(([k, n]) => ({ k, n, up: n > (prevCnt.get(k) || 0) * 1.5 }));

  $('#tagsub').innerHTML = `
  <div class="stats">
    <div class="stat"><div class="v">${todayZt.length ? Math.round((1 - uncov.length / todayZt.length) * 100) + '%' : '—'}</div>
      <div class="k">${dN.slice(5)} 树内覆盖率</div></div>
    <div class="stat"><div class="v">${uncov.length}</div><div class="k">今日未入树涨停</div></div>
    <div class="stat"><div class="v">${backlog}</div><div class="k">待审核积压</div></div>
    <div class="stat"><div class="v">${queue.length}</div><div class="k">近10日活跃待审</div></div>
  </div>
  ${uncov.length ? `<div class="card"><div class="card-h"><span class="cname muted">今日未入树涨停</span>
    <span class="hist">标签都还没进 taxonomy 的股票，优先处理</span></div>
    <div class="chips">${uncov.map(ev => chipHtml(ev, dN)).join('')}</div></div>` : ''}
  <div class="card"><div class="card-h"><span class="cname">待审核队列（近10日活跃）</span>
    <input id="g-q" placeholder="搜标签" value="${esc(TAGS.govQ)}" style="margin-left:auto;padding:4px 10px;
      border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:12px;width:140px"></div>
    <div>${queue.slice(0, 60).map(q => `
      <div class="govrow">
        <input type="checkbox" data-gck="${esc(q.nm)}" ${TAGS.govSel.has(q.nm) ? 'checked' : ''}>
        <span class="gname" data-cid="${q.cid}">${esc(q.nm)}</span>
        <span class="gmeta">近10日${q.n}只 · 累计${q.total}次 · ${q.tops.map(esc).join('/')}</span>
        ${q.sugg ? `<span class="sugg">LLM: ${TYPE_LABEL[q.sugg[0]] || q.sugg[0]} ${Math.round(q.sugg[1] * 100)}%${q.sugg[2] ? ' → ' + esc(q.sugg[2]) : ''}</span>
          ${q.sugg[1] >= 0.4 && q.sugg[0] !== 'unknown' ? `<button class="clsbtn" data-adopt="${esc(q.nm)}">采纳</button>` : ''}` : ''}
        <button class="clsbtn" data-cls="${esc(q.nm)}">✎</button>
      </div>`).join('') || '<div class="muted small" style="padding:8px">近10日无活跃待审标签 🎉</div>'}</div>
    ${queue.length > 60 ? `<div class="muted small" style="padding:6px 8px">共 ${queue.length} 条，显示前60（搜索缩小范围）</div>` : ''}
    <div class="batchbar" id="batchbar" style="display:${TAGS.govSel.size ? 'flex' : 'none'}">
      <span class="small muted">已选 ${TAGS.govSel.size} 条，批量设为：</span>
      ${['sector', 'product', 'theme', 'catalyst', 'attribute', 'event'].map(t =>
        `<button class="navbtn" data-bset="${t}">${TYPE_LABEL[t]}</button>`).join('')}
      <button class="navbtn" data-bset="__clear">取消选择</button>
    </div>
  </div>
  ${dup.length ? `<div class="card"><div class="card-h"><span class="cname muted">疑似重复标签</span>
    <span class="hist">左边包含于右边，确认同义就加 aliases.json 后 rebuild</span></div>
    <div class="muted small">${dup.map(esc).join('　·　')}</div></div>` : ''}
  <div class="card"><div class="card-h"><span class="cname muted">共现观测（近10日）</span>
    <span class="hist">同一只票同时带两个标签 · ↑=较前10日明显上升，新叙事信号</span></div>
    <div>${pairs.map(p => `<span class="concept-chip" style="cursor:default">${esc(p.k)}
      <span class="x">${p.n}${p.up ? ' <b style="color:var(--up)">↑</b>' : ''}</span></span>`).join('') || '<span class="muted small">无</span>'}</div></div>`;

  $('#g-q').addEventListener('input', e => { TAGS.govQ = e.target.value.trim(); renderTagsGov();
    const qi = $('#g-q'); qi.focus(); qi.setSelectionRange(qi.value.length, qi.value.length); });
  document.querySelectorAll('[data-gck]').forEach(el =>
    el.addEventListener('change', () => {
      el.checked ? TAGS.govSel.add(el.dataset.gck) : TAGS.govSel.delete(el.dataset.gck);
      $('#batchbar').style.display = TAGS.govSel.size ? 'flex' : 'none';
    }));
  document.querySelectorAll('[data-adopt]').forEach(el =>
    el.addEventListener('click', () => {
      const nm = el.dataset.adopt, s = (D.llm_sugg || {})[nm];
      if (!s) return;
      FIX[nm] = { type: s[0], status: 'active' };
      if (s[2]) FIX[nm].parent = s[2];
      saveFix(); location.reload();
    }));
  document.querySelectorAll('[data-bset]').forEach(el =>
    el.addEventListener('click', () => {
      const t = el.dataset.bset;
      if (t === '__clear') { TAGS.govSel.clear(); renderTagsGov(); return; }
      for (const nm of TAGS.govSel) FIX[nm] = { type: t, status: 'active' };
      TAGS.govSel.clear(); saveFix(); location.reload();
    }));
  document.querySelectorAll('.govrow .gname[data-cid]').forEach(el =>
    el.addEventListener('click', () => go('#/concept/' + el.dataset.cid)));
  document.querySelectorAll('#tagsub .clsbtn[data-cls]').forEach(el =>
    el.addEventListener('click', () => openClassify(el.dataset.cls)));
  document.querySelectorAll('#tagsub .chip[data-code]').forEach(el =>
    el.addEventListener('click', () => go('#/stock/' + el.dataset.code)));
}

/* ---------- 全局搜索 ---------- */
const qInput = $('#q'), qDrop = $('#q-drop');
let selIdx = -1;
qInput.addEventListener('input', () => {
  const v = qInput.value.trim();
  selIdx = -1;
  if (!v) { qDrop.style.display = 'none'; return; }
  const out = [];
  if (/^\d{2,6}$/.test(v)) {
    for (const code in D.stocks)
      if (code.startsWith(v)) out.push({ kind: '股票', label: `${D.stocks[code]} ${code}`, hash: '#/stock/' + code });
  }
  for (const code in D.stocks) {
    if (out.length > 14) break;
    if (D.stocks[code] && D.stocks[code].includes(v) && !out.some(o => o.hash.endsWith(code)))
      out.push({ kind: '股票', label: `${D.stocks[code]} ${code}`, hash: '#/stock/' + code });
  }
  const seen = new Set();
  for (const nm in nameToCid) {
    if (out.length > 22) break;
    if (nm.includes(v) && !seen.has(nameToCid[nm])) {
      seen.add(nameToCid[nm]);
      const cid = nameToCid[nm], m = D.concepts[cid];
      if (m) out.push({ kind: '概念', label: `${m[0]}（${m[1]}次）`, hash: '#/concept/' + cid });
    }
  }
  qDrop.innerHTML = out.slice(0, 22).map((o, i) =>
    `<div class="item" data-h="${o.hash}" data-i="${i}"><span class="kind">${o.kind}</span>${esc(o.label)}</div>`).join('')
    || '<div class="item muted">无匹配</div>';
  qDrop.style.display = 'block';
  qDrop.querySelectorAll('[data-h]').forEach(el =>
    el.addEventListener('mousedown', () => { go(el.dataset.h); qDrop.style.display = 'none'; qInput.value = ''; }));
});
qInput.addEventListener('keydown', e => {
  const items = qDrop.querySelectorAll('[data-h]');
  if (e.key === 'ArrowDown') { selIdx = Math.min(selIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { selIdx = Math.max(selIdx - 1, 0); }
  else if (e.key === 'Enter' && items[Math.max(0, selIdx)]) {
    go(items[Math.max(0, selIdx)].dataset.h); qDrop.style.display = 'none'; qInput.value = ''; return;
  } else if (e.key === 'Escape') { qDrop.style.display = 'none'; return; }
  else return;
  items.forEach((el, i) => el.classList.toggle('sel', i === selIdx));
  e.preventDefault();
});
qInput.addEventListener('blur', () => setTimeout(() => qDrop.style.display = 'none', 150));

/* ---------- 手动分类（本地暂存 → 导出补丁落盘） ---------- */
const ALLT = ['sector', 'product', 'theme', 'catalyst', 'attribute', 'event', 'unknown'];
const STATUS_LABEL = { active: '已审核', candidate: '待审核', retired: '退役' };
function showModal() { $('#modal').style.display = 'block'; $('#modal-mask').style.display = 'block'; }
function closeModal() { $('#modal').style.display = 'none'; $('#modal-mask').style.display = 'none'; }

function openClassify(nm) {
  const cur = FIX[nm] || {};
  const curMeta = META[nm] || [];
  const type = cur.type || curMeta[0] || 'theme';
  const status = cur.status || curMeta[1] || 'active';
  const virtual = cur.virtual ?? !!curMeta[2];
  const parent = cur.parent || taxParentsOf(nm)[0] || '';
  const allNodes = [...new Set([...Object.keys(TAX), ...Object.values(TAX).flat()])].sort();
  $('#modal').innerHTML = `
    <h3>✎ 分类标签：${esc(nm)}</h3>
    <div class="mrow"><div class="mlabel">类型（sector/product/theme→三层交叉热力，catalyst→催化热力，其余不进热度）</div>
      <div class="opts" id="m-type">${ALLT.map(t =>
        `<span class="opt${t === type ? ' on' : ''}" data-v="${t}">${TYPE_LABEL[t]}</span>`).join('')}</div></div>
    <div class="mrow"><div class="mlabel">状态</div>
      <div class="opts" id="m-status">${Object.keys(STATUS_LABEL).map(s =>
        `<span class="opt${s === status ? ' on' : ''}" data-v="${s}">${STATUS_LABEL[s]}</span>`).join('')}</div></div>
    <div class="mrow"><div class="mlabel">父节点（留空=自成一级板块；填已有标签名可多级挂靠）</div>
      <input type="text" id="m-parent" list="taxnodes" value="${esc(parent)}" placeholder="如：半导体">
      <datalist id="taxnodes">${allNodes.map(n => `<option value="${esc(n)}">`).join('')}</datalist></div>
    <div class="muted small">保存后本浏览器立即生效；正式落盘请点右下角「导出补丁」。</div>
    <div class="mbtns">
      ${FIX[nm] ? '<button class="navbtn" id="m-del">移除标注</button>' : ''}
      <button class="navbtn" id="m-cancel">取消</button>
      <button class="btn-primary" style="margin-top:0" id="m-save">保存</button>
    </div>`;
  showModal();
  document.querySelectorAll('#m-type .opt, #m-status .opt').forEach(el =>
    el.addEventListener('click', () => {
      el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('on'));
      el.classList.add('on');
    }));
  $('#m-cancel').onclick = closeModal;
  $('#m-save').onclick = () => {
    const t = $('#m-type .opt.on').dataset.v, s = $('#m-status .opt.on').dataset.v;
    const p = $('#m-parent').value.trim();
    FIX[nm] = { type: t, status: s };
    if (virtual) FIX[nm].virtual = true;
    if (p && p !== nm) FIX[nm].parent = p;
    saveFix();
    location.reload();          // 重新推导 taxonomy/热度缓存，最省事且够快
  };
  $('#m-del')?.addEventListener('click', () => {
    delete FIX[nm]; saveFix(); location.reload();
  });
}

function openAttach(parentNm) {
  // 把已有概念挂到 parentNm 下（不在树内的概念都可选）
  const inTree = new Set([...Object.keys(TAX), ...Object.values(TAX).flat()]);
  const cands = Object.values(D.concepts).map(c => c[0])
    .filter(n => !inTree.has(n)).sort();
  const defType = isCatalyst(parentNm) ? 'catalyst'
    : typeOf(parentNm) === 'theme' ? 'theme' : 'product';
  $('#modal').innerHTML = `
    <h3>➕ 挂子标签到「${esc(parentNm)}」</h3>
    <div class="mrow"><div class="mlabel">选择一个未入树的标签（可输入过滤）</div>
      <input type="text" id="m-child" list="orphnodes" placeholder="输入标签名">
      <datalist id="orphnodes">${cands.map(n => `<option value="${esc(n)}">`).join('')}</datalist></div>
    <div class="muted small">类型将设为 ${TYPE_LABEL[defType]}·已审核（可稍后 ✎ 调整）；本地立即生效。</div>
    <div class="mbtns">
      <button class="navbtn" id="m-cancel">取消</button>
      <button class="btn-primary" style="margin-top:0" id="m-save">挂靠</button>
    </div>`;
  showModal();
  $('#m-cancel').onclick = closeModal;
  $('#m-save').onclick = () => {
    const child = $('#m-child').value.trim();
    if (!child || child === parentNm) return;
    FIX[child] = { type: (FIX[child] || {}).type || defType, status: 'active', parent: parentNm };
    saveFix(); location.reload();
  };
}

function exportPatch() {
  const meta = {}, tax = {};
  for (const nm of Object.keys(FIX).sort()) {
    const f = FIX[nm];
    if (f.type) {
      meta[nm] = { type: f.type, status: f.status || 'active' };
      if (f.virtual) meta[nm].virtual = true;
    }
    if (f.parent) (tax[f.parent] ??= []).push(nm);
  }
  return JSON.stringify({ 'tag_meta合并': meta, 'taxonomy追加': tax }, null, 1);
}
function openExport() {
  const n = Object.keys(FIX).length;
