/* --- 生命周期：休眠/活跃/启动/高潮/退潮 --- */
function lifecycleOf(nm) {
  const s = taxSeries(nm);
  const win = s.slice(-30);
  const sum = win.reduce((a, b) => a + b, 0);
  if (!sum) return ['idle', '休眠'];
  const r3 = s.slice(-3).reduce((a, b) => a + b, 0) / 3;
  const peak3 = Math.max(...win.map((_, i) => win.slice(Math.max(0, i - 2), i + 1)
    .reduce((a, b) => a + b, 0) / 3));
  const st = startupOf(s);
  if (st && st.recent >= 3 && st.ratio >= 2.2) return ['start', '启动'];
  if (r3 >= 4 && r3 >= peak3 * 0.8) return ['hot', '高潮'];
  if (peak3 >= 3 && r3 < peak3 * 0.35) return ['ebb', '退潮'];
  return ['live', '活跃'];
}

/* --- 全景树 --- */
function renderTagsTree() {
  const winDates = TAGS.days ? D.dates.slice(-TAGS.days) : D.dates;
  const sum5 = nm => taxSeries(nm).slice(-TAGS.days || undefined).reduce((a, b) => a + b, 0);
  const childSet2 = new Set(Object.values(TAX).flat());
  const roots = Object.keys(TAX).filter(p => !childSet2.has(p));
  const groupRoots = [
    ['题材', roots.filter(isTheme).sort((a, b) => sum5(b) - sum5(a))],
    ['催化', roots.filter(isCatalyst).sort((a, b) => sum5(b) - sum5(a))],
    ['属性', roots.filter(n => !isTheme(n) && !isCatalyst(n)).sort((a, b) => sum5(b) - sum5(a))],
  ];
  const maxSum = Math.max(4, ...roots.map(sum5));

  const nodeHtml = (nm, depth) => {
    const kids = (TAX[nm] || []).filter(ch => !TAGS.onlyActive || sum5(ch) > 0 || TAX[ch]);
    const open = TAGS.expanded.has(nm);
    const s = sum5(nm);
    if (TAGS.onlyActive && !s && !kids.length && depth > 0) return '';
    const [lc, lcTxt] = lifecycleOf(nm);
    const dotc = { theme: 'var(--accent)', cat: 'var(--teal)' }[
      isTheme(nm) ? 'theme' : isCatalyst(nm) ? 'cat' : 'x'] || 'var(--gold)';
    const bw = Math.max(2, Math.round(46 * Math.sqrt(s / maxSum)));
    let h = `<div class="pnode${TAGS.sel === nm ? ' sel' : ''}" data-pn="${esc(nm)}"
      style="padding-left:${8 + depth * 16}px">
      <span class="exp" data-pexp="${esc(nm)}">${kids.length ? (open ? '▾' : '▸') : ''}</span>
      <span class="dot" style="background:${dotc}"></span>
      <span class="pn${depth === 0 ? '' : ''}" ${depth === 0 ? 'style="font-weight:700"' : ''}>${esc(nm)}</span>
      ${s ? `<span class="lc lc-${lc}">${lcTxt}</span><span class="hb" style="width:${bw}px"></span><span class="hn">${s}</span>` : '<span class="lc lc-idle">休眠</span>'}
    </div>`;
    if (open) for (const ch of kids.sort((a, b) => sum5(b) - sum5(a))) h += nodeHtml(ch, depth + 1);
    return h;
  };

  let treeHtml = '';
  for (const [glabel, list] of groupRoots) {
    if (!list.length) continue;
    treeHtml += `<div class="muted small" style="padding:8px 8px 2px;font-weight:700">${glabel}</div>`
      + list.map(r => nodeHtml(r, 0)).join('');
  }

  $('#tagsub').innerHTML = `
  <div class="fltrow" style="margin-bottom:10px">
    <span class="flabel">时间窗</span>
    <div class="seg">${[[5, '近5日'], [10, '近10日'], [30, '近30日'], [0, '全部']].map(([v, l]) =>
      `<button data-td="${v}" class="${TAGS.days === v ? 'on' : ''}">${l}</button>`).join('')}</div>
    <button class="navbtn" id="t-expall">全部展开</button>
    <button class="navbtn" id="t-clpall">全部收起</button>
    <label class="small muted"><input type="checkbox" id="t-act" ${TAGS.onlyActive ? 'checked' : ''}> 只看有热度</label>
    <button class="navbtn" id="t-newgrp">➕ 新建分组</button>
  </div>
  <div class="tree2col">
    <div class="panor">${treeHtml}</div>
    <div class="npanel" id="npanel">${TAGS.sel ? '' : '<div class="empty">← 点击左侧节点查看该枝全景与梯队</div>'}</div>
  </div>`;

  document.querySelectorAll('[data-td]').forEach(el =>
    el.addEventListener('click', () => { TAGS.days = +el.dataset.td; renderTagsTree(); }));
  $('#t-expall').onclick = () => {
    for (const p in TAX) TAGS.expanded.add(p);
    renderTagsTree();
  };
  $('#t-clpall').onclick = () => { TAGS.expanded.clear(); renderTagsTree(); };
  $('#t-act').onchange = e => { TAGS.onlyActive = e.target.checked; renderTagsTree(); };
  $('#t-newgrp').onclick = openNewGroup;
  document.querySelectorAll('[data-pexp]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const nm = el.dataset.pexp;
      TAGS.expanded.has(nm) ? TAGS.expanded.delete(nm) : TAGS.expanded.add(nm);
      renderTagsTree();
    }));
  document.querySelectorAll('[data-pn]').forEach(el =>
    el.addEventListener('click', () => { TAGS.sel = el.dataset.pn; renderTagsTree(); }));
  if (TAGS.sel) renderNodePanel(TAGS.sel, winDates);
}

/* --- 节点面板：梯队表 + 分枝股票 --- */
function renderNodePanel(nm, winDates) {
  const cids = taxCids(nm);
  const winSet = new Set(winDates);
  // 窗口内该枝的股票聚合
  const agg = new Map();     // code -> {maxLb, n, last, lastEv, touch}
  for (const d of winDates) for (const ev of D.events[d]) {
    if (!ev[9].some(c => cids.has(c))) continue;
    const a = agg.get(ev[0]) ?? agg.set(ev[0], { maxLb: 0, n: 0, tc: 0, last: '', lastEv: ev }).get(ev[0]);
    if (isTouch(ev)) a.tc++; else { a.n++; a.maxLb = Math.max(a.maxLb, ev[1] || 1); }
    if (d >= a.last) { a.last = d; a.lastEv = ev; }
  }
  const stocks = [...agg].map(([code, a]) => ({ code, ...a }))
    .sort((a, b) => b.maxLb - a.maxLb || b.n - a.n);
  // 晋级率：窗口最后两个交易日
  const dN = winDates[winDates.length - 1], dP = winDates[winDates.length - 2];
  let promo = '';
  if (dP) {
    const inBranchZt = d => new Set((D.events[d] || [])
      .filter(ev => !isTouch(ev) && ev[9].some(c => cids.has(c))).map(ev => ev[0]));
    const p = inBranchZt(dP), n = inBranchZt(dN);
    const kept = [...p].filter(c => n.has(c)).length;
    if (p.size) promo = `晋级率 <b>${Math.round(kept / p.size * 100)}%</b>（${dP.slice(5)} ${p.size}只 → 今再板 ${kept}只）`;
  }
  const [lc, lcTxt] = lifecycleOf(nm);
  const tier = (label, list, cls) => list.length ? `
    <div class="trow"><span class="tlabel ${cls}">${label}</span><div class="tbody">${
      list.map(s => `<span class="chip${isTouch(s.lastEv) ? ' touch' : ''}" data-code="${s.code}">
        ${lbBadge(s.lastEv)} ${esc(D.stocks[s.code] || s.code)}
        <span class="code">${s.n > 1 ? '×' + s.n : ''}</span></span>`).join('')}</div></div>` : '';
  const t1 = stocks.filter(s => s.maxLb >= 3), t2 = stocks.filter(s => s.maxLb === 2),
        t3 = stocks.filter(s => s.n && s.maxLb <= 1), t4 = stocks.filter(s => !s.n);
  // 分枝分布
  const kids = (TAX[nm] || []).filter(ch => taxCids(ch).size);
  const branchRows = kids.map(ch => {
    const chCids = taxCids(ch);
    const codes = new Set();
    for (const d of winDates) for (const ev of D.events[d])
      if (!isTouch(ev) && ev[9].some(c => chCids.has(c))) codes.add(ev[0]);
    return { ch, n: codes.size };
  }).filter(b => b.n).sort((a, b) => b.n - a.n);

  const cid0 = nameToCid[nm];
  $('#npanel').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <b style="font-size:16px">${esc(nm)}</b>
      <span class="lc lc-${lc}">${lcTxt}</span>
      <span class="muted small">${TYPE_LABEL[typeOf(nm)]} · 窗口内 ${stocks.filter(s => s.n).length} 只涨停${stocks.filter(s => !s.n).length ? ' + ' + stocks.filter(s => !s.n).length + ' 只触及' : ''}</span>
      <button class="clsbtn${FIX[nm] ? ' done' : ''}" data-cls="${esc(nm)}">✎ 编辑</button>
      <button class="clsbtn" id="np-attach">➕ 挂子标签</button>
      ${cid0 != null && byConcept[cid0] ? `<button class="clsbtn" data-cid-go="${cid0}">概念页 →</button>` : ''}
    </div>
    ${promo ? `<div class="muted small" style="margin-top:4px">${promo}</div>` : ''}
    <div style="margin-top:8px">
      ${tier('空间板 ≥3板', t1, 'tl-theme') + tier('中军 2板', t2, 'tl-cat') +
        tier('首板/跟风', t3, 'tl-attr') + tier('触及未封', t4, 'tl-evt')}
      ${!stocks.length ? '<div class="muted small">窗口内无涨停记录</div>' : ''}
    </div>
    ${branchRows.length ? `<div style="margin-top:10px"><span class="muted small">分枝热度：</span>${
      branchRows.map(b => `<span class="concept-chip" data-pn2="${esc(b.ch)}">${esc(b.ch)}<span class="x">${b.n}只</span></span>`).join('')}</div>` : ''}`;

  document.querySelectorAll('#npanel [data-code]').forEach(el =>
    el.addEventListener('click', () => go('#/stock/' + el.dataset.code)));
  document.querySelectorAll('#npanel [data-pn2]').forEach(el =>
    el.addEventListener('click', () => {
      TAGS.sel = el.dataset.pn2; TAGS.expanded.add(nm); renderTagsTree();
    }));
  document.querySelectorAll('#npanel .clsbtn[data-cls]').forEach(el =>
    el.addEventListener('click', () => openClassify(el.dataset.cls)));
  document.querySelector('#npanel [data-cid-go]')?.addEventListener('click',
    e => go('#/concept/' + e.target.dataset.cidGo));
  $('#np-attach').onclick = () => openAttach(nm);
}

/* --- 治理台 --- */
function renderTagsGov() {
  const win = D.dates.slice(-10);
  // 覆盖率（最新交易日）
  const dN = D.dates[D.dates.length - 1];
  const inTreeCids = new Set();
  const childSet2 = new Set(Object.values(TAX).flat());
  for (const r of Object.keys(TAX).filter(p => !childSet2.has(p)))
    for (const c of taxCids(r)) inTreeCids.add(c);
  const todayZt = (D.events[dN] || []).filter(ev => !isTouch(ev));
  const uncov = todayZt.filter(ev => !ev[9].some(c => inTreeCids.has(c)));
  const backlog = Object.entries(META).filter(([, v]) => v[1] === 'candidate').length;

  // 待审核队列：candidate 且窗口内活跃，按窗口家数排序
  const queue = [];
  for (const cid in D.concepts) {
    const nmc = D.concepts[cid][0];
    const mv = META[nmc];
    if (!mv || mv[1] !== 'candidate') continue;
    if (FIX[nmc]) continue;                       // 本地已标注的不再进队列
    const codes = new Set();
    for (const d of win) for (const ev of (byConcept[cid]?.days.get(d) || [])) codes.add(ev[0]);
    if (!codes.size) continue;
    if (TAGS.govQ && !nmc.includes(TAGS.govQ)) continue;
    const tops = [...(byConcept[cid]?.stocks || new Map())].sort((a, b) => b[1] - a[1]).slice(0, 3);
    queue.push({ cid: +cid, nm: nmc, n: codes.size, total: D.concepts[cid][1],
                 tops: tops.map(([c]) => D.stocks[c] || c), sugg: (D.llm_sugg || {})[nmc] });
  }
  queue.sort((a, b) => b.n - a.n || b.total - a.total);

  // 疑似重复（互为子串）
  const activeNames = Object.keys(META).filter(n => nameToCid[n] != null && byConcept[nameToCid[n]]);
  const dup = [];
  const hotNames = activeNames.filter(n => hotOf(nameToCid[n]) >= 1);
  for (const a of hotNames) for (const b of activeNames) {
    if (a !== b && b.includes(a) && a.length >= 2 && !(D.aliases[b] != null))
      dup.push(a + ' ⊂ ' + b);
    if (dup.length >= 15) break;
  }

  // 共现观测：窗口内题材/催化标签对
  const pairCnt = new Map(), prevCnt = new Map();
  const countPairs = (dates, map) => {
    for (const d of dates) for (const ev of (D.events[d] || [])) {
      if (isTouch(ev)) continue;
      const ns = ev[9].map(c => D.concepts[c][0]).filter(n => isTheme(n) || isCatalyst(n));
      for (let i = 0; i < ns.length; i++) for (let j = i + 1; j < ns.length; j++) {
        const k = [ns[i], ns[j]].sort().join('×');
        map.set(k, (map.get(k) || 0) + 1);
      }
    }
  };
  countPairs(win, pairCnt);
  countPairs(D.dates.slice(-20, -10), prevCnt);
  const pairs = [...pairCnt].sort((a, b) => b[1] - a[1]).slice(0, 20)
    .map(([k, n]) => ({ k, n, up: n > (prevCnt.get(k) || 0) * 1.5 }));

  $('#tagsub').innerHTML = `
  <div class="stats">
    <div class="stat"><div class="v">${todayZt.length ? Math.round((1 - uncov.length / todayZt.length) * 100) + '%' : '—'}</div>
      <div class="k">${dN.slice(5)} 树内覆盖率</div></div>
    <div class="stat"><div class="v">${uncov.length}</div><div class="k">今日未入树涨停</div></div>
    <div class="stat"><div class="v">${backlog}</div><div class="k">待审核积压</div></div>
    <div class="stat"><div class="v">${queue.length}</div><div class="k">近10日活跃待审</div></div>
  </div>
  ${uncov.length ? `<div class="card"><div class="card-h"><span class="cname muted">今日未入树涨停</span>
    <span class="hist">标签都还没进 taxonomy 的股票，优先处理</span></div>
    <div class="chips">${uncov.map(ev => chipHtml(ev, dN)).join('')}</div></div>` : ''}
  <div class="card"><div class="card-h"><span class="cname">待审核队列（近10日活跃）</span>
    <input id="g-q" placeholder="搜标签" value="${esc(TAGS.govQ)}" style="margin-left:auto;padding:4px 10px;
      border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:12px;width:140px"></div>
    <div>${queue.slice(0, 60).map(q => `
      <div class="govrow">
        <input type="checkbox" data-gck="${esc(q.nm)}" ${TAGS.govSel.has(q.nm) ? 'checked' : ''}>
        <span class="gname" data-cid="${q.cid}">${esc(q.nm)}</span>
        <span class="gmeta">近10日${q.n}只 · 累计${q.total}次 · ${q.tops.map(esc).join('/')}</span>
        ${q.sugg ? `<span class="sugg">LLM: ${TYPE_LABEL[q.sugg[0]] || q.sugg[0]} ${Math.round(q.sugg[1] * 100)}%${q.sugg[2] ? ' → ' + esc(q.sugg[2]) : ''}</span>
          ${q.sugg[1] >= 0.4 && q.sugg[0] !== 'unknown' ? `<button class="clsbtn" data-adopt="${esc(q.nm)}">采纳</button>` : ''}` : ''}
        <button class="clsbtn" data-cls="${esc(q.nm)}">✎</button>
      </div>`).join('') || '<div class="muted small" style="padding:8px">近10日无活跃待审标签 🎉</div>'}</div>
    ${queue.length > 60 ? `<div class="muted small" style="padding:6px 8px">共 ${queue.length} 条，显示前60（搜索缩小范围）</div>` : ''}
    <div class="batchbar" id="batchbar" style="display:${TAGS.govSel.size ? 'flex' : 'none'}">
      <span class="small muted">已选 ${TAGS.govSel.size} 条，批量设为：</span>
      ${['theme', 'catalyst', 'attribute', 'event'].map(t =>
        `<button class="navbtn" data-bset="${t}">${TYPE_LABEL[t]}</button>`).join('')}
      <button class="navbtn" data-bset="__clear">取消选择</button>
    </div>
  </div>
  ${dup.length ? `<div class="card"><div class="card-h"><span class="cname muted">疑似重复标签</span>
    <span class="hist">左边包含于右边，确认同义就加 aliases.json 后 rebuild</span></div>
    <div class="muted small">${dup.map(esc).join('　·　')}</div></div>` : ''}
  <div class="card"><div class="card-h"><span class="cname muted">共现观测（近10日）</span>
    <span class="hist">同一只票同时带两个标签 · ↑=较前10日明显上升，新叙事信号</span></div>
    <div>${pairs.map(p => `<span class="concept-chip" style="cursor:default">${esc(p.k)}
      <span class="x">${p.n}${p.up ? ' <b style="color:var(--up)">↑</b>' : ''}</span></span>`).join('') || '<span class="muted small">无</span>'}</div></div>`;

  $('#g-q').addEventListener('input', e => { TAGS.govQ = e.target.value.trim(); renderTagsGov();
    const qi = $('#g-q'); qi.focus(); qi.setSelectionRange(qi.value.length, qi.value.length); });
  document.querySelectorAll('[data-gck]').forEach(el =>
    el.addEventListener('change', () => {
      el.checked ? TAGS.govSel.add(el.dataset.gck) : TAGS.govSel.delete(el.dataset.gck);
      $('#batchbar').style.display = TAGS.govSel.size ? 'flex' : 'none';
    }));
  document.querySelectorAll('[data-adopt]').forEach(el =>
    el.addEventListener('click', () => {
      const nm = el.dataset.adopt, s = (D.llm_sugg || {})[nm];
      if (!s) return;
      FIX[nm] = { type: s[0], status: 'active' };
      if (s[2]) FIX[nm].parent = s[2];
      saveFix(); location.reload();
    }));
  document.querySelectorAll('[data-bset]').forEach(el =>
    el.addEventListener('click', () => {
      const t = el.dataset.bset;
      if (t === '__clear') { TAGS.govSel.clear(); renderTagsGov(); return; }
      for (const nm of TAGS.govSel) FIX[nm] = { type: t, status: 'active' };
      TAGS.govSel.clear(); saveFix(); location.reload();
    }));
  document.querySelectorAll('.govrow .gname[data-cid]').forEach(el =>
    el.addEventListener('click', () => go('#/concept/' + el.dataset.cid)));
  document.querySelectorAll('#tagsub .clsbtn[data-cls]').forEach(el =>
    el.addEventListener('click', () => openClassify(el.dataset.cls)));
  document.querySelectorAll('#tagsub .chip[data-code]').forEach(el =>
    el.addEventListener('click', () => go('#/stock/' + el.dataset.code)));
}

/* ---------- 全局搜索 ---------- */
const qInput = $('#q'), qDrop = $('#q-drop');
let selIdx = -1;
qInput.addEventListener('input', () => {
  const v = qInput.value.trim();
  selIdx = -1;
  if (!v) { qDrop.style.display = 'none'; return; }
  const out = [];
  if (/^\d{2,6}$/.test(v)) {
    for (const code in D.stocks)
      if (code.startsWith(v)) out.push({ kind: '股票', label: `${D.stocks[code]} ${code}`, hash: '#/stock/' + code });
  }
  for (const code in D.stocks) {
    if (out.length > 14) break;
    if (D.stocks[code] && D.stocks[code].includes(v) && !out.some(o => o.hash.endsWith(code)))
      out.push({ kind: '股票', label: `${D.stocks[code]} ${code}`, hash: '#/stock/' + code });
  }
  const seen = new Set();
  for (const nm in nameToCid) {
    if (out.length > 22) break;
    if (nm.includes(v) && !seen.has(nameToCid[nm])) {
      seen.add(nameToCid[nm]);
      const cid = nameToCid[nm], m = D.concepts[cid];
      if (m) out.push({ kind: '概念', label: `${m[0]}（${m[1]}次）`, hash: '#/concept/' + cid });
    }
  }
  qDrop.innerHTML = out.slice(0, 22).map((o, i) =>
    `<div class="item" data-h="${o.hash}" data-i="${i}"><span class="kind">${o.kind}</span>${esc(o.label)}</div>`).join('')
    || '<div class="item muted">无匹配</div>';
  qDrop.style.display = 'block';
  qDrop.querySelectorAll('[data-h]').forEach(el =>
    el.addEventListener('mousedown', () => { go(el.dataset.h); qDrop.style.display = 'none'; qInput.value = ''; }));
});
qInput.addEventListener('keydown', e => {
  const items = qDrop.querySelectorAll('[data-h]');
  if (e.key === 'ArrowDown') { selIdx = Math.min(selIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { selIdx = Math.max(selIdx - 1, 0); }
  else if (e.key === 'Enter' && items[Math.max(0, selIdx)]) {
    go(items[Math.max(0, selIdx)].dataset.h); qDrop.style.display = 'none'; qInput.value = ''; return;
  } else if (e.key === 'Escape') { qDrop.style.display = 'none'; return; }
  else return;
  items.forEach((el, i) => el.classList.toggle('sel', i === selIdx));
  e.preventDefault();
});
qInput.addEventListener('blur', () => setTimeout(() => qDrop.style.display = 'none', 150));

/* ---------- 手动分类（本地暂存 → 导出补丁落盘） ---------- */
const ALLT = ['sector', 'theme', 'catalyst', 'attribute', 'event', 'unknown'];
const STATUS_LABEL = { active: '已审核', candidate: '待审核', retired: '退役' };
function showModal() { $('#modal').style.display = 'block'; $('#modal-mask').style.display = 'block'; }
function closeModal() { $('#modal').style.display = 'none'; $('#modal-mask').style.display = 'none'; }
$('#modal-mask').onclick = closeModal;

function openClassify(nm) {
  const cur = FIX[nm] || {};
  const curMeta = META[nm] || [];
  const type = cur.type || curMeta[0] || 'theme';
  const status = cur.status || curMeta[1] || 'active';
  const parent = cur.parent || taxParentsOf(nm)[0] || '';
  const allNodes = [...new Set([...Object.keys(TAX), ...Object.values(TAX).flat()])].sort();
  $('#modal').innerHTML = `
    <h3>✎ 分类标签：${esc(nm)}</h3>
    <div class="mrow"><div class="mlabel">类型（sector/theme→题材热力，catalyst→催化热力，其余不进热度）</div>
      <div class="opts" id="m-type">${ALLT.map(t =>
        `<span class="opt${t === type ? ' on' : ''}" data-v="${t}">${TYPE_LABEL[t]}</span>`).join('')}</div></div>
    <div class="mrow"><div class="mlabel">状态</div>
      <div class="opts" id="m-status">${Object.keys(STATUS_LABEL).map(s =>
        `<span class="opt${s === status ? ' on' : ''}" data-v="${s}">${STATUS_LABEL[s]}</span>`).join('')}</div></div>
    <div class="mrow"><div class="mlabel">父节点（留空=自成一级板块；填已有标签名可多级挂靠）</div>
      <input type="text" id="m-parent" list="taxnodes" value="${esc(parent)}" placeholder="如：半导体">
      <datalist id="taxnodes">${allNodes.map(n => `<option value="${esc(n)}">`).join('')}</datalist></div>
    <div class="muted small">保存后本浏览器立即生效；正式落盘请点右下角「导出补丁」。</div>
    <div class="mbtns">
      ${FIX[nm] ? '<button class="navbtn" id="m-del">移除标注</button>' : ''}
      <button class="navbtn" id="m-cancel">取消</button>
      <button class="btn-primary" style="margin-top:0" id="m-save">保存</button>
    </div>`;
  showModal();
  document.querySelectorAll('#m-type .opt, #m-status .opt').forEach(el =>
    el.addEventListener('click', () => {
      el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('on'));
      el.classList.add('on');
    }));
  $('#m-cancel').onclick = closeModal;
  $('#m-save').onclick = () => {
    const t = $('#m-type .opt.on').dataset.v, s = $('#m-status .opt.on').dataset.v;
    const p = $('#m-parent').value.trim();
    FIX[nm] = { type: t, status: s };
    if (p && p !== nm) FIX[nm].parent = p;
    saveFix();
    location.reload();          // 重新推导 taxonomy/热度缓存，最省事且够快
  };
  $('#m-del')?.addEventListener('click', () => {
    delete FIX[nm]; saveFix(); location.reload();
  });
}

function openAttach(parentNm) {
  // 把已有概念挂到 parentNm 下（不在树内的概念都可选）
  const inTree = new Set([...Object.keys(TAX), ...Object.values(TAX).flat()]);
  const cands = Object.values(D.concepts).map(c => c[0])
    .filter(n => !inTree.has(n)).sort();
  const defType = isCatalyst(parentNm) ? 'catalyst' : 'theme';
  $('#modal').innerHTML = `
    <h3>➕ 挂子标签到「${esc(parentNm)}」</h3>
    <div class="mrow"><div class="mlabel">选择一个未入树的标签（可输入过滤）</div>
      <input type="text" id="m-child" list="orphnodes" placeholder="输入标签名">
      <datalist id="orphnodes">${cands.map(n => `<option value="${esc(n)}">`).join('')}</datalist></div>
    <div class="muted small">类型将设为 ${TYPE_LABEL[defType]}·已审核（可稍后 ✎ 调整）；本地立即生效。</div>
    <div class="mbtns">
      <button class="navbtn" id="m-cancel">取消</button>
      <button class="btn-primary" style="margin-top:0" id="m-save">挂靠</button>
    </div>`;
  showModal();
  $('#m-cancel').onclick = closeModal;
  $('#m-save').onclick = () => {
    const child = $('#m-child').value.trim();
    if (!child || child === parentNm) return;
    FIX[child] = { type: (FIX[child] || {}).type || defType, status: 'active', parent: parentNm };
    saveFix(); location.reload();
  };
}

function openNewGroup() {
  // 新建虚拟分组节点（无涨停记录也可，作树的中间层/新一级板块）
  const allNodes = [...new Set([...Object.keys(TAX), ...Object.values(TAX).flat()])].sort();
  $('#modal').innerHTML = `
    <h3>➕ 新建分组节点</h3>
    <div class="mrow"><div class="mlabel">分组名（如"固态电池产业链"）</div>
      <input type="text" id="m-gname" placeholder="名称"></div>
    <div class="mrow"><div class="mlabel">频道</div>
      <div class="opts" id="m-type">
        <span class="opt on" data-v="sector">题材频道</span>
        <span class="opt" data-v="catalyst">催化频道</span></div></div>
    <div class="mrow"><div class="mlabel">父节点（留空=一级板块）</div>
      <input type="text" id="m-parent" list="taxnodes2" placeholder="可空">
      <datalist id="taxnodes2">${allNodes.map(n => `<option value="${esc(n)}">`).join('')}</datalist></div>
    <div class="muted small">建好后在全景树上用「➕挂子标签」往里装内容。</div>
    <div class="mbtns">
      <button class="navbtn" id="m-cancel">取消</button>
      <button class="btn-primary" style="margin-top:0" id="m-save">创建</button>
    </div>`;
  showModal();
  document.querySelectorAll('#m-type .opt').forEach(el =>
    el.addEventListener('click', () => {
      el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('on'));
      el.classList.add('on');
    }));
  $('#m-cancel').onclick = closeModal;
  $('#m-save').onclick = () => {
    const nm = $('#m-gname').value.trim();
    if (!nm) return;
    FIX[nm] = { type: $('#m-type .opt.on').dataset.v, status: 'active' };
    const p = $('#m-parent').value.trim();
    if (p && p !== nm) FIX[nm].parent = p;
    saveFix(); location.reload();
  };
}

function exportPatch() {
  const meta = {}, tax = {};
  for (const nm of Object.keys(FIX).sort()) {
    const f = FIX[nm];
    if (f.type) meta[nm] = { type: f.type, status: f.status || 'active' };
    if (f.parent) (tax[f.parent] ??= []).push(nm);
  }
  return JSON.stringify({ 'tag_meta合并': meta, 'taxonomy追加': tax }, null, 1);
}
function openExport() {
  const n = Object.keys(FIX).length;
  $('#modal').innerHTML = `
    <h3>本地标注补丁（${n} 条）</h3>
    <div class="muted small" style="margin-bottom:6px">
      复制 JSON 发给 Claude 或手工合并进 data/tag_meta.json、data/taxonomy.json，
      跑 build_site.py 落盘后回来点「清空」。</div>
    <textarea id="m-patch" readonly>${esc(exportPatch())}</textarea>
    <div class="mbtns">
      <button class="navbtn" id="m-clear">清空本地标注</button>
      <button class="navbtn" id="m-cancel">关闭</button>
      <button class="btn-primary" style="margin-top:0" id="m-copy">复制</button>
    </div>`;
  showModal();
  $('#m-cancel').onclick = closeModal;
  $('#m-copy').onclick = () => {
    navigator.clipboard?.writeText($('#m-patch').value);
    $('#m-copy').textContent = '已复制 ✓';
  };
  $('#m-clear').onclick = () => {
    if (confirm('清空全部本地标注？（应在补丁落盘后执行）')) {
      localStorage.removeItem('ztkg_tagfix'); location.reload();
    }
  };
}
function updatePendbar() {
  const n = Object.keys(FIX).length;
  const bar = $('#pendbar');
  bar.style.display = n ? 'block' : 'none';
  bar.textContent = `✎ 本地标注 ${n} 条 · 导出补丁`;
}
$('#pendbar').onclick = openExport;
updatePendbar();

/* ---------- tooltip ---------- */
const tip = $('#tooltip');
function showTip(e, text) {
  tip.textContent = text; tip.style.display = 'block';
  tip.style.left = Math.min(e.clientX + 12, innerWidth - 160) + 'px';
  tip.style.top = (e.clientY - 34) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

/* ---------- 启动 ---------- */
$('#gen-at').textContent = '更新于 ' + (D.generated_at || '').slice(0, 16).replace('T', ' ');
render();
</script>
